    if (view === 'settings') return 'Inställningar samlar grundstruktur, exempeldata och säkra startpunkter för appen.';
    return 'Välj rum efter vad du vill göra: bygg schema, lägg uppdrag, hantera drift eller arbeta med skoldelen.';
  }, [view, workflowMode]);

  // När cykellängden ändras: justera alla personers fridayRotation till rätt längd,
  // och håll currentFridayWeek inom giltigt intervall.
  const setFridayCycleWeeks = (n) => {
    const clamped = Math.max(1, Math.min(20, n || 1));
    setFridayCycleWeeksRaw(clamped);
    setStaff(prev => prev.map(s => ({
      ...s,
      fridayRotation: s.hasFridayRotation
        ? resizeRotation(s.fridayRotation, clamped)
        : s.fridayRotation,
      fridayTemplateStartWeek: Math.min(Math.max(1, s.fridayTemplateStartWeek || 1), clamped),
      fridayTemplateOverrides: Object.fromEntries(
        Object.entries(s.fridayTemplateOverrides || {}).filter(([week]) => parseInt(week, 10) <= clamped)
      ),
    })));
    setGeneratorDraftStaff(prev => Array.isArray(prev) ? prev.map(s => ({
      ...s,
      fridayRotation: s.hasFridayRotation
        ? resizeRotation(s.fridayRotation, clamped)
        : s.fridayRotation,
      fridayTemplateStartWeek: Math.min(Math.max(1, s.fridayTemplateStartWeek || 1), clamped),
      fridayTemplateOverrides: Object.fromEntries(
        Object.entries(s.fridayTemplateOverrides || {}).filter(([week]) => parseInt(week, 10) <= clamped)
      ),
    })) : prev);
    setFridayTemplateRotation(prev => resizeRotation(prev, clamped));
    setCurrentFridayWeek(w => Math.min(Math.max(1, w), clamped));
  };

  // ----- Persistens -----
  // Autospar i localStorage som backup. Den primära "sanningen" är dock filen
  // som användaren själv exporterar/importerar — så data följer med mellan datorer/kollegor.
  const STORAGE_KEY = 'fritids-schema-v1';
  const WORKFLOW_MODE_STORAGE_KEY = 'schemafix-workflow-mode-v1';
  const STORAGE_RECOVERY_KEY = 'fritids-schema-v1-before-last-start';

  const preserveStoredBackup = (raw) => {
    if (!raw) return;
    try {
      const current = JSON.parse(raw);
      const currentStaffCount = Array.isArray(current?.staff) ? current.staff.length : 0;
      const existingRaw = localStorage.getItem(STORAGE_RECOVERY_KEY);
      const existing = existingRaw ? JSON.parse(existingRaw) : null;
      const existingStaffCount = Array.isArray(existing?.staff) ? existing.staff.length : 0;
      if (currentStaffCount > 0 || existingStaffCount === 0) {
        localStorage.setItem(STORAGE_RECOVERY_KEY, raw);
      }
    } catch {}
  };

  const activateWorkflowMode = (mode, options = {}) => {
    const normalized = normalizeWorkflowMode(mode);
    setWorkflowModeState(normalized);
    if (options.navigate === false) return;
    if (normalized === WORKFLOW_MODE_EXISTING) {
      setView(staff.length > 0 ? 'schedule' : 'staff');
      return;
    }
    setView((departments.length > 0 && staff.length > 0) ? 'schedule' : 'settings');
  };

  // Ladda backup vid start
  useEffect(() => {
    let foundData = false;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const storedWorkflowMode = normalizeWorkflowMode(localStorage.getItem(WORKFLOW_MODE_STORAGE_KEY));
        if (raw) {
          foundData = true;
          preserveStoredBackup(raw);
          const data = JSON.parse(raw);
          if (!data || typeof data !== 'object' || !Array.isArray(data.staff) || !Array.isArray(data.departments)) {
            throw new Error('Autosparningen har okänt format.');
          }
          setWorkflowModeState(normalizeWorkflowMode(data.workflowMode || storedWorkflowMode));
          const normalizedStaff = normalizeStaffList(data.staff || [], data.fridayCycleWeeks || 8);
          if (data.staff) {
            setStaff(normalizedStaff);
            if (normalizedStaff.length > 0) nextId = Math.max(...normalizedStaff.map(p => p.id), 99) + 1;
          }
          const loadedDepartments = data.departments || initialDepartments;
          if (data.departments) setDepartments(loadedDepartments);
          if (data.coverageBlocks) setCoverageBlocks(normalizeCoverageBlocks(data.coverageBlocks, loadedDepartments));
          setPassBank(normalizePassBank(data.passBank || initialPassBank));
          setAssignments(normalizeAssignmentsMap(data.assignments || initialAssignments, normalizedStaff, data.fridayCycleWeeks || 8));
          setAssignmentWindows(normalizeAssignmentWindows(data.assignmentWindows || initialAssignmentWindows, loadedDepartments, normalizeCoverageBlocks(data.coverageBlocks || initialCoverageBlocks, loadedDepartments)));
          setDriftState(normalizeDriftState(data.driftState || initialDriftState, normalizedStaff, data.fridayCycleWeeks || 8));
          setGeneratorDraftStaff(Array.isArray(data.generatorDraftStaff) ? normalizeStaffList(data.generatorDraftStaff, data.fridayCycleWeeks || 8) : null);
          if (data.fridayCycleWeeks) setFridayCycleWeeksRaw(data.fridayCycleWeeks);
          setFridayTemplateRotation(resizeRotation(data.fridayTemplateRotation, data.fridayCycleWeeks || 8));
          if (data.savedFileName) setSavedFileName(data.savedFileName);
        } else {
          setWorkflowModeState(storedWorkflowMode);
        }
    } catch (err) {
      setStorageLoadError(true);
      console.error('Kunde inte läsa backup från localStorage:', err);
    }
    // Visa välkomstvyn endast vid allra första besöket — tom localStorage
    const hasSeenWelcome = localStorage.getItem('schemafix-welcome-seen');
    if (!foundData && !hasSeenWelcome) {
      setShowWelcome(true);
    }
    setLoaded(true);
  }, []);

  const dismissWelcome = () => {
    localStorage.setItem('schemafix-welcome-seen', '1');
    setShowWelcome(false);
  };

  const startTour = (mode = workflowMode) => {
    const normalized = normalizeWorkflowMode(mode);
    activateWorkflowMode(normalized, { navigate: false });
    dismissWelcome();
    setTourMode(normalized);
    const tour = getWorkflowTour(normalized);
    setView(tour[0]?.view || 'settings');
    setTourStep(0);
  };

  const nextTourStep = () => {
    const tour = getWorkflowTour(tourMode);
    const next = (tourStep ?? -1) + 1;
    if (next >= tour.length) {
      setTourStep(null);
      return;
    }
    setView(tour[next].view);
    setTourStep(next);
  };

  const endTour = () => setTourStep(null);

  // Autospar till localStorage vid varje ändring + markera som "ändrat sedan senaste filsparning"
  useEffect(() => {
    if (!loaded) return;
    if (storageLoadError) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        staff: normalizeStaffList(staff, fridayCycleWeeks),
        departments, coverageBlocks: normalizedCoverageBlocks, passBank: normalizePassBank(passBank), assignments: normalizeAssignmentsMap(assignments, staff, fridayCycleWeeks), assignmentWindows: normalizedAssignmentWindows, driftState: normalizeDriftState(driftState, staff, fridayCycleWeeks), fridayCycleWeeks, fridayTemplateRotation, savedFileName, workflowMode,
        generatorDraftStaff: hasGeneratorDraft ? normalizeStaffList(generatorWorkspaceStaff, fridayCycleWeeks) : null,
      }));
      localStorage.setItem(WORKFLOW_MODE_STORAGE_KEY, workflowMode);
    } catch {}
    setDirty(true);
  }, [staff, departments, normalizedCoverageBlocks, passBank, assignments, normalizedAssignmentWindows, driftState, fridayCycleWeeks, fridayTemplateRotation, workflowMode, generatorWorkspaceStaff, hasGeneratorDraft, loaded, storageLoadError]);

  // Hjälp: bygg datapaketet att skriva till fil
  const buildSaveData = () => ({
    version: 59,
    exportedAt: new Date().toISOString(),
    staff: normalizeStaffList(staff, fridayCycleWeeks),
    departments, coverageBlocks: normalizedCoverageBlocks, passBank: normalizePassBank(passBank), assignments: normalizeAssignmentsMap(assignments, staff, fridayCycleWeeks), assignmentWindows: normalizedAssignmentWindows, driftState: normalizeDriftState(driftState, staff, fridayCycleWeeks), fridayCycleWeeks, fridayTemplateRotation, workflowMode,
    generatorDraftStaff: hasGeneratorDraft ? normalizeStaffList(generatorWorkspaceStaff, fridayCycleWeeks) : null,
    // Snapshot av staff från senaste utgångspunkt – används av schemavyn
    // för att visa vad som ändrats manuellt sedan generering/inläsning.
    baselineStaff: baselineStaff ? normalizeStaffList(baselineStaff, fridayCycleWeeks) : null,
  });

  // Skriv data till en redan öppnad fil-handle
  const writeToHandle = async (handle, data) => {
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
  };

  // Spara: använder File System Access API om webbläsaren stöder det,
  // annars faller den tillbaka till vanlig nedladdning (Hämtade filer).
  const saveToFile = async (saveAs = false) => {
    const data = buildSaveData();
    const today = new Date().toISOString().slice(0, 10);
    const defaultName = `schemafix-${today}.json`;

    // Modern API (Chrome/Edge/Opera): visar en riktig "Spara som"-dialog
    if (window.showSaveFilePicker) {
      try {
        let handle = fileHandle;
        // Inget öppet handle eller "Spara som" begärt — visa dialog
        if (!handle || saveAs) {
          handle = await window.showSaveFilePicker({
            suggestedName: savedFileName || defaultName,
            types: [{
              description: 'Schemafil',
              accept: { 'application/json': ['.json'] },
            }],
          });
          setFileHandle(handle);
        }
        await writeToHandle(handle, data);
        setSavedFileName(handle.name);
        setDirty(false);
        return;
      } catch (err) {
        // Användaren avbröt dialogen — gör inget
        if (err.name === 'AbortError') return;
        // Annat fel — fall ner till fallback
        console.error('File picker fel:', err);
      }
    }

    // Fallback (Firefox/Safari): vanlig nedladdning till Hämtade filer
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = savedFileName || defaultName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setSavedFileName(a.download);
    setDirty(false);
  };

  // Öppna fil: använder File System Access API om tillgängligt så att Spara
  // sedan kan skriva tillbaka till samma fil utan ny dialog.
  const openFile = async () => {
    if (window.showOpenFilePicker) {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{
            description: 'Schemafil',
            accept: { 'application/json': ['.json'] },
          }],
        });
        const file = await handle.getFile();
        await loadFromFileObject(file);
        setFileHandle(handle);
      } catch (err) {
        if (err.name !== 'AbortError') console.error('File picker fel:', err);
      }
      return;
    }
    // Fallback: trigga den dolda <input type="file">
    document.getElementById('loadFileInput').click();
  };

  // Läs in en File-instans (gemensam för båda flöden)
  const loadFromFileObject = (file) => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.staff || !data.departments) {
          alert('Den här filen ser inte ut att vara ett sparat schema.');
          resolve(false); return;
        }
        if (staff.length > 0 && !confirm('Detta ersätter all nuvarande data. Fortsätt?')) {
          resolve(false); return;
        }
        const loadedDepartments = data.departments || [];
        const normalizedStaff = normalizeStaffList(data.staff || [], data.fridayCycleWeeks || 8);
        setStaff(normalizedStaff);
        // Använd sparad baseline om filen har en. Annars sätt nuvarande
        // staff som baseline – då visas inga diff-markeringar tills
        // användaren genererar eller laddar exempel.
        const loadedBaseline = Array.isArray(data.baselineStaff) && data.baselineStaff.length > 0
          ? normalizeStaffList(data.baselineStaff, data.fridayCycleWeeks || 8)
          : JSON.parse(JSON.stringify(normalizedStaff));
        setBaselineStaff(loadedBaseline);
        setWorkflowModeState(normalizeWorkflowMode(data.workflowMode || WORKFLOW_MODE_GENERATE));
        setDepartments(loadedDepartments);
        setCoverageBlocks(normalizeCoverageBlocks(data.coverageBlocks || initialCoverageBlocks, loadedDepartments));
        setPassBank(normalizePassBank(data.passBank || initialPassBank));
        setAssignments(normalizeAssignmentsMap(data.assignments || initialAssignments, normalizedStaff, data.fridayCycleWeeks || 8));
        setAssignmentWindows(normalizeAssignmentWindows(data.assignmentWindows || initialAssignmentWindows, loadedDepartments, normalizeCoverageBlocks(data.coverageBlocks || initialCoverageBlocks, loadedDepartments)));
        setDriftState(normalizeDriftState(data.driftState || initialDriftState, normalizedStaff, data.fridayCycleWeeks || 8));
        setGeneratorDraftStaff(Array.isArray(data.generatorDraftStaff) ? normalizeStaffList(data.generatorDraftStaff, data.fridayCycleWeeks || 8) : null);
        setFridayCycleWeeksRaw(data.fridayCycleWeeks || 8);
        setFridayTemplateRotation(resizeRotation(data.fridayTemplateRotation, data.fridayCycleWeeks || 8));
        if (normalizedStaff.length > 0) nextId = Math.max(...normalizedStaff.map(p => p.id), 99) + 1;
        setSavedFileName(file.name);
        setTimeout(() => setDirty(false), 50);
        resolve(true);
      } catch (err) {
        alert('Kunde inte läsa filen: ' + err.message);
        resolve(false);
      }
    };
    reader.readAsText(file);
  });

  // Bakåtkompatibel wrapper för den dolda <input type="file"> i fallback-läge
  const loadFromFile = (file) => {
    setFileHandle(null); // Ingen handle vid fallback
    loadFromFileObject(file);
  };

  // Varna innan användaren stänger fliken om det finns osparade ändringar
  useEffect(() => {
    if (!dirty) return;
    const handler = (e) => {
      e.preventDefault();
      e.returnValue = '';
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [dirty]);

  const applyExampleScenario = (scenario) => {
    if (!scenario) return;
    if (staff.length > 0 && !confirm(`Detta ersätter nuvarande data med testscenariot "${scenario.name}". Fortsätt?`)) return;
    const normalizedStaff = normalizeStaffList(scenario.staff, scenario.fridayCycleWeeks);
    setStaff(normalizedStaff);
    setBaselineStaff(JSON.parse(JSON.stringify(normalizedStaff)));
    setGeneratorDraftStaff(null);
    setWorkflowModeState(WORKFLOW_MODE_GENERATE);
    setDepartments(scenario.departments);
    setCoverageBlocks(normalizeCoverageBlocks(scenario.coverageBlocks, scenario.departments));
    setPassBank(normalizePassBank(scenario.passBank || initialPassBank));
    setAssignments(normalizeAssignmentsMap(scenario.assignments || initialAssignments, normalizedStaff, fridayCycleWeeks));
    setAssignmentWindows(normalizeAssignmentWindows(scenario.assignmentWindows || initialAssignmentWindows, scenario.departments, normalizeCoverageBlocks(scenario.coverageBlocks, scenario.departments)));
    setDriftState(normalizeDriftState(initialDriftState, normalizedStaff, fridayCycleWeeks));
    setFridayCycleWeeksRaw(scenario.fridayCycleWeeks);
    setFridayTemplateRotation(resizeRotation(scenario.fridayTemplateRotation, scenario.fridayCycleWeeks));
    setCurrentFridayWeek(1);
    setFileHandle(null);
    setSavedFileName(null);
    nextId = Math.max(...normalizedStaff.map(p => p.id), 99) + 1;
    setShowExamplePicker(false);
  };
  const loadExample = () => {
    setShowExamplePicker(true);
  };
  const clearAll = () => {
    if (!confirm('Detta tar bort all personal. Avdelningar behålls. Är du säker?')) return;
    setStaff([]);
    setBaselineStaff(null);
    setGeneratorDraftStaff(null);
    setAssignments({});
    setAssignmentWindows(normalizeAssignmentWindows(initialAssignmentWindows, departments, normalizedCoverageBlocks));
    setDriftState(normalizeDriftState(initialDriftState, [], fridayCycleWeeks));
  };
  const openAssignmentEditor = (personId, dayKey) => setAssignmentEditor({ personId, dayKey });
  const addSchoolPosition = ({ personId, dayKey, task }) => {
    const target = staff.find(member => String(member.id) === String(personId));
    if (!target || !ALL_DAY_KEYS.includes(dayKey) || !task) return false;
    const fridayOptions = {
      fridayWeek: dayKey === 'fri' ? currentFridayWeek : 1,
      cycleWeeks: fridayCycleWeeks,
      fridayTemplateRotation,
    };
    if (!getShiftForDay(target, dayKey, fridayOptions)) return false;
    setAssignments(prev => {
      const current = getAssignmentsForDay(prev, target.id, dayKey, fridayOptions);
      const nextTask = normalizeAssignment({
        ...task,
        id: task.id || createAssignmentId(),
      }, {
        allowedStaffIds: new Set(staff.map(person => String(person.id))),
        ownerId: target.id,
      });
      if (!nextTask) return prev;
      return replaceAssignmentsForDay(prev, target.id, dayKey, [...current, nextTask], staff, fridayOptions);
    });
    return true;
  };
  const deleteSchoolPosition = ({ personId, dayKey, taskId }) => {
    const target = staff.find(member => String(member.id) === String(personId));
    if (!target || !ALL_DAY_KEYS.includes(dayKey) || !taskId) return false;
    const fridayOptions = {
      fridayWeek: dayKey === 'fri' ? currentFridayWeek : 1,
      cycleWeeks: fridayCycleWeeks,
      fridayTemplateRotation,
    };
    setAssignments(prev => {
      const current = getAssignmentsForDay(prev, target.id, dayKey, fridayOptions);
      const nextList = current.filter(task => String(task.id) !== String(taskId));
      if (nextList.length === current.length) return prev;
      return replaceAssignmentsForDay(prev, target.id, dayKey, nextList, staff, fridayOptions);
    });
    return true;
  };
  const updateSchoolPosition = ({ personId, dayKey, taskId, patch }) => {
    const target = staff.find(member => String(member.id) === String(personId));
    if (!target || !ALL_DAY_KEYS.includes(dayKey) || !taskId || !patch || typeof patch !== 'object') return false;
    const fridayOptions = {
      fridayWeek: dayKey === 'fri' ? currentFridayWeek : 1,
      cycleWeeks: fridayCycleWeeks,
      fridayTemplateRotation,
    };
    const shift = getShiftForDay(target, dayKey, fridayOptions);
    if (!shift) return false;
    setAssignments(prev => {
      const current = getAssignmentsForDay(prev, target.id, dayKey, fridayOptions);
      let didUpdate = false;
      const nextList = current.map(task => {
        if (String(task.id) !== String(taskId)) return task;
        didUpdate = true;
        return { ...task, ...patch };
      });
      if (!didUpdate) return prev;
      return replaceAssignmentsForDay(prev, target.id, dayKey, nextList, staff, fridayOptions);
    });
    return true;
  };
  const copyFridayAssignmentsForPerson = ({ personId, fromWeek, toWeek }) => {
    const target = staff.find(member => String(member.id) === String(personId));
    const sourceWeek = clamp(asNumber(fromWeek, 1), 1, fridayCycleWeeks);
    const targetWeek = clamp(asNumber(toWeek, currentFridayWeek), 1, fridayCycleWeeks);
    if (!target || sourceWeek === targetWeek) return false;
    const targetFridayOptions = { fridayWeek: targetWeek, cycleWeeks: fridayCycleWeeks, fridayTemplateRotation };
    if (!getShiftForDay(target, 'fri', targetFridayOptions)) return false;
    setAssignments(prev => {
      const sourceTasks = getAssignmentsForDay(prev, target.id, 'fri', {
        fridayWeek: sourceWeek,
        cycleWeeks: fridayCycleWeeks,
        fridayTemplateRotation,
      });
      const clonedTasks = sourceTasks.map(task => ({
        ...task,
        id: createAssignmentId(),
      }));
      return replaceAssignmentsForDay(prev, target.id, 'fri', clonedTasks, staff, targetFridayOptions);
    });
    return true;
  };
  const saveAssignmentsForDay = (personId, dayKey, nextList, copyDayKeys = [], copyPersonIds = []) => {
    const fridayOptions = {
      fridayWeek: dayKey === 'fri' ? currentFridayWeek : 1,
      cycleWeeks: fridayCycleWeeks,
      fridayTemplateRotation,
    };
    setAssignments(prev => {
      let next = replaceAssignmentsForDay(prev, personId, dayKey, nextList, staff, fridayOptions);
      (Array.isArray(copyDayKeys) ? copyDayKeys : []).forEach(copyDayKey => {
        const clonedList = (Array.isArray(nextList) ? nextList : []).map(task => ({
          ...task,
          id: createAssignmentId(),
        }));
        next = replaceAssignmentsForDay(next, personId, copyDayKey, clonedList, staff, {
          fridayWeek: copyDayKey === 'fri' ? currentFridayWeek : 1,
          cycleWeeks: fridayCycleWeeks,
          fridayTemplateRotation,
        });
      });
      (Array.isArray(copyPersonIds) ? copyPersonIds : []).forEach(copyPersonId => {
        const target = staff.find(member => String(member.id) === String(copyPersonId));
        if (!target) return;
        const targetShift = getShiftForDay(target, dayKey, fridayOptions);
        if (!targetShift) return;
        const clonedList = (Array.isArray(nextList) ? nextList : []).map(task => ({
          ...task,
          id: createAssignmentId(),
        }));
        next = replaceAssignmentsForDay(next, target.id, dayKey, clonedList, staff, fridayOptions);
      });
      return next;
    });
    setAssignmentEditor(null);
  };

  const importPersonalScheduleForPerson = ({ personId, importData }) => {
    const target = staff.find(member => String(member.id) === String(personId));
    if (!target || !importData?.days) return false;
    const importedDays = ALL_DAY_KEYS
      .map(dayKey => ({ dayKey, data: importData.days[dayKey] }))
      .filter(item => item.data && (item.data.shift || (Array.isArray(item.data.tasks) && item.data.tasks.length > 0)));
    if (importedDays.length === 0) return false;

    setStaff(prev => prev.map(member => {
      if (String(member.id) !== String(target.id)) return member;
      let next = member;
      importedDays.forEach(({ dayKey, data }) => {
        if (data.shift) {
          const fridayWeek = dayKey === 'fri' ? currentFridayWeek : 1;
          const base = dayKey === 'fri' && next.fridayMode == null
            ? { ...next, fridayMode: 'passbank', hasFridayRotation: false }
            : next;
          next = buildPreviewPerson(base, dayKey, data.shift, fridayWeek, fridayCycleWeeks);
          next = { ...next, daysOff: (next.daysOff || []).filter(key => key !== dayKey) };
        }
      });
      return normalizePerson(next, fridayCycleWeeks);
    }));

    setAssignments(prev => {
      let next = prev;
      importedDays.forEach(({ dayKey, data }) => {
        const fridayOptions = {
          fridayWeek: dayKey === 'fri' ? currentFridayWeek : 1,
          cycleWeeks: fridayCycleWeeks,
          fridayTemplateRotation,
        };
        const cleanTasks = (Array.isArray(data.tasks) ? data.tasks : [])
          .map(task => normalizeAssignment({
            ...task,
            id: createAssignmentId(),
          }, {
            allowedStaffIds: new Set(staff.map(person => String(person.id))),
            ownerId: target.id,
          }))
          .filter(Boolean);
        next = replaceAssignmentsForDay(next, target.id, dayKey, cleanTasks, staff, fridayOptions);
      });
      return next;
    });
    return true;
  };

  const dayData = useMemo(() => {
    const sourceStaff = view === 'schedule' ? generatorWorkspaceStaff : staff;
    let present;
    if (activeDay === 'fri') {
      present = sourceStaff
        .filter(s => !(s.daysOff || []).includes('fri'))
        .map(s => {
          // Passbank-läge: fredag bor i sched.fri precis som vilken annan dag.
          // Övriga lägen (rotation/fixed/null): använd legacy-uppslagningen som
          // tar hänsyn till veckonummer i rullen.
          const sh = s.fridayMode === 'passbank'
            ? (s.sched?.fri || null)
            : getFridayShift(s, currentFridayWeek, fridayCycleWeeks, fridayTemplateRotation);
          if (!sh) return null;
          return { ...s, _friShift: sh, startMin: timeToMin(sh[0]), endMin: timeToMin(sh[1]) };
        })
        .filter(Boolean)
        .sort((a, b) => a.startMin - b.startMin);
    } else {
      present = sourceStaff.filter(s => s.sched[activeDay] && !(s.daysOff || []).includes(activeDay))
        .map(s => ({ ...s, startMin: timeToMin(s.sched[activeDay][0]), endMin: timeToMin(s.sched[activeDay][1]) }))
        .sort((a, b) => a.startMin - b.startMin);
    }
    const coverageViews = coverageScopes.map(scope => {
      const scopePresent = scope.scopeType === COVERAGE_DEPARTMENT
        ? present.filter(p => p.deptId === scope.deptId)
        : present;
      const slots = scope.slots.map(slot => {
        const count = scopePresent.filter(p => p.startMin <= slot.start && p.endMin > slot.start).length;
        return { ...slot, count, gap: count < slot.min, over: count > slot.max };
      });
      const gaps = slots.filter(s => s.gap);
      const overs = slots.filter(s => s.over);
      return {
        ...scope,
        present: scopePresent,
        slots,
        gaps,
        overs,
        gapMinutes: gaps.reduce((sum, s) => sum + SLOT_STEP_MINUTES * (s.min - s.count), 0),
        overMinutes: overs.reduce((sum, s) => sum + SLOT_STEP_MINUTES * (s.count - s.max), 0),
      };
    });
    const primaryCoverage = coverageViews.find(v => v.key === COVERAGE_SHARED)
      || coverageViews.find(v => v.slots.some(s => s.min > 0))
      || coverageViews[0]
      || null;
    return {
      present,
      coverageViews,
      totalGaps: coverageViews.reduce((sum, v) => sum + v.gaps.length, 0),
      totalGapMinutes: coverageViews.reduce((sum, v) => sum + v.gapMinutes, 0),
      totalOvers: coverageViews.reduce((sum, v) => sum + v.overs.length, 0),
      totalOverMinutes: coverageViews.reduce((sum, v) => sum + v.overMinutes, 0),
      primaryCoverageKey: primaryCoverage?.key || COVERAGE_SHARED,
    };
  }, [staff, generatorWorkspaceStaff, view, activeDay, coverageScopes, currentFridayWeek, fridayCycleWeeks, fridayTemplateRotation]);

  const violations = useMemo(() => {
    const v = [];
    for (const s of staff) {
      const wm = weeklyMinutes(s, fridayCycleWeeks, fridayTemplateRotation);
      const dev = wm - getTargetMin(s);
      if (hasWeekdaySchedule(s) && Math.abs(dev) > 5) {
        v.push({ id: s.id, name: s.name, severity: Math.abs(dev) > 60 ? 'high' : 'med',
          msg: `${dev > 0 ? 'Över' : 'Under'} timmål med ${minToHM(Math.abs(dev))} (${minToHM(wm)} av ${minToHM(getTargetMin(s))})` });
      }
      if (s.onlyAfternoons) {
        for (const d of DAYS) {
          if (s.sched[d.key] && timeToMin(s.sched[d.key][0]) < 720)
            v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: börjar ${s.sched[d.key][0]} men ska bara jobba eftermiddag` });
        }
      }
      // Tidsbegränsningar — kontrollera per dag och per paritet (jämn/udda)
      for (const d of DAYS) {
        const sh = s.sched[d.key];
        if (!sh) continue;
        const start = timeToMin(sh[0]);
        const end   = timeToMin(sh[1]);
        const dayHasOverride = !!(s.dayOverrides || {})[d.key];

        // Källa-spårning: vad är hårdast och varifrån kommer regeln?
        const sources = ['even', 'odd'];
        const reported = new Set();
        for (const par of sources) {
          const tag = dayHasOverride ? ' (dagsundantag)' : (s.parityOverrides?.[par] ? ` (${par === 'even' ? 'jämn' : 'udda'} vecka)` : '');
          const earliestStart = getConstraint(s, d.key, 'earliestStart', par);
          const latestStart   = getConstraint(s, d.key, 'latestStart',   par);
          const earliestEnd   = getConstraint(s, d.key, 'earliestEnd',   par);
          const latestEnd     = getConstraint(s, d.key, 'latestEnd',     par);
          if (earliestStart != null && start < earliestStart) {
            const k = `${d.key}-es-${tag}`;
            if (!reported.has(k)) { reported.add(k);
              v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: börjar ${sh[0]} men tidigaste tillåtna är ${minToTime(earliestStart)}${tag}` }); }
          }
          if (latestStart != null && start > latestStart) {
            const k = `${d.key}-ls-${tag}`;
            if (!reported.has(k)) { reported.add(k);
              v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: börjar ${sh[0]} men måste börja senast ${minToTime(latestStart)}${tag}` }); }
          }
          if (earliestEnd != null && end < earliestEnd) {
            const k = `${d.key}-ee-${tag}`;
            if (!reported.has(k)) { reported.add(k);
              v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: slutar ${sh[1]} men måste jobba minst till ${minToTime(earliestEnd)}${tag}` }); }
          }
          if (latestEnd != null && end > latestEnd) {
            const k = `${d.key}-le-${tag}`;
            if (!reported.has(k)) { reported.add(k);
              v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: slutar ${sh[1]} men senaste tillåtna är ${minToTime(latestEnd)}${tag}` }); }
          }
        }
      }
    }
    return v;
  }, [staff, fridayCycleWeeks, fridayTemplateRotation]);

  const updateStaff = (updated) => setStaff(prev => prev.map(s => s.id === updated.id ? normalizePerson(updated, fridayCycleWeeks) : s));
  // När en person raderas städar vi proaktivt alla följdreferenser. Utan detta
  // hänger dangling refs kvar i React state tills nästa save+reload. DriftView
  // filtrerar redan vid render, men det är renare att rensa här så att även
  // AssignmentsView slipper död data och så att sparbara driftmallar inte
  // tyst försvinner mellan klick.
  const removeStaff = (id) => {
    const idStr = String(id);
    const remainingStaff = staff.filter(s => s.id !== id);
    setStaff(remainingStaff);
    setAssignments(prev => {
      if (!prev || typeof prev !== 'object' || !(idStr in prev)) return prev;
      const next = { ...prev };
      delete next[idStr];
      return next;
    });
    setDriftState(prev => normalizeDriftState(prev, remainingStaff, fridayCycleWeeks));
  };

  // Direktredigering från schemavyn: uppdaterar EN persons pass på EN dag.
  // Hanterar alla fyra fredagslägen så att klick-redigering på fredagen
  // landar i rätt fält (sched.fri / fridayShift / fridayRotation[week] /
  // fridayTemplateOverrides[week]).
  // newShift = ['HH:MM', 'HH:MM'] för att sätta tid, eller null för att
  // markera personen som ledig den dagen.
  const updateScheduleShift = (personId, dayKey, newShift, options = {}) => {
    setStaff(prev => prev.map(p => {
      if (p.id !== personId) return p;
      const cleanShift = newShift ? normalizeShift(newShift) : null;
      // Vardag: enklast – skriv eller ta bort sched[day]
      if (dayKey !== 'fri') {
        const sched = { ...(p.sched || {}) };
        if (cleanShift) sched[dayKey] = cleanShift;
        else delete sched[dayKey];
        return { ...p, sched };
      }
      // Fredag: olika fält beroende på personens fredagsläge
      if (p.fridayMode === 'passbank') {
        const sched = { ...(p.sched || {}) };
        if (cleanShift) sched.fri = cleanShift;
        else delete sched.fri;
        return { ...p, sched };
      }
      if (p.fridayMode === 'fixed') {
        return { ...p, fridayShift: cleanShift };
      }
      if (p.fridayMode === 'rotation') {
        const week = options.fridayWeek || 1;
        if (p.fridayUseTemplate) {
          // Central mall: skapa eller rensa en override för veckan.
          // null betyder "explicit ledig denna vecka" (skiljs från undefined
          // som betyder "följ mallen").
          const overrides = { ...(p.fridayTemplateOverrides || {}) };
          overrides[String(week)] = cleanShift;
          return { ...p, fridayTemplateOverrides: overrides };
        }
        // Egen rull: uppdatera array-platsen för veckan
        const rotation = (p.fridayRotation || []).slice();
        while (rotation.length < fridayCycleWeeks) rotation.push(null);
        rotation[week - 1] = cleanShift;
        return { ...p, fridayRotation: rotation };
      }
      // fridayMode === null (ej valt): gör inget – be användaren välja läge först
      return p;
    }));
  };

  const addStaff = () => {
    const newPerson = normalizePerson(P({
      id: nextId++, name: 'Ny anställd', deptId: '', employmentRole: '', role: '', includeInGenerator: false,
      sched: {},
      allowedPassIds: [],
      fridayRotation: new Array(fridayCycleWeeks).fill(null),
    }), fridayCycleWeeks);
    setStaff([...staff, newPerson]);
    setEditingId(newPerson.id);
  };

  const handleGenerate = async () => {
    const preparedStaff = prepareStaffForUse(generatorWorkspaceStaff, fridayCycleWeeks, fridayTemplateRotation, passBank, coverageScopes);
    setGenerating(true);
    setAlternatives(null);
    setGenerationProgress({ percent: 3, label: 'Förbereder...', detail: 'Samlar regler och bemanningskrav' });
    await yieldToBrowser();
    try {
      const alts = await generateAlternativesAsync(
        preparedStaff,
        coverageScopes,
        fridayCycleWeeks,
        fridayTemplateRotation,
        passBank,
        setGenerationProgress
      );
      setGenerationProgress({ percent: 100, label: 'Klart', detail: 'Schemaförslagen är färdiga' });
      setAlternatives(alts);
      await yieldToBrowser();
      await wait(450);
    } finally {
      setGenerating(false);
    }
  };

  // Återställ en specifik cells värde till baseline (senaste utgångspunkten).
  // Hanterar alla fredagsläges-fält via updateScheduleShift.
  // Begränsning: om personens fridayMode har ändrats sedan baselinen så
  // återställs bara själva tids-värdet, inte läget – det är ett edge case
  // som inte täcks här.
  const resetPersonShiftToBaseline = (personId, dayKey, options = {}) => {
    if (!baselineStaff) return;
    const baselinePerson = baselineStaff.find(p => p.id === personId);
    if (!baselinePerson) return;
    const baselineShift = getShiftForDay(baselinePerson, dayKey, {
      fridayWeek: options.fridayWeek || 1,
      cycleWeeks: fridayCycleWeeks,
      fridayTemplateRotation,
    });
    updateGeneratorDraftShift(personId, dayKey, baselineShift, options);
  };

  // Återställ generatorpersonernas pass till baselinen. Övriga roller hör till
  // huvudschemat och ska inte påverkas av generatorns ångra-flöde.
  const resetAllToBaseline = () => {
    if (!baselineStaff) return;
    if (!confirm('Detta återställer generatorpersonernas arbetspass till den senaste utgångspunkten. Lärare, uppdrag, skoldel och driftdata påverkas inte. Fortsätt?')) return;
    const baselineById = new Map(baselineStaff.map(person => [String(person.id), person]));
    setGeneratorDraftStaff(generatorStaff.map(person => {
      const baselinePerson = baselineById.get(String(person.id));
      return baselinePerson ? normalizePerson(JSON.parse(JSON.stringify(baselinePerson)), fridayCycleWeeks) : person;
    }));
  };

  const updateGeneratorDraftShift = (personId, dayKey, newShift, options = {}) => {
    setGeneratorDraftStaff(prev => {
      const source = Array.isArray(prev) && prev.length > 0 ? normalizeStaffList(prev, fridayCycleWeeks) : generatorWorkspaceStaff;
      return source.map(person => {
        if (String(person.id) !== String(personId)) return person;
        return normalizePerson(buildPreviewPerson(person, dayKey, newShift, options.fridayWeek || 1, fridayCycleWeeks), fridayCycleWeeks);
      });
    });
  };

  const publishGeneratedStaffToMain = (generatedStaffSource, label = 'utkastet') => {
    const generatedStaff = Array.isArray(generatedStaffSource) ? generatedStaffSource.map(person => normalizePerson(person, fridayCycleWeeks)) : [];
    const generatedById = new Map(generatedStaff.map(person => [String(person.id), person]));
    if (generatedById.size === 0) return false;
    const affectedCount = staff.filter(person => generatedById.has(String(person.id))).length;
    if (!confirm(`Detta flyttar ${label} till huvudschemat för ${affectedCount} ${affectedCount === 1 ? 'fritidsperson' : 'fritidspersoner'}.\n\nLärare, uppdrag, skoldel och driftdata påverkas inte, men arbetspassen för berörd fritidspersonal ersätts. Fortsätt?`)) return false;
    const nextStaff = staff.map(person => {
      const generated = generatedById.get(String(person.id));
      if (!generated) return person;
      const nextSched = {};
      WEEKDAY_KEYS.forEach(dayKey => {
        if (generated.sched?.[dayKey]) nextSched[dayKey] = generated.sched[dayKey];
      });
      if (generated.fridayMode === 'passbank' && generated.sched?.fri) nextSched.fri = generated.sched.fri;
      return normalizePerson({
        ...person,
        sched: nextSched,
        fridayMode: generated.fridayMode,
        fridayShift: generated.fridayShift,
        fridayRotation: generated.fridayRotation,
        fridayUseTemplate: generated.fridayUseTemplate,
        fridayTemplateStartWeek: generated.fridayTemplateStartWeek,
        fridayTemplateOverrides: generated.fridayTemplateOverrides,
        hasFridayRotation: generated.hasFridayRotation,
      }, fridayCycleWeeks);
    });
    setStaff(nextStaff);
    // Det publicerade schemat blir ny utgångspunkt för generatorns jämförelser.
    setBaselineStaff(JSON.parse(JSON.stringify(nextStaff)));
    setGeneratorDraftStaff(null);
    setPublishAssignmentWarnings(findAssignmentWarningsForStaff(nextStaff));
    return true;
  };

  const useAlternativeAsGeneratorDraft = (alt) => {
    const draft = normalizeStaffList(alt?.staff || [], fridayCycleWeeks);
    if (draft.length === 0) return;
    setGeneratorDraftStaff(draft);
    setBaselineStaff(JSON.parse(JSON.stringify(draft)));
    setAlternatives(null);
  };

  const applyAlternative = (alt) => {
    if (!publishGeneratedStaffToMain(alt?.staff || [], `alternativet "${alt?.label || 'valt alternativ'}"`)) return;
    setAlternatives(null);
  };

  return (
    <>
    <div className="screen-only min-h-screen w-full" style={{ backgroundColor: '#FBF8F4', fontFamily: '"Geist", -apple-system, system-ui, sans-serif' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist:wght@400;500;600&display=swap');
        body { font-family: "Geist", system-ui, sans-serif; }
        .display-font { font-family: "Fraunces", Georgia, serif; font-feature-settings: "ss01"; }
        .coffee-card {
          background:
            radial-gradient(circle at top, rgba(255,255,255,0.92), rgba(255,255,255,0.82) 36%, rgba(245,240,232,0.96) 100%);
        }
        .coffee-wrap {
          position: relative;
          width: 88px;
          height: 88px;
          margin: 0 auto 16px;
        }
        .coffee-plate {
          position: absolute;
          left: 50%;
          bottom: 8px;
          width: 74px;
          height: 14px;
          transform: translateX(-50%);
          border-radius: 999px;
          background: rgba(120, 113, 108, 0.15);
        }
        .coffee-cup {
          position: absolute;
          left: 50%;
          bottom: 18px;
          width: 52px;
          height: 40px;
          transform: translateX(-50%);
          border-radius: 0 0 16px 16px;
          background: linear-gradient(180deg, #fffdf9 0%, #f4ede1 100%);
          border: 2px solid rgba(120, 113, 108, 0.18);
          box-shadow: 0 12px 20px rgba(120, 113, 108, 0.12);
        }
        .coffee-cup::after {
          content: "";
          position: absolute;
          right: -13px;
          top: 8px;
          width: 14px;
          height: 16px;
          border: 3px solid rgba(120, 113, 108, 0.26);
          border-left: none;
          border-radius: 0 12px 12px 0;
        }
        .coffee-steam {
          position: absolute;
          bottom: 58px;
          width: 10px;
          height: 34px;
          border-radius: 999px;
          background: linear-gradient(180deg, rgba(214, 211, 209, 0) 0%, rgba(214, 211, 209, 0.75) 55%, rgba(214, 211, 209, 0) 100%);
          animation: steamDrift 2.1s ease-in-out infinite;
          opacity: 0.8;
        }
        .coffee-steam.s1 { left: 28px; animation-delay: 0s; }
        .coffee-steam.s2 { left: 40px; height: 40px; animation-delay: 0.5s; }
        .coffee-steam.s3 { left: 52px; animation-delay: 1s; }
        @keyframes steamDrift {
          0% { transform: translateY(6px) scaleX(0.92); opacity: 0; }
          20% { opacity: 0.72; }
          70% { opacity: 0.48; }
          100% { transform: translateY(-16px) scaleX(1.08); opacity: 0; }
        }

        /* --- Utskriftsregler ---
           På skärm: .print-only är dolt. På utskrift: skärm-UI:t göms och bara
           den print-specifika vyn visas. Användaren får då en ren A4-vänlig
           sida som kan sparas som PDF via webbläsarens print-dialog. */
        .print-only { display: none; }
        @media print {
          @page { size: A4 landscape; margin: 1.2cm; }
          body { background: #fff !important; color: #000; }

// Print-vyn: dolt på skärm (.print-only{display:none}), syns bara i print-läge.
// Renderar veckans schema på ett sätt som passar A4-landskap. För fredag visas
// just den vecka användaren har aktiv – fredagsrullen exporteras inte i sin
// helhet eftersom det skulle bli flera sidor och få användare behöver det.
function PrintableSchedule({ staff, departments, passBank, fridayCycleWeeks, currentFridayWeek, fridayTemplateRotation, savedFileName }) {
  const normalizedPassBank = useMemo(() => normalizePassBank(passBank || []), [passBank]);

  const printDays = useMemo(() => {
    return DAY_META.map(day => {
      const present = (staff || [])
        .filter(s => !(s.daysOff || []).includes(day.key))
        .map(s => {
          const shift = getShiftForDay(s, day.key, {
            fridayWeek: currentFridayWeek,
            cycleWeeks: fridayCycleWeeks,
            fridayTemplateRotation,
          });
          if (!shift) return null;
          const startMin = timeToMin(shift[0]);
          const endMin = timeToMin(shift[1]);
          if (startMin == null || endMin == null) return null;
          const matchingPass = normalizedPassBank.find(pass =>
            pass.days.includes(day.key) && shiftMatchesPass(shift, pass)
          );
          return {
            id: s.id,
            name: s.name || '(utan namn)',
            role: s.role || '',
            dept: getDept(s.deptId, departments),
            shift,
            startMin,
            workedDurationMin: workedMinutesFromSpan(endMin - startMin),
            passName: matchingPass?.name || '',
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.startMin - b.startMin);
      return { day, present };
    });
  }, [staff, departments, normalizedPassBank, currentFridayWeek, fridayCycleWeeks, fridayTemplateRotation]);

  const printedDate = new Date().toLocaleDateString('sv-SE');

  return (
    <div className="print-only">
      <h1>Schema</h1>
      <p className="print-meta">
        Utskrivet {printedDate}
        {savedFileName && ` · ${savedFileName}`}
        {` · Fredag visas för vecka ${currentFridayWeek} av ${fridayCycleWeeks}`}
        {' · Varaktighet visas efter rastregel'}
      </p>
      {printDays.map(({ day, present }) => (
        <div key={day.key} className="print-day">
          <h2 className="print-day-header">
            {day.label}
            {day.key === 'fri' && ` · vecka ${currentFridayWeek}`}
          </h2>
          {present.length === 0 ? (

// Modal som visas medan generatorn jobbar. Egen komponent för att kunna ha
// sin egen useEffect-baserade rotation av humoristiska meddelanden.
function GenerationModal({ progress }) {
  const [quipIndex, setQuipIndex] = useState(() => Math.floor(Math.random() * GENERATION_QUIPS.length));
  useEffect(() => {
    // Byt meddelande varannan sekund. Undvik att slumpa fram samma två gånger
    // i rad (irriterande om man bara stirrar).
    const interval = setInterval(() => {
      setQuipIndex(prev => {
        if (GENERATION_QUIPS.length <= 1) return prev;
        let next;
        do { next = Math.floor(Math.random() * GENERATION_QUIPS.length); } while (next === prev);
        return next;
      });
    }, 2000);
    return () => clearInterval(interval);
  }, []);
  const quip = GENERATION_QUIPS[quipIndex] || '';
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center" style={{ backgroundColor: 'rgba(28, 25, 23, 0.4)' }}>

// Tooltip — liten ?-ikon som visar förklarande text vid hover. Funkar både med mus och tapp.
function countAssignmentRecords(value) {
  if (Array.isArray(value)) return value.length;
  if (!value || typeof value !== 'object') return 0;
  return Object.values(value).reduce((sum, child) => sum + countAssignmentRecords(child), 0);
}

// ==================== BUFFERT-ÖVERSIKT (proaktiv) ====================
// Visar för varje dag och varje täckningsscope vilka tidsfönster som ligger
// precis på minimumet (fragile = buffer 0) eller redan är understaffade (gap).
// Tystas av "Ensam OK"-flaggan på det enskilda blocket. Komplementär till den
// reaktiva varningen i Drift: här ser man riskerna INNAN någon blir sjuk.
function BufferOverviewCard({ staff, coverageScopes, fridayCycleWeeks, fridayTemplateRotation, currentFridayWeek }) {
  const [activeDay, setActiveDay] = useState('mon');
  const fridayOptions = useMemo(() => ({
    fridayWeek: activeDay === 'fri' ? currentFridayWeek : 1,
    cycleWeeks: fridayCycleWeeks,
    fridayTemplateRotation,
    includeFragile: true,
  }), [activeDay, currentFridayWeek, fridayCycleWeeks, fridayTemplateRotation]);

  const issues = useMemo(
    () => buildCoverageIssuesForDay(staff, activeDay, coverageScopes, fridayOptions),
    [staff, activeDay, coverageScopes, fridayOptions]
  );
  const gapIssues = issues.filter(i => i.kind === 'gap');
  const fragileIssues = issues.filter(i => i.kind === 'fragile');
  const overIssues = issues.filter(i => i.kind === 'over');
  const hasCoverage = (coverageScopes || []).some(s => (s.slots || []).some(slot => slot.min > 0));

  return (
    <div className="rounded-2xl bg-white ring-1 ring-stone-200 p-4">
      <div className="flex items-center justify-between gap-3 flex-wrap mb-3">
        <div>
          <p className="text-xs uppercase tracking-wider text-stone-500 mb-0.5">Buffert-översikt</p>
          <h3 className="display-font text-xl text-stone-800">Tunna punkter och luckor</h3>
          <p className="text-xs text-stone-500 mt-0.5">
            Visar var bemanningen ligger precis på minimum (om någon blir sjuk blir det understaffat) eller redan är under min. Tystas av <em>Ensam OK</em> på blocket.
          </p>
        </div>
        <div className="flex gap-1 p-1 rounded-lg bg-stone-100">
          {DAY_META.map(day => (
            <button key={day.key} type="button" onClick={() => setActiveDay(day.key)}
              className={`px-2.5 py-1 rounded-md text-xs transition ${activeDay === day.key ? 'bg-white text-stone-900 shadow-sm' : 'text-stone-600 hover:text-stone-900'}`}>
              {day.short}
            </button>
          ))}
        </div>
      </div>
      {!hasCoverage ? (
        <p className="rounded-lg bg-stone-50 ring-1 ring-stone-200 p-3 text-sm text-stone-500 text-center">
          Inga bemanningsregler är satta än. Lägg upp dem i <strong>Bemanning</strong> (under Verktyg) så syns buffert-statusen här.
        </p>
      ) : issues.length === 0 ? (
        <div className="rounded-lg bg-emerald-50 ring-1 ring-emerald-200 p-3 flex items-center gap-2">

                  <div key={`o-${issue.scopeKey}-${issue.start}`} className="flex items-center gap-2 text-xs">

                  </div>
                ))}
              </div>

          )}

      )}
    </div>
  );
}

function SchoolWorkspaceView({ staff, assignments, departments, fridayCycleWeeks, fridayTemplateRotation, currentFridayWeek, coverageScopes = [], onOpenView, onOpenAssignmentEditor, onOpenTasksDay, onAddSchoolPosition, onDeleteSchoolPosition, onUpdateSchoolPosition }) {

  const schoolTypes = new Set(['lesson', 'studySupport', 'yard', 'break', 'pedLunch', 'meeting', 'collab', 'resource', 'prep', 'planning']);
  const isSchoolTask = (person, task) => {
    const searchable = `${person.name || ''} ${person.role || ''} ${task.label || ''} ${task.target || ''} ${task.notes || ''} ${getAssignmentTypeMeta(task.type).label}`.toLowerCase();
    const targetLooksSchool = /f-?1|2-?3|klass|grupp|ar|ars|skola|lektion|studiest|studiestod|undervisning/.test(searchable);
    return schoolTypes.has(task.type) || targetLooksSchool;
  };
  const getSchoolRoleCategory = (person) => {
    return getStaffRoleCategory(person);
  };
  const roleMatchesFilter = (person, filter) => {
    const category = getSchoolRoleCategory(person);
    if (filter === 'all') return true;
    if (filter === 'school') return category === 'teacher' || category === 'support';
    return category === filter;
  };
  const schoolPeople = useMemo(() => staff.filter(person => roleMatchesFilter(person, 'school')), [staff]);
  const peopleToShow = useMemo(() => staff.filter(person => roleMatchesFilter(person, roleFilter)), [staff, roleFilter]);
  const positionRows = useMemo(() => {
    const rows = [];
    peopleToShow.forEach(person => {
      const tasks = getAssignmentsForDay(assignments, person.id, activeDay, {
        fridayWeek: activeDay === 'fri' ? currentFridayWeek : 1,
        cycleWeeks: fridayCycleWeeks,
        fridayTemplateRotation,
      });
      tasks.forEach(task => {
        const searchable = `${person.name || ''} ${person.role || ''} ${task.label || ''} ${task.target || ''} ${task.notes || ''} ${getAssignmentTypeMeta(task.type).label}`.toLowerCase();
        if (!isSchoolTask(person, task)) return;
        if (personFilter !== 'all' && String(person.id) !== String(personFilter)) return;
        if (query.trim() && !searchable.includes(query.trim().toLowerCase())) return;
        rows.push({ person, task });
      });
    });
    return rows.sort((a, b) => a.task.start - b.task.start || String(a.person.name).localeCompare(String(b.person.name), 'sv'));

    return peopleToShow.map(person => {

        const shift = getShiftForDay(person, day.key, {
          fridayWeek: day.key === 'fri' ? currentFridayWeek : 1,

          fridayTemplateRotation,

          fridayWeek: day.key === 'fri' ? currentFridayWeek : 1,

          fridayTemplateRotation,

          .filter(task => isSchoolTask(person, task))

  const timelineStart = 7 * 60;
  const timelineEnd = 17 * 60;

  const timelineStep = 5;
  const toTimelineStyle = (start, end) => {
    const safeStart = Math.max(timelineStart, Math.min(timelineEnd - 10, start ?? timelineStart));

  };
  const getPointerMinute = (clientX) => {

    if (!rect || rect.width <= 0) return timelineStart;

  };
  const startSchoolTaskDrag = (event, task, mode = 'move') => {

      try { event.currentTarget.setPointerCapture(event.pointerId); } catch {}
    }
    const shiftStart = timeToMin(builderShift[0]);
    const shiftEnd = timeToMin(builderShift[1]);
    const nextPreview = {

      originMinute: getPointerMinute(event.clientX),

  useEffect(() => {

      const minDuration = timelineStep;
      let nextStart = dragPreview.start;
      let nextEnd = dragPreview.end;
      if (dragPreview.mode === 'start') {
        const maxStart = Math.max(dragPreview.shiftStart, dragPreview.end - minDuration);
        nextStart = clamp(roundToStep(dragPreview.start + delta, timelineStep), dragPreview.shiftStart, maxStart);
      } else if (dragPreview.mode === 'end') {
        const minEnd = Math.min(dragPreview.shiftEnd, dragPreview.start + minDuration);
        nextEnd = clamp(roundToStep(dragPreview.end + delta, timelineStep), minEnd, dragPreview.shiftEnd);
      } else {
        const duration = Math.max(minDuration, dragPreview.end - dragPreview.start);
        const maxStart = Math.max(dragPreview.shiftStart, dragPreview.shiftEnd - duration);
        nextStart = clamp(roundToStep(dragPreview.start + delta, timelineStep), dragPreview.shiftStart, maxStart);
        nextEnd = nextStart + duration;
      }
      setDragPreview(prev => {
        if (!prev) return prev;
        const next = { ...prev, previewStart: nextStart, previewEnd: nextEnd };
        dragPreviewRef.current = next;
        return next;
      });
    };
    const finishDrag = () => {
      const latest = dragPreviewRef.current || dragPreview;
      const changed = latest.previewStart !== latest.start || latest.previewEnd !== latest.end;
      if (changed) {

          personId: latest.personId,
          dayKey: latest.dayKey,
          taskId: latest.taskId,
          patch: {
            start: latest.previewStart,
            end: latest.previewEnd,
            durationMinutes: Math.max(timelineStep, latest.previewEnd - latest.previewStart),
          },
        });
      }
      dragPreviewRef.current = null;
      setDragPreview(null);
    };
    window.addEventListener('pointermove', updatePreview);
    window.addEventListener('pointerup', finishDrag, { once: true });

  }, [dragPreview, onUpdateSchoolPosition]);
