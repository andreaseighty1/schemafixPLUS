      <div className="bg-white rounded-2xl shadow-2xl max-w-3xl w-full overflow-hidden">
        <div className="px-6 py-5 border-b border-stone-200">
          <p className="text-xs uppercase tracking-widest text-stone-500 mb-1">Välkommen till SchemaFIX</p>
          <h2 className="display-font text-3xl text-stone-800" style={{ letterSpacing: '-0.02em' }}>Välj hur du vill arbeta</h2>
          <p className="text-sm text-stone-600 mt-2">Du kan antingen låta appen hjälpa dig pussla schema eller använda den ovanpå ett befintligt schema. Det går att byta senare.</p>
        </div>
        <div className="px-6 py-5 space-y-4">
          <div className="grid md:grid-cols-2 gap-3">
            {[WORKFLOW_MODE_GENERATE, WORKFLOW_MODE_EXISTING].map(mode => {
              const meta = getWorkflowModeMeta(mode);
              const active = selectedMode === mode;
              return (
                <button
                  key={mode}
                  type="button"
                  onClick={() => setSelectedMode(mode)}
                  className={`text-left rounded-2xl p-4 transition ring-1 ${active ? 'bg-stone-800 text-white ring-stone-800 shadow-lg' : 'bg-stone-50 text-stone-800 ring-stone-200 hover:bg-stone-100'}`}
                >
                  <p className={`text-[10px] uppercase tracking-wider ${active ? 'text-stone-300' : 'text-stone-500'}`}>Arbetssätt</p>
                  <h3 className={`display-font text-xl mt-1 ${active ? 'text-white' : 'text-stone-800'}`}>{meta.shortLabel}</h3>
                  <p className={`text-sm mt-2 leading-relaxed ${active ? 'text-stone-200' : 'text-stone-600'}`}>{meta.description}</p>
                </button>
              );
            })}
          </div>

          <div className="rounded-2xl bg-stone-50 ring-1 ring-stone-200 p-4">
            <p className="text-xs uppercase tracking-wider text-stone-500 mb-2">Detta läge hjälper dig att:</p>
            <div className="grid md:grid-cols-3 gap-2">
              {selectedMeta.steps.map((step, idx) => (
                <div key={`${selectedMeta.id}-welcome-step-${idx}`} className="rounded-lg bg-white ring-1 ring-stone-200 px-3 py-2">
                  <p className="text-[10px] uppercase tracking-wider text-stone-400 mb-1">{idx + 1}</p>
                  <p className="text-sm text-stone-700">{step}</p>
                </div>
              ))}
            </div>
            <p className="text-xs text-stone-500 mt-3">Du får också hjälpbubblor över flikarna och en kort guide om du vill.</p>
          </div>
        </div>
        <div className="px-6 py-4 border-t border-stone-200 bg-stone-50 flex gap-2 justify-between flex-wrap">
          <button onClick={() => { onApplyMode(selectedMode); onClose(); }}
            className="px-4 py-2 text-sm rounded-lg text-stone-600 hover:bg-stone-100 transition">
            Fortsätt utan guide
          </button>
          <div className="flex gap-2 flex-wrap">
            <button onClick={onClose}
              className="px-4 py-2 text-sm rounded-lg text-stone-600 hover:bg-stone-100 transition">
              Stäng
            </button>
            <button onClick={() => onStartTour(selectedMode)}
              className="px-5 py-2 text-sm rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition flex items-center gap-2">
              Visa guide för detta läge <ArrowRight size={14} />
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function TourBubble({ step, mode, onNext, onClose }) {
  const steps = getWorkflowTour(mode);
  const cur = steps[step];
  const isLast = step === steps.length - 1;
  if (!cur) return null;
  return (
    <div className="fixed bottom-6 right-6 z-50 max-w-sm">
      <div className="bg-stone-800 text-white rounded-2xl shadow-2xl p-5">
        <div className="flex items-start justify-between mb-2 gap-3">
          <p className="display-font text-base" style={{ fontWeight: 500 }}>{cur.title}</p>
          <button onClick={onClose} className="text-stone-400 hover:text-white flex-shrink-0">
            <X size={16} />
          </button>
        </div>
        <p className="text-sm text-stone-300 mb-4 leading-relaxed">{cur.desc}</p>
        <div className="flex items-center justify-between gap-2">
          <div className="flex gap-1">
            {steps.map((_, i) => (
              <span key={i} className={`w-1.5 h-1.5 rounded-full ${i === step ? 'bg-white' : 'bg-stone-600'}`} />
            ))}
          </div>
          <button onClick={onNext}
            className="px-4 py-1.5 text-sm rounded-lg bg-white text-stone-900 hover:bg-stone-100 transition flex items-center gap-1.5">
            {isLast ? 'Klart' : 'Nästa'} {!isLast && <ArrowRight size={12} />}
          </button>
        </div>
      </div>
    </div>
  );
}

// -------- Alternatives Modal --------

function AlternativesModal({ alternatives, currentStaff, coverageScopes, fridayCycleWeeks, fridayTemplateRotation, departments, onApply, onClose }) {
  const [previewIdx, setPreviewIdx] = useState(0);
  const currentSummary = summarizeSchedule(currentStaff, coverageScopes, fridayCycleWeeks, fridayTemplateRotation);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(28, 25, 23, 0.5)' }} onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-5xl w-full max-h-[92vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="sticky top-0 bg-white border-b border-stone-200 px-6 py-4 flex items-center justify-between z-10">
          <div>
            <h2 className="display-font text-2xl text-stone-800">Tre schemaförslag</h2>
            <p className="text-xs text-stone-500 mt-0.5">Klicka på ett kort för att förhandsgranska, "Tillämpa" för att använda. Vardagar följer passbanken och fredag räknas med som snitt över rullen.</p>
          </div>
          <button onClick={onClose} className="text-stone-400 hover:text-stone-700"><X size={20} /></button>
        </div>

        <div className="p-6">
          {/* Comparison cards */}
          <div className="grid md:grid-cols-3 gap-3 mb-6">
            {alternatives.map((alt, i) => {
              const isSelected = previewIdx === i;
              const better = (a, b) => a < b ? 'text-emerald-700' : a > b ? 'text-orange-600' : 'text-stone-600';
              return (
                <button key={i} onClick={() => setPreviewIdx(i)}
                  className={`text-left rounded-xl p-4 transition ${isSelected ? 'bg-stone-800 text-white shadow-lg' : 'bg-stone-50 ring-1 ring-stone-200 hover:bg-stone-100'}`}>
                  <p className={`text-[10px] uppercase tracking-wider ${isSelected ? 'text-stone-300' : 'text-stone-500'}`}>Alternativ {i + 1}</p>
                  <h3 className={`display-font text-lg mt-1 ${isSelected ? 'text-white' : 'text-stone-800'}`}>{alt.label}</h3>
                  <p className={`text-xs mt-1 ${isSelected ? 'text-stone-300' : 'text-stone-500'}`}>{alt.desc}</p>
                  <div className="mt-3 pt-3 border-t border-stone-200/30 space-y-1 text-xs">
                    <div className="flex justify-between">
                      <span className={isSelected ? 'text-stone-300' : 'text-stone-500'}>För lite personal:</span>
                      <span className={isSelected ? 'text-white' : better(alt.summary.totalGaps, currentSummary.totalGaps)} style={{ fontWeight: 500 }}>
                        {alt.summary.totalGaps} {alt.summary.totalGapMinutes > 0 && `(${alt.summary.totalGapMinutes} min)`}
                      </span>
                    </div>
                    <div className="flex justify-between">
                      <span className={isSelected ? 'text-stone-300' : 'text-stone-500'}>Över max:</span>
                      <span className={isSelected ? 'text-white' : better(alt.summary.totalOver, currentSummary.totalOver)} style={{ fontWeight: 500 }}>
                        {alt.summary.totalOver} {alt.summary.totalOverMinutes > 0 && `(${alt.summary.totalOverMinutes} min)`}
                      </span>
                    </div>
                    <div className="flex justify-between">
                      <span className={isSelected ? 'text-stone-300' : 'text-stone-500'}>Pers. m. tim-avvik.:</span>
                      <span className={isSelected ? 'text-white' : better(alt.summary.peopleOff, currentSummary.peopleOff)} style={{ fontWeight: 500 }}>
                        {alt.summary.peopleOff} pers.
                      </span>
                    </div>
                    <div className="flex justify-between">
                      <span className={isSelected ? 'text-stone-300' : 'text-stone-500'}>Total tim-avvik.:</span>
                      <span className={isSelected ? 'text-white' : better(alt.summary.totalHourDev, currentSummary.totalHourDev)} style={{ fontWeight: 500 }}>
                        {minToHM(alt.summary.totalHourDev)}
                      </span>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>

          {/* Comparison vs current */}
          <div className="bg-stone-50 rounded-lg p-3 mb-6 text-xs text-stone-600 flex items-center gap-3 flex-wrap">
            <span className="text-stone-500">Nuvarande schema till jämförelse:</span>
            <span><span style={{ fontWeight: 500 }}>{currentSummary.totalGaps}</span> gap</span>
            <span>·</span>
            <span><span style={{ fontWeight: 500 }}>{currentSummary.totalOver}</span> över max</span>
            <span>·</span>
            <span><span style={{ fontWeight: 500 }}>{currentSummary.peopleOff}</span> personer m. tim-avvikelse</span>
            <span>·</span>
            <span>tot. <span style={{ fontWeight: 500 }}>{minToHM(currentSummary.totalHourDev)}</span> avvikelse</span>
          </div>

          {/* Preview of selected */}
          <PreviewSchedule staff={alternatives[previewIdx].staff} originalStaff={currentStaff} coverageScopes={coverageScopes} departments={departments} />

          <div className="flex justify-end gap-2 mt-6">
            <button onClick={onClose} className="px-4 py-2 text-sm rounded-lg text-stone-600 hover:bg-stone-100 transition">Avbryt</button>
            <button onClick={() => onApply(alternatives[previewIdx])}
              className="px-5 py-2 text-sm rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition flex items-center gap-2">
              <Wand2 size={14} />Tillämpa alternativ {previewIdx + 1}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function PreviewSchedule({ staff, originalStaff, coverageScopes, departments }) {
  const origMap = Object.fromEntries(originalStaff.map(p => [p.id, p]));
  return (
    <div className="space-y-4">
      <p className="text-xs uppercase tracking-wider text-stone-500">Förhandsgranskning · ändringar markerade i färg</p>
      {DAY_META.map(d => {
        const present = staff.filter(s => s.sched[d.key] && !(s.daysOff || []).includes(d.key))
          .map(s => ({ ...s, startMin: timeToMin(s.sched[d.key][0]), endMin: timeToMin(s.sched[d.key][1]) }))
          .sort((a, b) => a.startMin - b.startMin);
        // Hoppa över fredag om ingen i passbank-läge har en fredagstid satt –
        // då finns inget vettigt att visa här (legacy-fredag visas inte i denna preview).
        if (d.key === 'fri' && present.length === 0) return null;
        const gaps = coverageScopes.reduce((sum, scope) => {
          const slots = computeSlots(staff, d.key, scope.slots, scope);
          return sum + slots.filter(s => s.count < s.min).length;
        }, 0);
        const overs = coverageScopes.reduce((sum, scope) => {
          const slots = computeSlots(staff, d.key, scope.slots, scope);
          return sum + slots.filter(s => s.count > s.max).length;
        }, 0);
        return (
          <div key={d.key} className="bg-white ring-1 ring-stone-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <p className="text-sm text-stone-700" style={{ fontWeight: 500 }}>{d.label}</p>
              <span className={`text-[10px] px-2 py-0.5 rounded ${gaps > 0 ? 'bg-orange-50 text-orange-700' : overs > 0 ? 'bg-amber-50 text-amber-700' : 'bg-emerald-50 text-emerald-700'}`}>
                {gaps > 0 ? `${gaps} gap` : overs > 0 ? `${overs} över max` : 'Täcker krav'}
              </span>
            </div>
            <div className="space-y-0.5">
              {present.map(p => {
                const orig = origMap[p.id];
                const origSh = orig.sched[d.key];
                const changed = !origSh || origSh[0] !== p.sched[d.key][0] || origSh[1] !== p.sched[d.key][1];
                const dept = getDept(p.deptId, departments);
                const soft = softColor(dept.color);
                return (
                  <div key={p.id} className="flex items-center text-xs">
                    <span className="w-24 text-right pr-2 text-stone-700 truncate">{p.name}</span>
                    <div className="flex-1 relative h-5 bg-stone-50 rounded">
                      <div className="absolute h-full rounded flex items-center px-1.5"
                        style={{ left: `${pctFromMin(p.startMin)}%`, width: `${pctFromMin(p.endMin) - pctFromMin(p.startMin)}%`,
                          backgroundColor: changed ? '#fef3c7' : soft, borderLeft: `2px solid ${changed ? '#d97706' : dept.color}` }}>
                        <span className="text-[10px] truncate text-stone-700">
                          {p.sched[d.key][0]}–{p.sched[d.key][1]}
                          {changed && <span className="text-amber-700 ml-1">?</span>}
                        </span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}


// ----- Mount -----
const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(React.createElement(FritidsSchemaApp));

</script>
