// ==================== EXCEL-EXPORT (Personligt schema) ====================
// Exporterar en persons hela vecka som en xlsx-fil. Layout per spec:
// - 7 kolumner (A=tid, B-F=Måndag-Fredag, G=tid)
// - Övre rader: namn, läsår, befattning, sysselsättningsgrad
// - Shift- och arbetstidsrader
// - Tidsgrid 06:00-18:00 i 15-minuters steg
// - Aktiviteter fyller cellerna med typ-färg, första cellen visar etikett+tid
// Färgerna kommer från getAssignmentColor() — samma palett som tidslinjen i appen.

const PS_EXPORT_DAYS = [
  { key: 'mon', label: 'Måndag', col: 1 },  // B
  { key: 'tue', label: 'Tisdag', col: 2 },  // C
  { key: 'wed', label: 'Onsdag', col: 3 },  // D
  { key: 'thu', label: 'Torsdag', col: 4 }, // E
  { key: 'fri', label: 'Fredag', col: 5 },  // F
];
const PS_EXPORT_START_MIN = 6 * 60;  // 06:00
const PS_EXPORT_END_MIN = 18 * 60;   // 18:00
const PS_EXPORT_STEP = 15;           // 15 min per rad

function getCurrentSchoolYearLabel(now = new Date()) {
  // I Sverige börjar läsåret i augusti. Före aug -> föreg-aktuell, från aug -> aktuell-nästa.
  const year = now.getFullYear();
  const month = now.getMonth(); // 0-11
  const start = month >= 7 ? year : year - 1;
  return `${start}-${start + 1}`;
}

function sanitizeForFilename(value) {
  // Tar bort tecken som krånglar i filnamn på Windows/macOS och normaliserar mellanslag.
  return String(value || '')
    .replace(/[\\/:*?"<>|]/g, '')
    .replace(/\s+/g, '_')
    .replace(/_+/g, '_')
    .replace(/^_+|_+$/g, '')
    || 'Schema';
}

function hexToArgb(hex) {
  // xlsx-js-style vill ha färger som ARGB (8 tecken hex utan #).
  const clean = String(hex || '').replace('#', '').toUpperCase();
  if (clean.length === 6) return 'FF' + clean;
  if (clean.length === 8) return clean;
  return 'FF6B7280'; // fallback grå
}

function getContrastColor(hex) {
  // Räkna fram svart eller vit text utifrån bakgrundens luminans.
  // Förenklat: medelvärde av RGB > 140 -> svart text, annars vit.
  const clean = String(hex || '').replace('#', '');
  if (clean.length < 6) return 'FF1C1917';
  const r = parseInt(clean.slice(0, 2), 16);
  const g = parseInt(clean.slice(2, 4), 16);
  const b = parseInt(clean.slice(4, 6), 16);
  const brightness = (r * 299 + g * 587 + b * 114) / 1000;
  return brightness > 150 ? 'FF1C1917' : 'FFFFFFFF';
}

function minutesToCellOffset(min) {
  // Konvertera klockslag i minuter till radindex i tidsgriden (0-baserad inom griden).
  return Math.round((min - PS_EXPORT_START_MIN) / PS_EXPORT_STEP);
}

function computeWorkMinutesForDay(shift) {
  // Beräknad arbetstid per dag: passlängd minus 30 min rast om passet > 5 h.
  // Matchar weeklyMinutes-logiken som används i resten av appen.
  if (!shift || !shift[0] || !shift[1]) return 0;
  const start = timeToMin(shift[0]);
  const end = timeToMin(shift[1]);
  if (start == null || end == null || end <= start) return 0;
  const total = end - start;
  return total > 300 ? total - 30 : total;
}

function exportPersonalScheduleToXlsx({ person, assignments, fridayOptions }) {
  if (!person) { alert('Välj en person först.'); return; }
  const XLSX = window.XLSX;
  if (!XLSX) { alert('Excel-biblioteket kunde inte laddas. Kontrollera nätverksanslutningen och försök igen.'); return; }

  // ----- Bygg dag-data: shift, uppdrag, arbetstid per dag -----
  const dayData = PS_EXPORT_DAYS.map(d => {
    const fridayOpt = d.key === 'fri'
      ? { ...fridayOptions, fridayWeek: fridayOptions?.currentFridayWeek || 1 }
      : { ...fridayOptions, fridayWeek: 1 };
    const shift = getShiftForDay(person, d.key, fridayOpt);
    const tasks = getAssignmentsForDay(assignments, person.id, d.key, fridayOpt);
    return {
      ...d,
      shift,
      tasks,
      workMin: computeWorkMinutesForDay(shift),
    };
  });

  // ----- Cellstilar -----
  const thinBorder = { style: 'thin', color: { rgb: 'FFE7E5E4' } };
  const borderAll = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
  const headerStyle = {
    font: { bold: true, sz: 14, color: { rgb: 'FF1C1917' } },
    alignment: { vertical: 'center' },
  };
  const labelStyle = {
    font: { bold: true, sz: 10, color: { rgb: 'FF57534E' } },
    alignment: { vertical: 'center' },
  };
  const valueStyle = {
    font: { sz: 11, color: { rgb: 'FF1C1917' } },
    alignment: { vertical: 'center' },
  };
  const dayHeaderStyle = {
    font: { bold: true, sz: 11, color: { rgb: 'FFFFFFFF' } },
    fill: { patternType: 'solid', fgColor: { rgb: 'FF44403C' } },
    alignment: { horizontal: 'center', vertical: 'center' },
    border: borderAll,
  };
  const shiftRowStyle = {
    font: { sz: 10, color: { rgb: 'FF1C1917' } },
    fill: { patternType: 'solid', fgColor: { rgb: 'FFF5F5F4' } },
    alignment: { horizontal: 'center', vertical: 'center' },
    border: borderAll,
  };
  const workRowStyle = {
    font: { sz: 10, color: { rgb: 'FF1C1917' }, italic: true },
    fill: { patternType: 'solid', fgColor: { rgb: 'FFFAFAF9' } },
    alignment: { horizontal: 'center', vertical: 'center' },
    border: borderAll,
  };
  const timeAnchorStyle = {
    font: { sz: 9, color: { rgb: 'FF78716C' } },
    fill: { patternType: 'solid', fgColor: { rgb: 'FFFAFAF9' } },
    alignment: { horizontal: 'center', vertical: 'center' },
    border: borderAll,
  };
  const timeAnchorHourStyle = {
    font: { sz: 9, color: { rgb: 'FF1C1917' }, bold: true },
    fill: { patternType: 'solid', fgColor: { rgb: 'FFF5F5F4' } },
    alignment: { horizontal: 'center', vertical: 'center' },
    border: borderAll,
  };
  const emptyCellStyle = {
    fill: { patternType: 'solid', fgColor: { rgb: 'FFFFFFFF' } },
    border: borderAll,
  };

  // ----- Bygg cell-matris -----
  // SheetJS aoa_to_sheet vill ha rader som arrayer. Vi bygger upp celler manuellt
  // (objekt {v, s, t}) för full kontroll över stilen.
  const rows = []; // varje element: array av cellobjekt eller null

  // Rad 1: Titel "Personligt schema" merged över A-G
  rows.push([{ v: 'Personligt schema', s: headerStyle, t: 's' }, null, null, null, null, null, null]);
  // Rad 2: Namn
  rows.push([
    { v: 'Namn', s: labelStyle, t: 's' },
    { v: person.name || '', s: valueStyle, t: 's' },
    null, null, null, null, null,
  ]);
  // Rad 3: Läsår
  rows.push([
    { v: 'Läsår', s: labelStyle, t: 's' },
    { v: getCurrentSchoolYearLabel(), s: valueStyle, t: 's' },
    null, null, null, null, null,
  ]);
  // Rad 4: Befattning
  rows.push([
    { v: 'Befattning', s: labelStyle, t: 's' },
    { v: getStaffRoleLabel(person.employmentRole) || person.role || '', s: valueStyle, t: 's' },
    null, null, null, null, null,
  ]);
  // Rad 5: Sysselsättningsgrad
  const percent = (person.percent != null && person.percent !== '') ? `${person.percent} %` : '';
  rows.push([
    { v: 'Sysselsättningsgrad', s: labelStyle, t: 's' },
    { v: percent, s: valueStyle, t: 's' },
    null, null, null, null, null,
  ]);
  // Rad 6: tom
  rows.push([null, null, null, null, null, null, null]);
  // Rad 7: dag-rubriker
  rows.push([
    { v: '', s: emptyCellStyle, t: 's' },
    ...PS_EXPORT_DAYS.map(d => ({ v: d.label, s: dayHeaderStyle, t: 's' })),
    { v: '', s: emptyCellStyle, t: 's' },
  ]);
  // Rad 8: arbetspass per dag
  rows.push([
    { v: 'Arbetspass', s: labelStyle, t: 's' },
    ...dayData.map(d => ({
      v: d.shift ? `${d.shift[0]}–${d.shift[1]}` : 'Ledig',
      s: shiftRowStyle,
      t: 's',
    })),
    { v: 'Arbetspass', s: labelStyle, t: 's' },
  ]);
  // Rad 9: arbetstid per dag (beräknad)
  rows.push([
    { v: 'Arbetstid', s: labelStyle, t: 's' },
    ...dayData.map(d => ({
      v: d.workMin > 0 ? minToHM(d.workMin) : '',
      s: workRowStyle,
      t: 's',
    })),
    { v: 'Arbetstid', s: labelStyle, t: 's' },
  ]);
  // Rad 10: tom separator
  rows.push([null, null, null, null, null, null, null]);

  // ----- Tidsgrid -----
  // Antal grid-rader: (PS_EXPORT_END_MIN - PS_EXPORT_START_MIN) / PS_EXPORT_STEP
  const gridRowCount = (PS_EXPORT_END_MIN - PS_EXPORT_START_MIN) / PS_EXPORT_STEP;
  const gridStartRowIndex = rows.length; // 0-baserat radindex i `rows`

  // Steg 1: bygg tomma grid-rader med tid-ankare i A och G.
  for (let i = 0; i < gridRowCount; i++) {
    const min = PS_EXPORT_START_MIN + i * PS_EXPORT_STEP;
    const isHour = (min % 60) === 0;
    const timeLabel = minToTime(min);
    const anchorStyle = isHour ? timeAnchorHourStyle : timeAnchorStyle;
    rows.push([
      { v: isHour ? timeLabel : '', s: anchorStyle, t: 's' },
      { v: '', s: emptyCellStyle, t: 's' },
      { v: '', s: emptyCellStyle, t: 's' },
      { v: '', s: emptyCellStyle, t: 's' },
      { v: '', s: emptyCellStyle, t: 's' },
      { v: '', s: emptyCellStyle, t: 's' },
      { v: isHour ? timeLabel : '', s: anchorStyle, t: 's' },
    ]);
  }

  // Steg 2: lägg ut aktiviteter i sina respektive dag-kolumner.
  // Spara merge-info för att slå ihop celler för varje aktivitet.
  const merges = [];
  // A1:G1 - rubrik
  merges.push({ s: { r: 0, c: 0 }, e: { r: 0, c: 6 } });

  for (const day of dayData) {
    for (const task of day.tasks) {
      if (!task || task.start == null || task.end == null) continue;
      // Klipp av aktiviteter som ligger utanför 06-18.
      const start = Math.max(PS_EXPORT_START_MIN, task.start);
      const end = Math.min(PS_EXPORT_END_MIN, task.end);
      if (end <= start) continue;
      const startOffset = minutesToCellOffset(start);
      const endOffset = minutesToCellOffset(end);
      const rowStart = gridStartRowIndex + startOffset;
      const rowEnd = gridStartRowIndex + endOffset - 1;
      if (rowEnd < rowStart) continue;
      const meta = getAssignmentTypeMeta(task.type);
      const color = getAssignmentColor(task.type); // använder eventuell override från wizard
      const argb = hexToArgb(color);
      const textArgb = getContrastColor(color);
      const label = task.label || meta.label;
      const timeRange = `${minToTime(task.start)}–${minToTime(task.end)}`;
      const cellText = `${label}\n${timeRange}`;
      // Fyll alla celler i blocket med färgen.
      for (let r = rowStart; r <= rowEnd; r++) {
        // Säkerställ att row finns i rows[]
        if (!rows[r]) {
          rows[r] = [null, null, null, null, null, null, null];
        }
        const cell = {
          v: r === rowStart ? cellText : '',
          s: {
            fill: { patternType: 'solid', fgColor: { rgb: argb } },
            font: { sz: 10, bold: true, color: { rgb: textArgb } },
            alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
            border: borderAll,
          },
          t: 's',
        };
        rows[r][day.col] = cell;
      }
      // Merga celler i blocket om det spänner flera rader.
      if (rowEnd > rowStart) {
        merges.push({ s: { r: rowStart, c: day.col }, e: { r: rowEnd, c: day.col } });
      }
    }
  }

  // ----- Skapa sheet -----
  // Konvertera till AOA-formen som SheetJS förstår.
  const aoa = rows.map(row => row.map(cell => (cell ? cell.v : null)));
  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // Lägg på cellstilar genom att stoppa hela cell-objekten i ws.
  for (let r = 0; r < rows.length; r++) {
    const row = rows[r] || [];
    for (let c = 0; c < 7; c++) {
      const cell = row[c];
      if (!cell) continue;
      const addr = XLSX.utils.encode_cell({ r, c });
      ws[addr] = { v: cell.v, s: cell.s, t: cell.t || 's' };
    }
  }

  // Sätt kolumnbredder. A och G smala (tid), B-F bredare.
  ws['!cols'] = [
    { wch: 7 },  // A: tid
    { wch: 22 }, // B-F: dag
    { wch: 22 },
    { wch: 22 },
    { wch: 22 },
    { wch: 22 },
    { wch: 7 },  // G: tid
  ];

  // Sätt radhöjder. Header-rader normala, grid-rader lite kompaktare.
  ws['!rows'] = [];
  ws['!rows'][0] = { hpt: 24 };          // titel
  for (let r = 1; r <= 4; r++) ws['!rows'][r] = { hpt: 18 }; // metafält
  ws['!rows'][6] = { hpt: 22 };          // dag-rubriker
  for (let r = 7; r <= 8; r++) ws['!rows'][r] = { hpt: 18 }; // shift/arbetstid
  // Grid-rader: 15 punkter (kompakt)
  for (let i = 0; i < gridRowCount; i++) {
    ws['!rows'][gridStartRowIndex + i] = { hpt: 15 };
  }

  // Merges
  ws['!merges'] = merges;

  // Skapa workbook och spara.
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Personligt schema');

  // Filnamn enligt spec: {Förnamn}_{Efternamn}_Personligt_Schema_{år}-{år}.xlsx
  const nameParts = String(person.name || 'Person').trim().split(/\s+/);
  const firstName = sanitizeForFilename(nameParts[0] || 'Person');
  const lastName = sanitizeForFilename(nameParts.slice(1).join(' ') || '');
  const yearLabel = getCurrentSchoolYearLabel();
  const filename = lastName
    ? `${firstName}_${lastName}_Personligt_Schema_${yearLabel}.xlsx`
    : `${firstName}_Personligt_Schema_${yearLabel}.xlsx`;

  try {
    XLSX.writeFile(wb, filename);
  } catch (err) {
    console.error('Kunde inte skriva Excel-fil:', err);
    alert('Kunde inte exportera till Excel. Försök igen, eller kontrollera webbläsarens nedladdningsinställningar.');
  }
}

// ==================== EXCEL-IMPORT (Personligt schema) ====================
// Läser skolans personliga Excel-scheman och översätter dem till samma
// assignment-format som Personligt schema, Uppdrag, Skola och Drift använder.

function normalizeExcelText(value) {
  return String(value == null ? '' : value)
    .replace(/\r/g, '\n')
    .replace(/[ \t]+/g, ' ')
    .replace(/\n{2,}/g, '\n')
    .trim();
}

function foldText(value) {
  return normalizeExcelText(value)
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function parseImportTimeValue(value) {
  if (typeof value === 'number' && Number.isFinite(value)) {
    if (value >= 0 && value < 1) return roundToStep(value * 24 * 60);
    if (value >= 0 && value <= 24) return roundToStep(value * 60);
  }
  const text = normalizeExcelText(value).replace(/[–—]/g, '-');
  const match = text.match(/\b(\d{1,2})[:.](\d{2})\b/);
  if (!match) return null;
  const hours = Number(match[1]);
  const minutes = Number(match[2]);
  if (!Number.isFinite(hours) || !Number.isFinite(minutes) || hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
  return hours * 60 + minutes;
}

function parseImportTimeRange(value) {
  const text = normalizeExcelText(value).replace(/[–—]/g, '-');
  const match = text.match(/\b(\d{1,2})[:.](\d{2})\s*(?:-|(?=\d{1,2}[:.]\d{2}))\s*(\d{1,2})(?:[:.-](\d{2}))\b/);
  if (!match) return null;
  const start = Number(match[1]) * 60 + Number(match[2]);
  const end = Number(match[3]) * 60 + Number(match[4]);
  if (!Number.isFinite(start) || !Number.isFinite(end) || start < 0 || end <= start || end > 24 * 60) return null;
  return { start: roundToStep(start), end: roundToStep(end) };
}

function cleanImportLabel(value) {
  return normalizeExcelText(value)
    .replace(/\b\d{1,2}[:.]\d{2}\s*(?:[-–—]|(?=\d{1,2}[:.]\d{2}))\s*\d{1,2}(?:[:.-]\d{2})\b/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function getImportDayKey(value) {
  const text = foldText(value);
  if (!text) return '';
  if (text.includes('mandag') || text.includes('man') || text.includes('mon')) return 'mon';
  if (text.includes('tisdag') || text.includes('tis') || text.includes('tue')) return 'tue';
  if (text.includes('onsdag') || text.includes('ons') || text.includes('wed')) return 'wed';
  if (text.includes('torsdag') || text.includes('tor') || text.includes('thu')) return 'thu';
  if (text.includes('fredag') || text.includes('fre') || text.includes('fri')) return 'fri';
  return '';
}

function inferImportedAssignmentType(label, colorHex = '') {
  const text = foldText(label);
  if (!text) return 'other';
  if (text.includes('egen rast') || text === 'rast' || text.includes('rast 30') || text.includes('paus')) return 'break';
  if (text.includes('ped') && text.includes('lunch')) return 'pedLunch';
  if (text.includes('rastvard') || text.includes('rastv') || text.includes('rastkul')) return 'yard';
  if (text.includes('samverkan')) return 'collab';
  if (text.includes('studie')) return 'studySupport';
  if (text.includes('resurs')) return 'resource';
  if (text.includes('planering') || text.includes('egen plan') || text === 'plan' || text.includes('stalltid') || text === 'fth' || text.includes('fth ')) return 'planning';
  if (text.includes('konferens') || text.includes('konferans') || text.includes('konf') || text.includes('mote') || text.includes('arbetslag') || text.includes('utv. grupp')) return 'meeting';
  if (text.includes('fritids') || text.includes('skolgard')) return 'fritids';
  if (
    /\b(sv|ma|no|so|eng)\b/.test(text) ||
    text.includes('svenska') || text.includes('matematik') || text.includes('engelska') ||
    text.includes('slojd') || text.includes('idrott') || text.includes('bild') || text.includes('musik') ||
    text.includes('gympa') || text.includes('lektion')
  ) return 'lesson';
  return colorHex ? 'other' : 'other';
}

function defaultImportedDuration(type) {
  if (type === 'break') return 30;
  if (type === 'pedLunch') return 20;
  if (type === 'yard') return 20;
  if (type === 'lesson') return 40;
  if (type === 'meeting' || type === 'planning') return 60;
  return 30;
}

function isIgnorableImportText(value) {
  const text = foldText(value);
  return !text || text.includes('arb.tid') || text === 'ledig' || text === 'rullande' || !!getImportDayKey(text);
}

function isImportMetadataOnlyLabel(value) {
  const text = foldText(value).replace(/\s+/g, '');
  if (!text) return true;
  if (/^s\.?\d+[a-z]?$/.test(text)) return true;       // sal/rum, t.ex. s209 eller s.305
  if (/^\d+\s*(min)?$/.test(text)) return true;         // längdnotering, t.ex. 50 eller 50min
  if (/^\d+[a-z]?$/.test(text)) return true;            // lös klass- eller längdrad, t.ex. 6b/70
  if (/^\d+\.\d+$/.test(text)) return true;             // gruppnotering, t.ex. 6.2
  if (/^(hagie|haige|linea)$/.test(text)) return true;  // vanliga plats-/personstöd i källschemat
  return false;
}

function getImportLabelParts(ws, startRow, endRow, col) {
  const parts = [];
  for (let r = startRow; r <= endRow; r += 1) {
    const raw = getImportCellText(ws, r, col);
    if (!raw || parseImportTimeRange(raw) || isIgnorableImportText(raw)) continue;
    const label = cleanImportLabel(raw);
    if (!label || parseImportTimeValue(label) != null) continue;
    parts.push({ row: r, label, metadataOnly: isImportMetadataOnlyLabel(label) });
  }
  return parts;
}

function getImportCellText(ws, r, c) {
  const XLSX = window.XLSX;
  const cell = ws[XLSX.utils.encode_cell({ r, c })];
  if (!cell) return '';
  return normalizeExcelText(cell.w != null ? cell.w : cell.v);
}

function getImportCellFillHex(ws, r, c) {
  const XLSX = window.XLSX;
  const cell = ws[XLSX.utils.encode_cell({ r, c })];
  const raw = cell?.s?.fill?.fgColor?.rgb || cell?.s?.fgColor?.rgb || cell?.s?.fill?.bgColor?.rgb || '';
  const clean = String(raw || '').replace(/^FF/i, '').replace('#', '').slice(-6);
  return /^[0-9a-f]{6}$/i.test(clean) ? `#${clean.toUpperCase()}` : '';
}

function findNearbyImportTimeRange(ws, row, col, usedRows = new Set()) {
  const same = parseImportTimeRange(getImportCellText(ws, row, col));
  if (same && !usedRows.has(row)) return { ...same, sourceRow: row };
  for (let offset = 1; offset <= 3; offset += 1) {
    const previous = parseImportTimeRange(getImportCellText(ws, row - offset, col));
    if (previous && !usedRows.has(row - offset)) return { ...previous, sourceRow: row - offset };
  }
  for (let offset = 1; offset <= 2; offset += 1) {
    const next = parseImportTimeRange(getImportCellText(ws, row + offset, col));
    if (next && !usedRows.has(row + offset)) return { ...next, sourceRow: row + offset };
  }
  return null;
}

function findPersonalScheduleHeader(ws, range) {
  for (let r = range.s.r; r <= Math.min(range.e.r, range.s.r + 20); r += 1) {
    const dayCols = {};
    const dayVariants = {};
    for (let c = range.s.c; c <= range.e.c; c += 1) {
      const dayKey = getImportDayKey(getImportCellText(ws, r, c));
      if (dayKey) {
        if (!dayVariants[dayKey]) dayVariants[dayKey] = [];
        dayVariants[dayKey].push({ col: c, label: getImportCellText(ws, r, c) || getDayMeta(dayKey).label });
        if (!dayCols[dayKey]) dayCols[dayKey] = c;
      }
    }
    if (Object.keys(dayCols).length >= 3) {
      const firstDayCol = Math.min(...Object.values(dayCols));
      return { row: r, dayCols, dayVariants, timeCol: Math.max(range.s.c, firstDayCol - 1) };
    }
  }
  return null;
}

function buildImportRowTimeReader(ws, range, timeCol) {
  const anchors = [];
  for (let r = range.s.r; r <= range.e.r; r += 1) {
    const minute = parseImportTimeValue(getImportCellText(ws, r, timeCol));
    if (minute != null) anchors.push({ row: r, minute });
  }
  anchors.sort((a, b) => a.row - b.row);
  const medianStep = (() => {
    const steps = [];
    for (let i = 1; i < anchors.length; i += 1) {
      const rowDiff = anchors[i].row - anchors[i - 1].row;
      const minDiff = anchors[i].minute - anchors[i - 1].minute;
      if (rowDiff > 0 && minDiff > 0) steps.push(minDiff / rowDiff);
    }
    if (steps.length === 0) return 15;
    return steps.sort((a, b) => a - b)[Math.floor(steps.length / 2)] || 15;
  })();
  return (row) => {
    const exact = anchors.find(anchor => anchor.row === row);
    if (exact) return exact.minute;
    let prev = null;
    let next = null;
    for (const anchor of anchors) {
      if (anchor.row < row) prev = anchor;
      if (anchor.row > row) { next = anchor; break; }
    }
    if (prev && next && next.row > prev.row) {
      const ratio = (row - prev.row) / (next.row - prev.row);
      return roundToStep(prev.minute + ratio * (next.minute - prev.minute));
    }
    if (prev) return roundToStep(prev.minute + (row - prev.row) * medianStep);
    return null;
  };
}

function findImportStopRow(ws, range, headerRow) {
  for (let r = headerRow + 8; r <= range.e.r; r += 1) {
    const rowText = [];
    for (let c = range.s.c; c <= range.e.c; c += 1) {
      const text = foldText(getImportCellText(ws, r, c));
      if (text) rowText.push(text);
    }
    const joined = rowText.join(' ');
    if (/\b(sign|efternamn|fornamn|personnummer|adress|telefon|anstalld som)\b/.test(joined)) {
      return r - 1;
    }
  }
  return range.e.r;
}

function parsePersonalScheduleImportDay(ws, range, header, stopRow, day, variant, rowToMinute, file) {
  const col = variant.col;
  const dayResult = { shift: null, tasks: [] };
  const warnings = [];
  let ignoredMetadataRows = 0;
  let ignoredTextRows = 0;
  const entries = [];
  let lastRangeRow = header.row;

  for (let r = header.row + 1; r <= stopRow; r += 1) {
    const raw = getImportCellText(ws, r, col);
    const text = normalizeExcelText(raw);
    if (!text) continue;
    if (isIgnorableImportText(text)) continue;

    const explicitRange = parseImportTimeRange(text);
    if (!explicitRange) {
      const label = cleanImportLabel(text);
      if (label && parseImportTimeValue(label) == null) {
        if (isImportMetadataOnlyLabel(label) || r - lastRangeRow <= 16) ignoredMetadataRows += 1;
        else ignoredTextRows += 1;
      }
      continue;
    }

    lastRangeRow = r;
    if (explicitRange.end - explicitRange.start < 10) {
      warnings.push(`${day.label}: hoppade över ${minToTime(explicitRange.start)}–${minToTime(explicitRange.end)} eftersom blocket var kortare än 10 minuter.`);
      continue;
    }

    const labelEndRow = (() => {
      let endRow = r;
      for (let scan = r + 1; scan <= stopRow; scan += 1) {
        const scanMinute = rowToMinute(scan);
        const scanText = getImportCellText(ws, scan, col);
        if (scanText && parseImportTimeRange(scanText)) break;
        if (scanMinute != null && scanMinute >= explicitRange.end) break;
        endRow = scan;
      }
      return endRow;
    })();
    const inlineLabel = cleanImportLabel(text);
    const parts = getImportLabelParts(ws, r + 1, labelEndRow, col);
    const allLabels = [
      ...(inlineLabel && parseImportTimeValue(inlineLabel) == null ? [{ row: r, label: inlineLabel, metadataOnly: isImportMetadataOnlyLabel(inlineLabel) }] : []),
      ...parts,
    ];
    const primary = allLabels.find(part => !part.metadataOnly) || allLabels[0];
    if (!primary || isImportMetadataOnlyLabel(primary.label)) {
      ignoredMetadataRows += Math.max(1, allLabels.length);
      continue;
    }

    const detailLabels = allLabels
      .filter(part => part !== primary)
      .map(part => part.label)
      .filter(Boolean);
    const typeSource = [primary.label, ...detailLabels].join(' ');
    const type = inferImportedAssignmentType(typeSource, getImportCellFillHex(ws, r, col));
    entries.push({
      id: createAssignmentId(),
      type,
      label: primary.label,
      start: explicitRange.start,
      end: explicitRange.end,
      durationMinutes: explicitRange.end - explicitRange.start,
      target: detailLabels.join(' · '),
      notes: file?.name ? `Importerad från ${file.name}` : 'Importerad från Excel',
      mustCover: assignmentRequiresCoverByDefault(type),
      releaseForCover: assignmentReleaseDefault(type),
      breakFlexibility: defaultBreakFlexibility(type),
      schoolRole: 'owner',
    });
  }

  dayResult.tasks = sortAssignments(entries.map(task => normalizeAssignment(task)).filter(Boolean));
  if (dayResult.tasks.length > 0) {
    const minStart = Math.min(...dayResult.tasks.map(task => task.start));
    const maxEnd = Math.max(...dayResult.tasks.map(task => task.end));
    dayResult.shift = [minToTime(minStart), minToTime(maxEnd)];
    warnings.push(`${day.label}: arbetspass föreslogs från första till sista importerade blocket (${dayResult.shift[0]}–${dayResult.shift[1]}).`);
  }
  if (ignoredMetadataRows > 0) warnings.push(`${day.label}: ${ignoredMetadataRows} fortsättnings-/metadatarader ignorerades, t.ex. rum, grupp eller minutnotering.`);
  if (ignoredTextRows > 0) warnings.push(`${day.label}: ${ignoredTextRows} textrader utan tydligt tidsintervall hoppades över.`);
  return {
    ...dayResult,
    sourceLabel: variant.label || day.label,
    sourceColumn: col,
    warnings,
  };
}

function readPersonalScheduleExcelFile(file) {
  return new Promise((resolve, reject) => {
    const XLSX = window.XLSX;
    if (!XLSX) {
      reject(new Error('Excel-biblioteket kunde inte laddas.'));
      return;
    }
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Kunde inte läsa filen.'));
    reader.onload = () => {
      try {
        const wb = XLSX.read(reader.result, { type: 'array', cellStyles: true, cellDates: false });
        const sheetName = wb.SheetNames?.[0];
        const ws = sheetName ? wb.Sheets[sheetName] : null;
        if (!ws || !ws['!ref']) throw new Error('Filen saknar läsbart kalkylblad.');
        const range = XLSX.utils.decode_range(ws['!ref']);
        const header = findPersonalScheduleHeader(ws, range);
        if (!header) throw new Error('Hittade ingen rad med måndag-fredag.');
        const rowToMinute = buildImportRowTimeReader(ws, range, header.timeCol);
        const stopRow = findImportStopRow(ws, range, header.row);
        const days = {};
        const dayVariants = {};
        const warnings = [];
        const duplicateDays = [];

        for (const day of PS_EXPORT_DAYS) {
          const variants = header.dayVariants?.[day.key] || [];
          if (variants.length === 0) continue;
          dayVariants[day.key] = variants.map(variant => {
            const parsed = parsePersonalScheduleImportDay(ws, range, header, stopRow, day, variant, rowToMinute, file);
            warnings.push(...parsed.warnings);
            return parsed;
          });
          days[day.key] = dayVariants[day.key][0];
          if (variants.length > 1) {
            duplicateDays.push({
              dayKey: day.key,
              dayLabel: day.label,
              options: dayVariants[day.key].map((parsed, idx) => ({
                index: idx,
                label: parsed.sourceLabel,
                shift: parsed.shift,
                taskCount: parsed.tasks.length,
              })),
            });
          }
        }

        const possibleName = normalizeExcelText(getImportCellText(ws, header.row - 1, 0) || getImportCellText(ws, header.row - 1, 1));
        resolve({ fileName: file?.name || '', sheetName, personName: possibleName, days, dayVariants, duplicateDays, warnings });
      } catch (err) {
        reject(err);
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function formatImportTaskPreview(task) {
  const detail = task.target ? ` · ${task.target}` : '';
  return `${minToTime(task.start)}–${minToTime(task.end)} ${task.label || inferAssignmentLabel(task.type)}${detail}`;
}

function buildImportPreviewLines(importData) {
  const lines = [];
  PS_EXPORT_DAYS.forEach(day => {
    const data = importData.days?.[day.key];
    if (!data) return;
    const sourceText = data.sourceLabel && data.sourceLabel !== day.label ? ` (${data.sourceLabel})` : '';
    const shiftText = data.shift ? `${data.shift[0]}–${data.shift[1]}` : 'inget pass';
    lines.push(`${day.label}${sourceText}: ${shiftText}, ${data.tasks.length} block`);
    data.tasks.slice(0, 6).forEach(task => lines.push(`  • ${formatImportTaskPreview(task)}`));
    if (data.tasks.length > 6) lines.push(`  • ... ${data.tasks.length - 6} till`);
  });
  return lines;
}

function chooseDuplicateImportDays(importData) {
  const duplicateDays = Array.isArray(importData.duplicateDays) ? importData.duplicateDays : [];
  if (duplicateDays.length === 0) return true;
  const nextDays = { ...(importData.days || {}) };
  for (const duplicate of duplicateDays) {
    const options = duplicate.options || [];
    const optionLines = options.map((option, idx) => {
      const shiftText = option.shift ? `${option.shift[0]}–${option.shift[1]}` : 'inget pass';
      return `${idx + 1}. ${option.label}: ${shiftText}, ${option.taskCount} block`;
    });
    const answer = prompt(
      `Filen innehåller flera kolumner för ${duplicate.dayLabel.toLowerCase()}.\n\n` +
      `${optionLines.join('\n')}\n\n` +
      `Skriv numret på den ${duplicate.dayLabel.toLowerCase()} som ska importeras, eller 0 för att hoppa över dagen.`
    );
    if (answer == null) return false;
    const choice = Number(String(answer).trim());
    if (choice === 0) {
      delete nextDays[duplicate.dayKey];
      continue;
    }
    if (!Number.isInteger(choice) || choice < 1 || choice > options.length) {
      alert('Importen avbröts eftersom valet inte gick att tolka.');
      return false;
    }
    nextDays[duplicate.dayKey] = importData.dayVariants?.[duplicate.dayKey]?.[choice - 1];
  }
  importData.days = nextDays;
  importData.warnings = PS_EXPORT_DAYS
    .flatMap(day => nextDays[day.key]?.warnings || []);
  return true;
}


// Personcentrerad veckovy. Visar EN persons HELA vecka som ett vertikalt
// tidsschema där varje dag är en kolumn och tiden löper neråt (06-18, samma
// fönster som Excel-exporten). Uppdrag är dragbara block; mitt-drag flyttar i
// tid OCH mellan dagar, kant-drag (övre/undre) justerar bara tid på samma dag.
// Alt-tangenten under drag = kopiera istället för flytta. "Duplicera"-knappen
// på blocket gör samma sak utan kortkommandon. Klick i tom yta öppnar modalen
// med vald dag förifylld. Återanvänder samma assignments-datastruktur som
// Uppdrag- och Skola-vyerna — bidirektionell sync är gratis.
function PersonalScheduleView({
  staff,
  assignments,
  departments,
  fridayCycleWeeks,
  fridayTemplateRotation,
  currentFridayWeek,
  setCurrentFridayWeek,
  onOpenAssignmentEditor,
  onUpdateAssignment,
  onDeleteAssignment,
  onAddAssignment,
  onCopyFridayAssignments,
  onImportPersonalSchedule,
}) {
  const [selectedPersonId, setSelectedPersonId] = useState('');
  const [roleFilter, setRoleFilter] = useState('all');
  // Färgwizard — visas första gången vyn öppnas. Användaren kan starta om wizarden via knapp.
  const [showColorWizard, setShowColorWizard] = useState(() => !getColorWizardSeen());
  // Spåra Alt-tangent globalt så cursor och hint kan visa "kopiera"-läget i förväg.
  const [altPressed, setAltPressed] = useState(false);
  const gridRef = useRef(null);
  const dragPreviewRef = useRef(null);
  const importInputRef = useRef(null);
  const [dragPreview, setDragPreview] = useState(null);
  const [importBusy, setImportBusy] = useState(false);
  const [copyFridaySourceWeek, setCopyFridaySourceWeek] = useState(1);

  useEffect(() => {
    const onDown = (e) => { if (e.altKey) setAltPressed(true); };
    const onUp = (e) => { if (!e.altKey) setAltPressed(false); };
    const onBlur = () => setAltPressed(false);
    window.addEventListener('keydown', onDown);
    window.addEventListener('keyup', onUp);
    window.addEventListener('blur', onBlur);
    return () => {
      window.removeEventListener('keydown', onDown);
      window.removeEventListener('keyup', onUp);
      window.removeEventListener('blur', onBlur);
    };
  }, []);

  const roleMatchesFilter = (person, filter) => {
    if (filter === 'all') return true;
    return normalizeEmploymentRole(person?.employmentRole, person?.role) === filter
      || (filter === '' && !normalizeEmploymentRole(person?.employmentRole, person?.role));
  };
  const peopleToShow = useMemo(
    () => staff.filter(person => roleMatchesFilter(person, roleFilter)),
    [staff, roleFilter]
  );
  const person = staff.find(p => String(p.id) === String(selectedPersonId))
    || peopleToShow[0]
    || null;
  const personUsesFridayRotation = person?.fridayMode === 'rotation';

  // Timeline-konstanter — matchar Excel-exporten exakt så att vy och fil ser likadana ut.
  const TIMELINE_START = 6 * 60;   // 06:00
  const TIMELINE_END = 18 * 60;    // 18:00
  const TIMELINE_SPAN = TIMELINE_END - TIMELINE_START; // 720 min
  const TIMELINE_STEP = 5;         // snäpp till 5-min-intervall
  const HOUR_HEIGHT = 56;          // px per timme i griden
  const GRID_HEIGHT = (TIMELINE_SPAN / 60) * HOUR_HEIGHT; // ~672 px

  // Hela veckans data per dag: shift + tasks. fridayWeek påverkar fre, övriga får 1.
  const weekDayList = DAY_META; // [mon, tue, wed, thu, fri]
  const dayDataList = useMemo(() => {
    if (!person) return weekDayList.map(d => ({ ...d, shift: null, tasks: [] }));
    return weekDayList.map(d => {
      const fridayOptions = {
        fridayWeek: d.key === 'fri' ? currentFridayWeek : 1,
        cycleWeeks: fridayCycleWeeks,
        fridayTemplateRotation,
      };
      return {
        ...d,
        shift: getShiftForDay(person, d.key, fridayOptions),
        tasks: getAssignmentsForDay(assignments, person.id, d.key, fridayOptions),
      };
    });
  }, [person, assignments, currentFridayWeek, fridayCycleWeeks, fridayTemplateRotation, weekDayList]);
  const dayDataByKey = useMemo(() => {
    const map = {};
    for (const d of dayDataList) map[d.key] = d;
    return map;
  }, [dayDataList]);

  useEffect(() => {
    if (!personUsesFridayRotation || fridayCycleWeeks <= 1) return;
    const fallbackWeek = currentFridayWeek === 1 ? Math.min(2, fridayCycleWeeks) : 1;
    setCopyFridaySourceWeek(prev => {
      const clean = clamp(asNumber(prev, fallbackWeek), 1, fridayCycleWeeks);
      return clean === currentFridayWeek ? fallbackWeek : clean;
    });
  }, [person?.id, personUsesFridayRotation, fridayCycleWeeks, currentFridayWeek]);

  // Pekarposition → minute (Y) och dagindex (X) inom dag-griden (exklusive tid-spalt).
  const getMinuteFromY = (clientY) => {
    const rect = gridRef.current?.getBoundingClientRect();
    if (!rect || rect.height <= 0) return TIMELINE_START;
    const ratio = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
    return roundToStep(TIMELINE_START + ratio * TIMELINE_SPAN);
  };
  const getDayIdxFromX = (clientX) => {
    const rect = gridRef.current?.getBoundingClientRect();
    if (!rect || rect.width <= 0) return 0;
    const ratio = Math.max(0, Math.min(0.9999, (clientX - rect.left) / rect.width));
    return Math.floor(ratio * weekDayList.length);
  };

  // Position-stil för ett block: top/height i procent av griden, left/width i procent av dag-arean.
  const toBlockStyle = (start, end, dayIdx) => {
    const safeStart = Math.max(TIMELINE_START, Math.min(TIMELINE_END - TIMELINE_STEP, start));
    const safeEnd = Math.max(safeStart + TIMELINE_STEP, Math.min(TIMELINE_END, end));
    return {
      top: `${((safeStart - TIMELINE_START) / TIMELINE_SPAN) * 100}%`,
      height: `${Math.max(1.5, ((safeEnd - safeStart) / TIMELINE_SPAN) * 100)}%`,
      left: `${(dayIdx / weekDayList.length) * 100}%`,
      width: `${100 / weekDayList.length}%`,
    };
  };

  // Krock-räkning per dag.
  const getCollisionCount = (task, dayKey, start = task?.start, end = task?.end) => {
    if (!task) return 0;
    const dayTasks = dayDataByKey[dayKey]?.tasks || [];
    return dayTasks.filter(other =>
      other.id !== task.id && intervalsOverlap(other.start, other.end, start, end)
    ).length;
  };

  // Drag start. mode: 'move' | 'start' | 'end'. Resize-mode låser X (ingen dagsbyte).
  const startTaskDrag = (event, task, dayKey, mode = 'move') => {
    if (!person || !task?.id) return;
    event.preventDefault();
    event.stopPropagation();
    if (event.currentTarget?.setPointerCapture && event.pointerId != null) {
      try { event.currentTarget.setPointerCapture(event.pointerId); } catch {}
    }
    const dayIdx = weekDayList.findIndex(d => d.key === dayKey);
    const nextPreview = {
      taskId: task.id,
      originDayKey: dayKey,
      originDayIdx: dayIdx,
      mode,
      copy: !!event.altKey,
      dragActivated: false,
      originClientX: event.clientX,
      originClientY: event.clientY,
      originMinute: getMinuteFromY(event.clientY),
      start: task.start,
      end: task.end,
      previewStart: task.start,
      previewEnd: task.end,
      previewDayKey: dayKey,
      previewDayIdx: dayIdx,
      taskSnapshot: { ...task },
    };
    dragPreviewRef.current = nextPreview;
    setDragPreview(nextPreview);
  };

  useEffect(() => {
    if (!dragPreview) return;
    const updatePreview = (event) => {
      const movedPx = Math.hypot(event.clientX - dragPreview.originClientX, event.clientY - dragPreview.originClientY);
      if (!dragPreview.dragActivated && movedPx < 6) return;
      const currentMinute = getMinuteFromY(event.clientY);
      const currentDayIdx = getDayIdxFromX(event.clientX);
      const delta = roundToStep(currentMinute - dragPreview.originMinute);

      let nextStart = dragPreview.start;
      let nextEnd = dragPreview.end;
      let nextDayKey = dragPreview.originDayKey;
      let nextDayIdx = dragPreview.originDayIdx;
      const minDuration = TIMELINE_STEP;

      if (dragPreview.mode === 'start') {
        const maxStart = Math.max(TIMELINE_START, dragPreview.end - minDuration);
        nextStart = clamp(roundToStep(dragPreview.start + delta), TIMELINE_START, maxStart);
      } else if (dragPreview.mode === 'end') {
        const minEnd = Math.min(TIMELINE_END, dragPreview.start + minDuration);
        nextEnd = clamp(roundToStep(dragPreview.end + delta), minEnd, TIMELINE_END);
      } else {
        // move: tillåt både tids- och dagsbyte
        const duration = Math.max(minDuration, dragPreview.end - dragPreview.start);
        const maxStart = TIMELINE_END - duration;
        nextStart = clamp(roundToStep(dragPreview.start + delta), TIMELINE_START, maxStart);
        nextEnd = nextStart + duration;
        nextDayIdx = clamp(currentDayIdx, 0, weekDayList.length - 1);
        nextDayKey = weekDayList[nextDayIdx].key;
      }

      setDragPreview(prev => {
        if (!prev) return prev;
        const next = {
          ...prev,
          previewStart: nextStart,
          previewEnd: nextEnd,
          previewDayKey: nextDayKey,
          previewDayIdx: nextDayIdx,
          copy: !!event.altKey,
          dragActivated: true,
        };
        dragPreviewRef.current = next;
        return next;
      });
    };

    const finishDrag = (event) => {
      const latest = dragPreviewRef.current || dragPreview;
      const changedTime = latest.previewStart !== latest.start || latest.previewEnd !== latest.end;
      const changedDay = latest.previewDayKey !== latest.originDayKey;
      const copy = !!(event?.altKey || latest.copy);

      if (latest.mode === 'start' || latest.mode === 'end') {
        // Resize påverkar bara tid på samma dag.
        if (changedTime) {
          onUpdateAssignment?.({
            personId: person.id,
            dayKey: latest.originDayKey,
            taskId: latest.taskId,
            patch: {
              start: latest.previewStart,
              end: latest.previewEnd,
              durationMinutes: Math.max(TIMELINE_STEP, latest.previewEnd - latest.previewStart),
            },
          });
        }
      } else if (copy && (changedTime || changedDay)) {
        // Kopiera: behåll originalet, lägg till en kopia på preview-platsen.
        const targetHasShift = !!dayDataByKey[latest.previewDayKey]?.shift;
        if (!targetHasShift) {
          // Måldagen saknar pass — addSchoolPosition skulle avvisa. Snäpp tillbaka tyst.
        } else if (onAddAssignment) {
          const newTask = {
            ...latest.taskSnapshot,
            id: undefined,
            start: latest.previewStart,
            end: latest.previewEnd,
            durationMinutes: latest.previewEnd - latest.previewStart,
          };
          onAddAssignment({ personId: person.id, dayKey: latest.previewDayKey, task: newTask });
        }
      } else if (!copy && changedDay) {
        // Flytta över dagsgräns: kontrollera mål-shift först. Annars riskerar vi att radera utan att kunna skapa.
        const targetHasShift = !!dayDataByKey[latest.previewDayKey]?.shift;
        if (targetHasShift && onAddAssignment) {
          const newTask = {
            ...latest.taskSnapshot,
            id: undefined,
            start: latest.previewStart,
            end: latest.previewEnd,
            durationMinutes: latest.previewEnd - latest.previewStart,
          };
          onDeleteAssignment?.({ personId: person.id, dayKey: latest.originDayKey, taskId: latest.taskId });
          onAddAssignment({ personId: person.id, dayKey: latest.previewDayKey, task: newTask });
        }
        // Om måldagen saknar pass: snäpp tillbaka tyst.
      } else if (changedTime) {
        onUpdateAssignment?.({
          personId: person.id,
          dayKey: latest.originDayKey,
          taskId: latest.taskId,
          patch: {
            start: latest.previewStart,
            end: latest.previewEnd,
            durationMinutes: latest.previewEnd - latest.previewStart,
          },
        });
      }

      dragPreviewRef.current = null;
      setDragPreview(null);
    };

    window.addEventListener('pointermove', updatePreview);
    window.addEventListener('pointerup', finishDrag, { once: true });
    return () => {
      window.removeEventListener('pointermove', updatePreview);
      window.removeEventListener('pointerup', finishDrag);
    };
  }, [dragPreview, onUpdateAssignment, onDeleteAssignment, onAddAssignment, person, dayDataByKey]);

  // Klick i tom dag-yta → öppna modalen med dagens nyckel.
  const handleEmptyDayClick = (dayKey) => {
    if (!person) return;
    onOpenAssignmentEditor?.(person.id, dayKey);
  };

  // Duplicera direkt via knapp (alternativ till Alt-drag).
  const handleDuplicate = (task, dayKey) => {
    if (!person || !task || !onAddAssignment) return;
    const duration = Math.max(TIMELINE_STEP, task.end - task.start);
    const shift = dayDataByKey[dayKey]?.shift;
    const shiftStart = shift ? timeToMin(shift[0]) : TIMELINE_START;
    const shiftEnd = shift ? timeToMin(shift[1]) : TIMELINE_END;
    let start = task.end + duration <= shiftEnd ? task.end : task.start - duration;
    if (start < shiftStart) start = Math.min(Math.max(shiftStart, task.start + TIMELINE_STEP), Math.max(shiftStart, shiftEnd - duration));
    const end = Math.min(shiftEnd, start + duration);
    onAddAssignment({
      personId: person.id,
      dayKey,
      task: {
        ...task,
        id: undefined,
        start,
        end,
        durationMinutes: end - start,
      },
    });
  };

  const handleCopyFridayFromWeek = () => {
    if (!person || !personUsesFridayRotation || !onCopyFridayAssignments) return;
    const sourceWeek = clamp(asNumber(copyFridaySourceWeek, 1), 1, fridayCycleWeeks);
    const targetWeek = clamp(asNumber(currentFridayWeek, 1), 1, fridayCycleWeeks);
    if (sourceWeek === targetWeek) {
      alert('Välj en annan fredagsvecka att kopiera från.');
      return;
    }
    const sourceTasks = getAssignmentsForDay(assignments, person.id, 'fri', {
      fridayWeek: sourceWeek,
      cycleWeeks: fridayCycleWeeks,
      fridayTemplateRotation,
    });
    const currentTasks = getAssignmentsForDay(assignments, person.id, 'fri', {
      fridayWeek: targetWeek,
      cycleWeeks: fridayCycleWeeks,
      fridayTemplateRotation,
    });
    if (sourceTasks.length === 0) {
      alert(`Fredag vecka ${sourceWeek} har inga uppdrag att kopiera.`);
      return;
    }
    const replaceText = currentTasks.length > 0
      ? `\n\nNuvarande fredag vecka ${targetWeek} har ${currentTasks.length} uppdrag och ersätts.`
      : '';
    if (!confirm(`Kopiera ${sourceTasks.length} uppdrag från fredag vecka ${sourceWeek} till vecka ${targetWeek}?${replaceText}`)) return;
    const ok = onCopyFridayAssignments({ personId: person.id, fromWeek: sourceWeek, toWeek: targetWeek });
    if (!ok) alert('Kunde inte kopiera fredagen. Kontrollera att personen har arbetspass den valda fredagsveckan.');
  };

  const handleDelete = (task, dayKey) => {
    if (!person || !task?.id) return;
    if (!confirm(`Ta bort "${task.label || inferAssignmentLabel(task.type)}" från ${getDayMeta(dayKey).label.toLowerCase()}?`)) return;
    onDeleteAssignment?.({ personId: person.id, dayKey, taskId: task.id });
  };

  const handleImportFile = async (event) => {
    const file = event.target.files?.[0];
    event.target.value = '';
    if (!file) return;
    if (!person) {
      alert('Välj en person först. Importen läggs på den person som är vald i listan.');
      return;
    }
    setImportBusy(true);
    try {
      const importData = await readPersonalScheduleExcelFile(file);
      if (!chooseDuplicateImportDays(importData)) return;
      const dayLines = buildImportPreviewLines(importData);
      const warningText = importData.warnings?.length
        ? `\n\nObs:\n${importData.warnings.slice(0, 10).join('\n')}${importData.warnings.length > 10 ? '\n...' : ''}`
        : '';
      const firstName = foldText(person.name).split(' ')[0] || '';
      const nameText = importData.personName && firstName && !foldText(importData.personName).includes(firstName)
        ? `\n\nExcel verkar gälla: ${importData.personName}\nVald person i appen: ${person.name}`
        : '';
      const ok = confirm(
        `Importera personligt schema från "${file.name}" till ${person.name}?\n\n` +
        `${dayLines.join('\n') || 'Inga dagar hittades.'}\n\n` +
        'De importerade dagarnas uppdragsblock ersätter nuvarande block för samma person. Kontrollera särskilt föreslagna arbetspass efter import.' +
        nameText +
        warningText
      );
      if (!ok) return;
      const didImport = onImportPersonalSchedule?.({ personId: person.id, importData });
      if (!didImport) {
        alert('Importen hittade inget som kunde läggas in.');
        return;
      }
      alert(`Import klart för ${person.name}.\n\n${dayLines.filter(line => !line.startsWith('  •')).join('\n')}`);
    } catch (err) {
      console.error('Kunde inte importera personligt schema:', err);
      alert(`Kunde inte importera Excel-filen.\n\n${err?.message || 'Okänt fel'}`);
    } finally {
      setImportBusy(false);
    }
  };

  const dept = person ? getDept(person.deptId, departments) : null;
  const roleLabel = person ? getStaffRoleLabel(person.employmentRole) : '';

  // Tim-rader för bakgrundsgrid + tid-spalten.
  const hourMarks = [];
  for (let m = TIMELINE_START; m <= TIMELINE_END; m += 60) hourMarks.push(m);

  return (
    <div className="space-y-6">
      {showColorWizard && (
        <ColorWizardModal onClose={() => setShowColorWizard(false)} />
      )}
      <TabIntro>
        Personligt schema visar en persons vecka: arbetspass, lektioner, rastvärd, planering och andra uppdrag. Dra block för att flytta eller justera tid. Samma block finns också i Uppdrag, där du styr vad som måste täckas vid frånvaro och vem som kan vara ersättare.
      </TabIntro>

      <div className="flex items-center justify-end gap-3 flex-wrap -mt-3">
        <input
          ref={importInputRef}
          type="file"
          accept=".xls,.xlsx,.xlsm,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
          className="hidden"
          onChange={handleImportFile}
        />
        <button
          type="button"
          onClick={() => importInputRef.current?.click()}
          disabled={!person || importBusy}
          className={`px-3 py-2 rounded-lg text-sm flex items-center gap-2 transition ring-1 ${person && !importBusy ? 'bg-white text-stone-700 ring-stone-200 hover:bg-stone-50' : 'bg-stone-100 text-stone-400 ring-stone-200 cursor-not-allowed'}`}
          title={person ? 'Importera arbetspass och block från Excel till vald person' : 'Välj en person först'}
        >
          <Upload size={14} />{importBusy ? 'Importerar...' : 'Importera schema'}
        </button>
        <button
          type="button"
          onClick={() => exportPersonalScheduleToXlsx({
            person,
            assignments,
            fridayOptions: { cycleWeeks: fridayCycleWeeks, fridayTemplateRotation, currentFridayWeek },
          })}
          disabled={!person}
          className={`px-3 py-2 rounded-lg text-sm flex items-center gap-2 transition ring-1 ${person ? 'bg-white text-stone-700 ring-stone-200 hover:bg-stone-50' : 'bg-stone-100 text-stone-400 ring-stone-200 cursor-not-allowed'}`}
          title={person ? `Exportera ${person.name}s vecka till Excel` : 'Välj en person först'}
        >
          <FileSpreadsheet size={14} />Exportera till Excel
        </button>
        <button
          type="button"
          onClick={() => setShowColorWizard(true)}
          className="px-3 py-2 rounded-lg text-sm flex items-center gap-2 transition ring-1 bg-white text-stone-600 ring-stone-200 hover:bg-stone-50 hover:text-stone-900"
          title="Justera färgerna som används i Personligt schema och Excel-exporten"
        >
          <Sparkles size={14} />Schemafärger
        </button>
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-[0.55fr,1.45fr] gap-4">
        {/* Vänster: personväljare */}
        <div className="rounded-2xl bg-white ring-1 ring-stone-200 p-5 space-y-4">
          <div>
            <p className="text-xs uppercase tracking-wider text-stone-500 mb-1">Välj person</p>
            <h3 className="display-font text-2xl text-stone-800">Vem ska du planera för?</h3>
            <p className="text-sm text-stone-600 mt-1">Filtrera på befattning om listan är lång. Hela personens vecka visas till höger.</p>
          </div>

          <div>
            <label className="text-[10px] uppercase tracking-wider text-stone-500 block mb-1">Befattning</label>
            <select value={roleFilter} onChange={e => { setRoleFilter(e.target.value); setSelectedPersonId(''); }}
              className="w-full px-3 py-2 rounded-lg bg-white ring-1 ring-stone-200 text-sm text-stone-700">
              <option value="all">Alla befattningar</option>
              {STAFF_ROLE_OPTIONS.filter(opt => opt.id !== '').map(opt => (
                <option key={opt.id} value={opt.id}>{opt.label}</option>
              ))}
              <option value="">Ej angiven befattning</option>
            </select>
          </div>

          <div>
            <label className="text-[10px] uppercase tracking-wider text-stone-500 block mb-1">Person</label>
            <select value={String(person?.id || '')} onChange={e => setSelectedPersonId(e.target.value)}
              className="w-full px-3 py-2 rounded-lg bg-white ring-1 ring-stone-200 text-sm text-stone-700">
              {peopleToShow.length === 0 ? (
                <option value="">Ingen person matchar filtret</option>
              ) : (
                peopleToShow.map(p => <option key={p.id} value={p.id}>{p.name}</option>)
              )}
            </select>
            {person && (
              <p className="text-xs text-stone-500 mt-1">
                {roleLabel}{person.role ? ` · ${person.role}` : ''}{dept ? ` · ${dept.name}` : ''}
              </p>
            )}
          </div>

          {personUsesFridayRotation && fridayCycleWeeks > 1 && (
            <div className="rounded-xl bg-stone-50 ring-1 ring-stone-200 p-3">
              <label className="text-[10px] uppercase tracking-wider text-stone-500 block mb-1">Fredagsvecka</label>
              <select value={currentFridayWeek} onChange={e => setCurrentFridayWeek(parseInt(e.target.value, 10))}
                className="w-full px-3 py-2 rounded-lg bg-white ring-1 ring-stone-200 text-sm text-stone-700 tabular-nums">
                {Array.from({ length: fridayCycleWeeks }).map((_, i) => (
                  <option key={i + 1} value={i + 1}>Vecka {i + 1} av {fridayCycleWeeks}</option>
                ))}
              </select>
              <p className="text-[10px] text-stone-500 mt-1">Påverkar bara fredagsspalten. Personer utan fredagsrull visar sin fasta fredag utan veckoval.</p>
              <div className="mt-3 pt-3 border-t border-stone-200">
                <label className="text-[10px] uppercase tracking-wider text-stone-500 block mb-1">Kopiera fredag från</label>
                <div className="flex gap-2">
                  <select value={copyFridaySourceWeek} onChange={e => setCopyFridaySourceWeek(parseInt(e.target.value, 10))}
                    className="min-w-0 flex-1 px-3 py-2 rounded-lg bg-white ring-1 ring-stone-200 text-sm text-stone-700 tabular-nums">
                    {Array.from({ length: fridayCycleWeeks }).map((_, i) => {
                      const week = i + 1;
                      return <option key={week} value={week} disabled={week === currentFridayWeek}>Vecka {week}</option>;
                    })}
                  </select>
                  <button type="button" onClick={handleCopyFridayFromWeek}
                    className="px-3 py-2 rounded-lg text-sm bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-100 transition whitespace-nowrap">
                    Kopiera
                  </button>
                </div>
                <p className="text-[10px] text-stone-500 mt-1">Ersätter uppdragen i den fredagsvecka som visas just nu.</p>
              </div>
            </div>
          )}

          {person && (
            <div className="pt-2 border-t border-stone-100 space-y-2">
              <p className="text-[10px] uppercase tracking-wider text-stone-500">Snabbtips</p>
              <ul className="text-xs text-stone-600 space-y-1 leading-relaxed">
                <li>• Klick på tom yta i en dag öppnar finredigeringen</li>
                <li>• Dra mitten av ett block för att flytta i tid eller mellan dagar</li>
                <li>• Dra ovan-/underkanten för att korta/förlänga</li>
                <li>• Håll <kbd className="px-1 rounded bg-stone-100 ring-1 ring-stone-200 text-[10px]">Alt</kbd> medan du drar för att kopiera</li>
                <li>• Eller använd <strong>Duplicera</strong>-knappen på blocket</li>
              </ul>
            </div>
          )}
        </div>

        {/* Höger: hela veckans tidsgrid */}
        <div className="rounded-2xl bg-white ring-1 ring-stone-200 p-5">
          <div className="flex items-start justify-between gap-3 flex-wrap mb-4">
            <div className="min-w-0">
              <p className="text-xs uppercase tracking-wider text-stone-500 mb-1">Personligt veckoschema{personUsesFridayRotation && fridayCycleWeeks > 1 ? ` · fredag v${currentFridayWeek}` : ''}</p>
              <h3 className="display-font text-2xl text-stone-800 truncate">{person ? person.name : 'Välj person'}</h3>
              {person && (
                <p className="text-sm text-stone-600 mt-1">
                  Tid 06–18 neråt, måndag till fredag åt höger. Skuggade ytor visar varje dags arbetspass.
                </p>
              )}
            </div>
            {altPressed && person && (
              <span className="px-2 py-1 rounded-full bg-amber-100 ring-1 ring-amber-300 text-amber-800 text-[11px] inline-flex items-center gap-1">
                <Sparkles size={11} />Kopiera-läge (Alt)
              </span>
            )}
          </div>

          {!person && (
            <div className="rounded-xl bg-stone-50 ring-1 ring-stone-200 p-8 text-center">
              <Users size={28} className="mx-auto text-stone-400 mb-2" />
              <p className="text-sm text-stone-700">Välj en person till vänster för att börja bygga ett personligt schema.</p>
            </div>
          )}

          {person && (
            <div className="overflow-x-auto">
              <div className="min-w-[760px]">
                {/* Header-rad: tom hörna + dag-rubriker */}
                <div className="grid" style={{ gridTemplateColumns: '56px 1fr' }}>
                  <div className="px-2 pb-1 text-[10px] uppercase tracking-wider text-stone-400">Tid</div>
                  <div className="grid" style={{ gridTemplateColumns: `repeat(${weekDayList.length}, 1fr)` }}>
                    {dayDataList.map(d => (
                      <div key={d.key} className="px-2 pb-1">
                        <p className="text-sm text-stone-800" style={{ fontWeight: 600 }}>{d.label}</p>
                        <p className="text-[11px] text-stone-500 tabular-nums">
                          {d.shift ? `${d.shift[0]}–${d.shift[1]}` : <span className="text-stone-400">Ledig</span>}
                        </p>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Tidsgrid: tid-spalt + dag-area */}
                <div className="grid" style={{ gridTemplateColumns: '56px 1fr' }}>
                  {/* Vänster: tim-etiketter */}
                  <div className="relative" style={{ height: `${GRID_HEIGHT}px` }}>
                    {hourMarks.map(min => {
                      const top = ((min - TIMELINE_START) / TIMELINE_SPAN) * 100;
                      return (
                        <div key={min}
                          className="absolute left-0 right-0 pr-2 text-right text-[11px] text-stone-500 tabular-nums"
                          style={{ top: `${top}%`, transform: 'translateY(-50%)' }}>
                          {minToTime(min)}
                        </div>
                      );
                    })}
                  </div>

                  {/* Höger: dag-grid med alla blocks */}
                  <div
                    ref={gridRef}
                    className={`relative rounded-xl bg-stone-50 ring-1 ring-stone-200 overflow-visible select-none ${altPressed ? 'cursor-copy' : ''}`}
                    style={{ height: `${GRID_HEIGHT}px` }}
                  >
                    {/* Tim-rader (bakgrund) */}
                    {hourMarks.slice(1, -1).map(min => {
                      const top = ((min - TIMELINE_START) / TIMELINE_SPAN) * 100;
                      return (
                        <div key={`h-${min}`}
                          className="absolute left-0 right-0 border-t border-stone-200 pointer-events-none"
                          style={{ top: `${top}%` }} />
                      );
                    })}

                    {/* Dag-kolumner: skiljelinjer + skuggat shift-område + click-target */}
                    {dayDataList.map((d, dayIdx) => {
                      const colLeft = (dayIdx / weekDayList.length) * 100;
                      const colWidth = 100 / weekDayList.length;
                      const isDragTarget = dragPreview && dragPreview.previewDayKey === d.key && dragPreview.mode === 'move';
                      const targetHasNoShift = isDragTarget && !d.shift;
                      return (
                        <React.Fragment key={d.key}>
                          {/* Vertikal skiljelinje */}
                          {dayIdx > 0 && (
                            <div className="absolute top-0 bottom-0 border-l border-stone-200 pointer-events-none"
                              style={{ left: `${colLeft}%` }} />
                          )}
                          {/* Skuggat shift-område */}
                          {d.shift && (() => {
                            const shiftStart = timeToMin(d.shift[0]);
                            const shiftEnd = timeToMin(d.shift[1]);
                            const top = ((Math.max(TIMELINE_START, shiftStart) - TIMELINE_START) / TIMELINE_SPAN) * 100;
                            const height = ((Math.min(TIMELINE_END, shiftEnd) - Math.max(TIMELINE_START, shiftStart)) / TIMELINE_SPAN) * 100;
                            return (
                              <div className="absolute bg-white pointer-events-none"
                                style={{
                                  left: `${colLeft}%`, width: `${colWidth}%`,
                                  top: `${top}%`, height: `${height}%`,
                                }}>
                                <span className="absolute top-1 left-2 text-[9px] uppercase tracking-wider text-stone-400">Pass</span>
                              </div>
                            );
                          })()}
                          {/* Drag-target overlay: röd om måldagen saknar pass */}
                          {isDragTarget && (
                            <div className="absolute pointer-events-none border-2 rounded-md"
                              style={{
                                left: `${colLeft}%`, width: `${colWidth}%`, top: 0, bottom: 0,
                                borderColor: targetHasNoShift ? '#DC2626' : '#3D7A8C',
                                backgroundColor: targetHasNoShift ? 'rgba(220,38,38,0.05)' : 'rgba(61,122,140,0.05)',
                              }}>
                              {targetHasNoShift && (
                                <span className="absolute top-2 left-2 right-2 text-center text-[10px] rounded bg-rose-100 ring-1 ring-rose-300 text-rose-800 px-1 py-0.5">
                                  Ledig dag — kan inte släppas här
                                </span>
                              )}
                            </div>
                          )}
                          {/* Click-target för "lägg uppdrag på denna dag" */}
                          <button type="button"
                            onClick={(e) => { e.stopPropagation(); handleEmptyDayClick(d.key); }}
                            className={`absolute top-0 bottom-0 ${d.shift ? 'hover:bg-stone-100/40' : 'hover:bg-stone-200/30'} transition`}
                            style={{ left: `${colLeft}%`, width: `${colWidth}%` }}
                            title={d.shift ? `Lägg nytt uppdrag på ${d.label.toLowerCase()}` : `${person.name} är ledig på ${d.label.toLowerCase()}`}
                            aria-label={`Lägg uppdrag på ${d.label}`} />
                        </React.Fragment>
                      );
                    })}

                    {/* Block per dag */}
                    {dayDataList.map((d, dayIdx) => (
                      d.tasks.map(task => {
                        const meta = getAssignmentTypeMeta(task.type);
                        const visual = getSchoolTaskVisual(task);
                        const preview = dragPreview?.taskId === task.id ? dragPreview : null;
                        const renderDayIdx = preview ? preview.previewDayIdx : dayIdx;
                        const visualStart = preview ? preview.previewStart : task.start;
                        const visualEnd = preview ? preview.previewEnd : task.end;
                        // Krock-check görs mot ursprungsdagen om vi inte flyttat dag, annars mot måldagen
                        const checkDayKey = preview ? preview.previewDayKey : d.key;
                        const collisionCount = getCollisionCount(task, checkDayKey, visualStart, visualEnd);
                        const hasCollision = collisionCount > 0;
                        const duration = visualEnd - visualStart;
                        // Tre storlekstier — bestäm content-layout och drag-kant-tjocklek.
                        // tiny: bara klockslag, ingen label. small: klockslag + label. normal: full info.
                        const tier = duration < 22 ? 'tiny' : duration < 42 ? 'small' : 'normal';
                        const isTiny = tier === 'tiny';
                        const isSmall = tier === 'small';
                        const handleHeight = isTiny ? 'h-1' : isSmall ? 'h-1.5' : 'h-2';
                        // Hover-popup placering: höger om blocket för kolumn 0–2, vänster för 3–4.
                        // Då hamnar popupen alltid inom grid-arean och täcker inte sin egen kolumn.
                        const popupOnLeft = renderDayIdx >= 3;
                        return (
                          <div key={task.id}
                            onPointerDown={(event) => startTaskDrag(event, task, d.key, 'move')}
                            title={hasCollision ? `Överlappar ${collisionCount} annat block` : `${task.label || meta.label} · ${minToTime(visualStart)}-${minToTime(visualEnd)}`}
                            className={`group absolute rounded-md ring-1 hover:shadow-md hover:z-30 focus-within:z-30 transition touch-none cursor-grab active:cursor-grabbing ${preview ? 'z-20 shadow-lg' : 'z-10'} ${preview?.copy ? 'opacity-90' : ''}`}
                            style={{
                              ...toBlockStyle(visualStart, visualEnd, renderDayIdx),
                              borderColor: hasCollision ? '#F59E0B' : visual.borderColor,
                              borderStyle: visual.borderStyle,
                              backgroundColor: hasCollision ? '#FEF3C7' : visual.strongBackgroundColor,
                              boxShadow: hasCollision
                                ? 'inset 0 0 0 2px #F59E0B, 0 2px 8px rgba(245,158,11,0.18)'
                                : `inset 4px 0 0 ${visual.borderColor}, 0 1px 3px rgba(28,25,23,0.10)`,
                            }}>
                            {/* Övre drag-kant: justera starttid. Osynlig — cursor-ns-resize signalerar funktionen. */}
                            <span role="button" aria-label="Dra starttid" tabIndex={0}
                              onPointerDown={(event) => startTaskDrag(event, task, d.key, 'start')}
                              className={`absolute left-0 right-0 top-0 ${handleHeight} cursor-ns-resize z-10`} />
                            {/* Undre drag-kant: justera sluttid */}
                            <span role="button" aria-label="Dra sluttid" tabIndex={0}
                              onPointerDown={(event) => startTaskDrag(event, task, d.key, 'end')}
                              className={`absolute left-0 right-0 bottom-0 ${handleHeight} cursor-ns-resize z-10`} />
                            {/* Innehåll — wrapper med overflow-hidden så texten inte läcker ut, blocket självt är overflow-visible för popupen. */}
                            <div className="absolute inset-0 overflow-hidden rounded-md pointer-events-none flex flex-col justify-center px-1.5">
                              {isTiny ? (
                                <span className="text-[9px] tabular-nums leading-tight truncate" style={{ color: '#1C1917', fontWeight: 700 }}>
                                  {minToTime(visualStart)}–{minToTime(visualEnd)}
                                </span>
                              ) : isSmall ? (
                                <>
                                  <span className="block text-[10px] tabular-nums leading-none truncate" style={{ color: '#1C1917', fontWeight: 700 }}>
                                    {minToTime(visualStart)}–{minToTime(visualEnd)}
                                  </span>
                                  <span className="block text-[10px] leading-tight mt-0.5 truncate" style={{ fontWeight: 600, color: '#1C1917' }}>
                                    {task.label || meta.label}
                                  </span>
                                </>
                              ) : (
                                <>
                                  <span className="block text-[10px] tabular-nums leading-none" style={{ color: '#1C1917', fontWeight: 700 }}>
                                    {minToTime(visualStart)}–{minToTime(visualEnd)}
                                  </span>
                                  <span className="block text-[11px] leading-tight mt-0.5 break-words" style={{ fontWeight: 600, color: '#1C1917' }}>
                                    {task.label || meta.label}
                                  </span>
                                  {task.target && (
                                    <span className="block text-[10px] leading-tight text-stone-900 mt-0.5 break-words">
                                      {task.target}
                                    </span>
                                  )}
                                </>
                              )}
                            </div>
                            {/* Floating hover-popup utanför blocket — visar full info + alla tre actions.
                                Yttre wrappern fyller "gapet" mellan block och visible popup så att hovern inte
                                bryts när musen rör sig mellan dem. group-hover styr opacity OCH pointer-events. */}
                            {!preview && (
                              <div
                                className="absolute z-40 top-0 opacity-0 group-hover:opacity-100 focus-within:opacity-100 pointer-events-none group-hover:pointer-events-auto focus-within:pointer-events-auto transition"
                                style={{
                                  [popupOnLeft ? 'right' : 'left']: '100%',
                                  width: '216px',
                                  paddingLeft: popupOnLeft ? '0' : '6px',
                                  paddingRight: popupOnLeft ? '6px' : '0',
                                }}
                                onPointerDown={(event) => event.stopPropagation()}
                              >
                                <div className="rounded-lg bg-white shadow-xl ring-1 ring-stone-200 p-2.5">
                                  <p className="text-xs text-stone-800 break-words" style={{ fontWeight: 600 }}>{task.label || meta.label}</p>
                                  {task.target && <p className="text-[11px] text-stone-500 break-words mt-0.5">{task.target}</p>}
                                  <p className="text-[10px] text-stone-500 tabular-nums mt-1.5">
                                    {minToTime(task.start)}–{minToTime(task.end)} · {duration} min · {getDayMeta(d.key).label}
                                  </p>
                                  {hasCollision && (
                                    <p className="text-[10px] text-amber-800 mt-1.5 rounded bg-amber-50 ring-1 ring-amber-200 px-1.5 py-0.5">
                                      Krockar med {collisionCount} {collisionCount === 1 ? 'annat block' : 'andra block'}
                                    </p>
                                  )}
                                  <div className="flex gap-1 mt-2 pt-2 border-t border-stone-100">
                                    <button type="button"
                                      onPointerDown={event => event.stopPropagation()}
                                      onClick={event => { event.stopPropagation(); event.currentTarget.blur(); onOpenAssignmentEditor?.(person.id, d.key); }}
                                      className="flex-1 rounded bg-white px-2 py-1 text-[10px] text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50"
                                      title="Öppna finredigering">
                                      Ändra
                                    </button>
                                    <button type="button"
                                      onPointerDown={event => event.stopPropagation()}
                                      onClick={event => { event.stopPropagation(); event.currentTarget.blur(); handleDuplicate(task, d.key); }}
                                      className="flex-1 rounded bg-white px-2 py-1 text-[10px] text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50"
                                      title="Skapa en kopia på samma dag">
                                      Duplicera
                                    </button>
                                    <button type="button"
                                      onPointerDown={event => event.stopPropagation()}
                                      onClick={event => { event.stopPropagation(); event.currentTarget.blur(); handleDelete(task, d.key); }}
                                      className="rounded bg-rose-50 px-2 py-1 text-[10px] text-rose-700 ring-1 ring-rose-200 hover:bg-rose-100 inline-flex items-center justify-center"
                                      title="Ta bort uppdraget"
                                      aria-label="Ta bort uppdraget">
                                      <Trash2 size={11} />
                                    </button>
                                  </div>
                                </div>
                              </div>
                            )}
                            {preview && (
                              <span className="absolute left-1/2 -translate-x-1/2 -top-6 rounded-full bg-stone-900 text-white text-[10px] px-2 py-0.5 tabular-nums shadow whitespace-nowrap z-30">
                                {preview.copy ? '⊕ ' : ''}{minToTime(visualStart)}–{minToTime(visualEnd)}{preview.previewDayKey !== preview.originDayKey ? ` · ${getDayMeta(preview.previewDayKey).short}` : ''}
                              </span>
                            )}
                            {hasCollision && !isTiny && !isSmall && (
                              <span className="absolute left-1 bottom-0.5 rounded-full bg-amber-100 text-amber-800 ring-1 ring-amber-300 px-1.5 py-0 text-[9px] z-10" style={{ fontWeight: 700 }}>
                                Krock
                              </span>
                            )}
                          </div>
                        );
                      })
                    ))}
                  </div>
                </div>

                {/* "Lägg uppdrag"-rad under griden för enklast åtkomst */}
                <div className="mt-3 grid" style={{ gridTemplateColumns: '56px 1fr' }}>
                  <div />
                  <div className="grid gap-1" style={{ gridTemplateColumns: `repeat(${weekDayList.length}, 1fr)` }}>
                    {dayDataList.map(d => (
                      <button key={d.key} type="button"
                        onClick={() => handleEmptyDayClick(d.key)}
                        disabled={!d.shift}
                        className={`px-2 py-1.5 rounded-lg text-[11px] flex items-center justify-center gap-1 transition ring-1 ${d.shift
                          ? 'bg-white text-stone-700 ring-stone-200 hover:bg-stone-50'
                          : 'bg-stone-100 text-stone-400 ring-stone-200 cursor-not-allowed'}`}
                        title={d.shift ? `Lägg uppdrag på ${d.label.toLowerCase()}` : `${person.name} är ledig på ${d.label.toLowerCase()}`}>
                        <Plus size={11} />{d.short}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
