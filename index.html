function buildCoverageWizardState(departments, blocks = [], staff = []) {
  const normalizedBlocks = normalizeCoverageBlocks(blocks, departments).sort((a, b) => a.start - b.start);
  const sharedBlocks = normalizedBlocks.filter(block => block.scopeType === COVERAGE_SHARED);
  const sharedMorningBlocks = sharedBlocks.filter(block => block.end <= 480 && block.min > 0);
  const sharedOpeningBlock = sharedMorningBlocks[0] || null;
  const sharedMorningBlock = sharedMorningBlocks[1] || null;
  const sharedSchoolBlock = sharedBlocks.find(block => block.start >= 480 && block.end <= 960 && block.min > 0) || null;
  const sharedClosingBlock = sharedBlocks.find(block => block.start >= 960 && block.min > 0) || null;

  const departmentCards = departments.map((dept, index) => {
    const deptBlocks = normalizedBlocks.filter(block => block.scopeType === COVERAGE_DEPARTMENT && block.deptId === dept.id).sort((a, b) => a.start - b.start);
    const morningBlock = deptBlocks.find(block => block.end <= 480 && block.min > 0) || null;
    const afternoonBlock = deptBlocks.find(block => block.start >= 720 && block.start < 960 && block.min > 0) || null;
    const closingBlock = deptBlocks.find(block => block.start >= 960 && block.min > 0) || null;
    const staffCount = staff.filter(person => person.deptId === dept.id).length;
    return {
      deptId: dept.id,
      name: dept.name,
      color: dept.color,
      staffCount,
      openingEnabled: !!morningBlock,
      openingStart: morningBlock?.start ?? 350,
      openingEnd: morningBlock?.end ?? 480,
      openingMin: morningBlock?.min ?? 1,
      openingMax: morningBlock?.max ?? (morningBlock?.min ?? 1),
      afternoonEnabled: !!afternoonBlock || departments.length > 0,
      afternoonStart: afternoonBlock?.start ?? (index === 0 ? 795 : 855),
      afternoonEnd: afternoonBlock?.end ?? 960,
      afternoonMin: afternoonBlock?.min ?? Math.max(1, Math.min(2, staffCount || 1)),
      afternoonMax: afternoonBlock?.max ?? Math.max(1, Math.min(2, staffCount || 1)),
      closingEnabled: !!closingBlock,
      closingStart: closingBlock?.start ?? 1005,
      closingEnd: closingBlock?.end ?? 1065,
      closingMin: closingBlock?.min ?? 1,
      closingMax: closingBlock?.max ?? (closingBlock?.min ?? 1),
    };
  });

  return {
    replaceExisting: true,
    sharedOpening: sharedMorningBlocks.length > 0 || normalizedBlocks.every(block => block.scopeType !== COVERAGE_DEPARTMENT || block.start >= 720),
    openingStart: sharedOpeningBlock?.start ?? 350,
    openingSplit: sharedOpeningBlock?.end ?? 390,
    openingMin: sharedOpeningBlock?.min ?? 1,
    openingMax: sharedOpeningBlock?.max ?? (sharedOpeningBlock?.min ?? 1),
    morningEnabled: !!sharedMorningBlock,
    morningEnd: sharedMorningBlock?.end ?? 480,
    morningMin: sharedMorningBlock?.min ?? 5,
    morningMax: sharedMorningBlock?.max ?? (sharedMorningBlock?.min ?? 5),
    includeSchoolCoverage: !!sharedSchoolBlock,
    schoolStart: sharedSchoolBlock?.start ?? 480,
    schoolEnd: sharedSchoolBlock?.end ?? 780,
    schoolMin: sharedSchoolBlock?.min ?? 1,
    schoolMax: sharedSchoolBlock?.max ?? (sharedSchoolBlock?.min ?? 1),
    sharedClosing: !!sharedClosingBlock || !departmentCards.some(card => card.closingEnabled),
    closingStart: sharedClosingBlock?.start ?? 1005,
    closingEnd: sharedClosingBlock?.end ?? 1065,
    closingMin: sharedClosingBlock?.min ?? 1,
    closingMax: sharedClosingBlock?.max ?? (sharedClosingBlock?.min ?? 1),
    departments: departmentCards,
  };
}

function buildCoverageBlocksFromWizard(state, departments, existingBlocks = []) {
  const nextBlocks = state.replaceExisting ? [] : normalizeCoverageBlocks(existingBlocks, departments).map(block => ({ ...block }));
  const pushBlock = (block) => {
    if (!block || !Number.isFinite(block.start) || !Number.isFinite(block.end) || block.end <= block.start) return;
    const min = Math.max(0, block.min || 0);
    const max = Math.max(min, block.max ?? min);
    if (min === 0 && max === 0) return;
    nextBlocks.push({
      id: Math.random(),
      label: block.label,
      scopeType: block.scopeType,
      deptId: block.scopeType === COVERAGE_DEPARTMENT ? block.deptId : null,
      start: block.start,
      end: block.end,
      min,
      max,
    });
  };

  if (state.sharedOpening) {
    pushBlock({ label: 'Öppning', scopeType: COVERAGE_SHARED, start: state.openingStart, end: state.openingSplit, min: state.openingMin, max: state.openingMax });
    if (state.morningEnabled) {
      pushBlock({ label: 'Morgonfritids', scopeType: COVERAGE_SHARED, start: state.openingSplit, end: state.morningEnd, min: state.morningMin, max: state.morningMax });
    }
  } else {
    state.departments.forEach(card => {
      if (!card.openingEnabled) return;
      pushBlock({ label: `${card.name} morgon`, scopeType: COVERAGE_DEPARTMENT, deptId: card.deptId, start: card.openingStart, end: card.openingEnd, min: card.openingMin, max: card.openingMax });
    });
  }

  if (state.includeSchoolCoverage) {
    pushBlock({ label: 'Skoltid', scopeType: COVERAGE_SHARED, start: state.schoolStart, end: state.schoolEnd, min: state.schoolMin, max: state.schoolMax });
  }

  state.departments.forEach(card => {
    if (!card.afternoonEnabled) return;
    pushBlock({ label: `${card.name} eftermiddag`, scopeType: COVERAGE_DEPARTMENT, deptId: card.deptId, start: card.afternoonStart, end: card.afternoonEnd, min: card.afternoonMin, max: card.afternoonMax });
  });

  if (state.sharedClosing) {
    pushBlock({ label: 'Stängning', scopeType: COVERAGE_SHARED, start: state.closingStart, end: state.closingEnd, min: state.closingMin, max: state.closingMax });
  } else {
    state.departments.forEach(card => {
      if (!card.closingEnabled) return;
      pushBlock({ label: `${card.name} stängning`, scopeType: COVERAGE_DEPARTMENT, deptId: card.deptId, start: card.closingStart, end: card.closingEnd, min: card.closingMin, max: card.closingMax });
    });
  }

  return normalizeCoverageBlocks(nextBlocks, departments);
}

// Två-fältsrad för "antal personer (min/max)" i bemanningsguiden. Bryts ut
// för konsekvens — alla blocktyper får samma layout med tydliga MIN/MAX-labels
// över inputs i stället för en liten not under.
function MinMaxInputs({ min, max, onChange }) {
  const parseMin = (v) => Math.max(0, parseInt(v, 10) || 0);
  const parseMax = (v) => Math.max(min, parseInt(v, 10) || min);
  return (
    <div className="grid grid-cols-2 gap-2">
      <div>
        <p className="text-[10px] uppercase tracking-wider text-stone-500 mb-1">Min</p>
        <input type="number" min="0" className="input w-full"
          value={min}
          onChange={e => { const m = parseMin(e.target.value); onChange(m, Math.max(m, max)); }} />
      </div>
      <div>
        <p className="text-[10px] uppercase tracking-wider text-stone-500 mb-1">Max</p>
        <input type="number" min={min} className="input w-full"
          value={max}
          onChange={e => onChange(min, parseMax(e.target.value))} />
      </div>
    </div>
  );
}

      <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
        {checks.map(c => (
          <div key={c.key} className={`rounded-xl bg-white ring-1 px-3 py-2 flex items-center gap-2 ${c.ok ? 'ring-emerald-200' : 'ring-amber-200'}`}>
            {c.ok
              ? <CheckCircle2 size={16} className="text-emerald-600 shrink-0" />
              : <AlertCircle size={16} className="text-amber-600 shrink-0" />}
            <span className={`flex-1 min-w-0 text-sm ${c.ok ? 'text-stone-700' : 'text-stone-800'}`} style={{ fontWeight: c.ok ? 400 : 500 }}>
              {c.ok ? c.okLabel : c.missingLabel}
            </span>
            {!c.ok && (
              <button
                type="button"
                onClick={() => onOpenView?.(c.view)}
                className="text-xs text-stone-700 hover:text-stone-900 underline shrink-0"
              >
                {c.action}
              </button>
            )}
          </div>
        ))}
      </div>
      {generatorExcludedCount > 0 && (
        <p className="mt-3 text-xs text-stone-500">
          {generatorExcludedCount} {generatorExcludedCount === 1 ? 'person är avskild' : 'personer är avskilda'} från Schemageneratorn och används i stället i Personligt schema, Uppdrag, Skola och Drift.
        </p>
      )}
    </div>
  );
}

function ScheduleView({ dayData, activeDay, setActiveDay, onEdit, staffCount, onGoToStaff, onLoadExample, departments, passBank,
                        generatorExcludedCount = 0, hasGeneratorDraft = false, onPublishDraft, onClearDraft,
                        coverageBlocks = [], onOpenView, onGenerate, generating = false,
                        publishWarnings = [], onOpenAssignments, onDismissPublishWarnings,
                        fridayCycleWeeks, currentFridayWeek, setCurrentFridayWeek, hasFridaySetup,
                        fridayTemplateRotation = [], onUpdateShift,
                        baselineStaff = null, onResetShift, onResetAll }) {
  const [coverageFocus, setCoverageFocus] = useState(dayData.primaryCoverageKey || COVERAGE_SHARED);
  // Inline-redigering: vilken person redigeras just nu (id eller null), och
  // utkasts-värdena innan användaren sparar. null = ingen rad redigeras.
  const [editingRowId, setEditingRowId] = useState(null);
  const [editDraft, setEditDraft] = useState({ start: '', end: '' });
  const [editError, setEditError] = useState('');

  const ticks = []; for (let m = 360; m <= TIMELINE_END; m += 60) ticks.push(m);
  const isFriday = activeDay === 'fri';
  const dayLabel = isFriday ? 'Fredag' : DAYS.find(d => d.key === activeDay).label;
  const visibleCoverageViews = dayData.coverageViews;

  useEffect(() => {
    const available = visibleCoverageViews.map(v => v.key);
    if (!available.includes(coverageFocus)) {
      setCoverageFocus(dayData.primaryCoverageKey || available[0] || COVERAGE_SHARED);
    }
  }, [coverageFocus, dayData.primaryCoverageKey, visibleCoverageViews]);

  // Avbryt pågående redigering om man byter dag eller fredagsvecka mellan
  // klicken — annars riskerar utkastet att hamna på fel rad.
  useEffect(() => { cancelInlineEdit(); }, [activeDay, currentFridayWeek]);

  // ESC stänger redigeringsläget, Enter sparar.
  useEffect(() => {
    if (editingRowId == null) return;
    const onKey = (e) => {
      if (e.key === 'Escape') { e.preventDefault(); cancelInlineEdit(); }
      else if (e.key === 'Enter') { e.preventDefault(); saveInlineEdit(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });

  // Hjälpfunktioner för inline-redigering. Definierade efter useEffects ovan
  // pga JS-hoisting för `function`-deklarationer (de fungerar trots placeringen).
  function startInlineEdit(person) {
    const sh = isFriday ? person._friShift : person.sched?.[activeDay];
    setEditingRowId(person.id);
    setEditDraft({ start: sh?.[0] || '', end: sh?.[1] || '' });
    setEditError('');
  }
  function cancelInlineEdit() {
    setEditingRowId(null);
    setEditDraft({ start: '', end: '' });
    setEditError('');
  }
  function saveInlineEdit() {
    if (editingRowId == null) return;
    const { start, end } = editDraft;
    if (!start || !end) {
      setEditError('Fyll i både start- och sluttid');
      return;
    }
    const startMin = timeToMin(start);
    const endMin = timeToMin(end);
    if (startMin == null || endMin == null) {
      setEditError('Ogiltigt tidsformat');
      return;
    }
    if (endMin <= startMin) {
      setEditError('Sluttiden måste vara efter starttiden');
      return;
    }
    if (endMin - startMin < 60) {
      setEditError('Passet måste vara minst 60 min');
      return;
    }
    onUpdateShift?.(editingRowId, activeDay, [start, end], { fridayWeek: currentFridayWeek });
    cancelInlineEdit();
  }
  function setMarkedAsOff() {
    if (editingRowId == null) return;
    onUpdateShift?.(editingRowId, activeDay, null, { fridayWeek: currentFridayWeek });
    cancelInlineEdit();
  }

  // Baseline-lookup (O(1)) för "ändrad sedan generering"-jämförelse.
  // baselineStaff är en snapshot av staff[] från senaste utgångspunkten
  // (generering, exempelinläsning eller filinläsning).
  const baselineById = useMemo(() => {
    if (!baselineStaff) return null;
    return new Map(baselineStaff.map(p => [p.id, p]));
  }, [baselineStaff]);

  // Helper: avgör om två shifts är olika. Båda null = lika (oförändrad).
  function shiftsDiffer(a, b) {
    if (a == null && b == null) return false;
    if (a == null || b == null) return true;
    return a[0] !== b[0] || a[1] !== b[1];
  }

  // Vilka av de synliga raderna är ändrade sedan baselinen?
  // Räknar bara aktiv dag (för fredag: aktiv vecka). Andra dagar har sina egna
  // räknare när man navigerar till dem.
  // Personer som inte finns i baselinen (tillagda efter utgångspunkten) räknas
  // INTE som ändrade – de är nya tillägg och har inget att återställa till.
  const changedRowIds = useMemo(() => {
    if (!baselineById) return new Set();
    const ids = new Set();
    for (const p of dayData.present) {
      const bp = baselineById.get(p.id);
      if (!bp) continue;
      const currentSh = isFriday ? p._friShift : p.sched?.[activeDay];
      const baselineSh = getShiftForDay(bp, activeDay, {
        fridayWeek: currentFridayWeek,
        cycleWeeks: fridayCycleWeeks,
        fridayTemplateRotation,
      });
      if (shiftsDiffer(currentSh, baselineSh)) ids.add(p.id);
    }
    return ids;
  }, [baselineById, dayData.present, activeDay, isFriday, currentFridayWeek, fridayCycleWeeks, fridayTemplateRotation]);

  // Återställ alla ändrade rader på aktiv dag/vecka. Skickar ett anrop per
  // ändrad person till onResetShift, som hanterar rätt fält per fredagsläge.
  function resetActiveDay() {
    if (changedRowIds.size === 0) return;
    const weekSuffix = isFriday ? ` vecka ${currentFridayWeek}` : '';
    const count = changedRowIds.size;
    if (!confirm(`Återställa ${count} manuell ändring${count === 1 ? '' : 'ar'} på ${dayLabel.toLowerCase()}${weekSuffix} till utgångspunkten?`)) return;
    for (const id of changedRowIds) {
      onResetShift?.(id, activeDay, { fridayWeek: currentFridayWeek });
    }
  }

  const focusedCoverage = visibleCoverageViews.find(v => v.key === coverageFocus)
    || visibleCoverageViews[0]
    || dayData.coverageViews[0]
    || null;
  const visiblePresent = focusedCoverage?.present || dayData.present;
  const maxCount = Math.max(...((focusedCoverage?.slots || []).map(s => Math.max(s.count, s.min))), 5);
  const gapAlerts = visibleCoverageViews
    .filter(view => view.gaps.length > 0)
    .flatMap(view => summarizeGapSegments(view.slots).map((segment, idx) => ({
      id: `${view.key}-${idx}`,
      label: view.label,
      scopeType: view.scopeType,
      start: segment.start,
      end: segment.end,
      maxShortfall: segment.maxShortfall,
      totalShortfallMinutes: segment.totalShortfallMinutes,
      slotCount: segment.slotCount,
    })))
    .sort((a, b) => b.totalShortfallMinutes - a.totalShortfallMinutes || a.start - b.start);
  const overAlerts = visibleCoverageViews
    .filter(view => view.overs.length > 0)
    .flatMap(view => summarizeGapSegments(view.slots.map(slot => ({
      ...slot,
      min: slot.over ? ((slot.count || 0) - (slot.max || 0)) : 0,
      count: 0,
    }))).map((segment, idx) => ({
      id: `${view.key}-over-${idx}`,
      label: view.label,
      start: segment.start,
      end: segment.end,
      maxOverflow: segment.maxShortfall,
      totalOverflowMinutes: segment.totalShortfallMinutes,
    })))
    .sort((a, b) => b.totalOverflowMinutes - a.totalOverflowMinutes || a.start - b.start);

  if (staffCount === 0) {
    return (
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-12 text-center">
        <div className="display-font text-2xl text-stone-800 mb-2">Ingen fritidspersonal i generatorn än</div>
        <p className="text-sm text-stone-500 mb-6 max-w-md mx-auto">
          Lägg till personalen som ska ingå i fritidsschemat, eller ändra befattning på de personer som ska kunna pusslas av Schemageneratorn. Renodlade lärare hanteras i Personligt schema, Uppdrag, Skola och Drift.
        </p>
        <div className="flex gap-2 justify-center">
          <button onClick={onGoToStaff} className="px-5 py-2.5 rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition text-sm flex items-center gap-2">
            <Users size={14} />Gå till Personal
          </button>
          <button onClick={onLoadExample} className="px-5 py-2.5 rounded-lg bg-stone-100 text-stone-700 hover:bg-stone-200 transition text-sm">
            Välj exempeldata
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="space-y-4">
      <TabIntro>
        Schemageneratorn är ett verktyg för att bygga personalschema för fritidshemmet. Den använder bara personer som är markerade som ingår i Schemagenerator, pusslar fram grundschema utifrån passbank och bemanningskrav, och lämnar övriga scheman till Personligt schema, Uppdrag, Skola och Drift.
      </TabIntro>
      <div className={`rounded-2xl ring-1 p-4 flex items-start justify-between gap-3 flex-wrap ${hasGeneratorDraft ? 'bg-sky-50/70 ring-sky-200' : 'bg-white ring-stone-200'}`}>
        <div className="min-w-0">
          <p className="text-[10px] uppercase tracking-wider text-stone-500">Generatorverkstad</p>
          <h3 className="display-font text-lg text-stone-800 mt-0.5">
            {hasGeneratorDraft ? 'Du arbetar i ett generatorutkast' : 'Inget separat utkast öppet'}
          </h3>
          <p className="text-sm text-stone-600 mt-1 max-w-3xl">
            {hasGeneratorDraft
              ? 'Justera tider och pussla färdigt här. Huvudschemat ändras först när du flyttar utkastet dit.'
              : 'Generera ett förslag och välj Arbeta vidare i generatorn om du vill pussla klart utan att ändra huvudschemat.'}
          </p>
        </div>
        <div className="flex gap-2 flex-wrap">
          {hasGeneratorDraft && (
            <>
              <button type="button" onClick={onPublishDraft}
                className="px-4 py-2 rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition text-sm flex items-center gap-2">
                <ArrowRight size={14} />Flytta till huvudschema
              </button>
              <button type="button" onClick={onClearDraft}
                className="px-4 py-2 rounded-lg bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50 transition text-sm">
                Stäng utkast
              </button>
            </>
          )}
        </div>
      </div>
      <GeneratorPrerequisitesBanner
        staffCount={staffCount}
        generatorExcludedCount={generatorExcludedCount}
        passBankCount={Array.isArray(passBank) ? passBank.length : 0}
        coverageCount={Array.isArray(coverageBlocks) ? coverageBlocks.length : 0}
        onOpenView={onOpenView}
        onGenerate={onGenerate}
        generating={generating}
      />
      {publishWarnings.length > 0 && (
        <div className="bg-amber-50 ring-1 ring-amber-200 rounded-2xl p-4">
          <div className="flex items-start justify-between gap-3 flex-wrap">
            <div>
              <p className="text-[10px] uppercase tracking-wider text-amber-700">Kontrollera uppdrag efter överföring</p>
              <h3 className="display-font text-lg text-stone-800 mt-0.5">Några uppdrag behöver ses över</h3>
              <p className="text-sm text-stone-600 mt-1">
                Generatorn har flyttat arbetspass. Uppdrag finns kvar, men vissa ligger nu utanför arbetstid eller överlappar.
              </p>
            </div>
            <div className="flex gap-2 flex-wrap">
              <button type="button" onClick={onOpenAssignments}
                className="px-4 py-2 rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition text-sm">
                Öppna Uppdrag
              </button>
              <button type="button" onClick={onDismissPublishWarnings}
                className="px-4 py-2 rounded-lg bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50 transition text-sm">
                Dölj
              </button>
            </div>
          </div>
          <div className="mt-3 grid md:grid-cols-2 gap-2">
            {publishWarnings.slice(0, 6).map((warning, index) => (
              <div key={`${warning.personId}-${warning.dayKey}-${warning.fridayWeek || 'base'}-${index}`} className="rounded-xl bg-white ring-1 ring-amber-200 px-3 py-2 text-sm text-stone-700">
                <p style={{ fontWeight: 600 }}>{warning.personName} · {warning.dayLabel}{warning.fridayWeek ? ` v.${warning.fridayWeek}` : ''}</p>
                <p className="text-xs text-stone-500 mt-0.5">{warning.issues[0]}</p>
              </div>
            ))}
          </div>
          {publishWarnings.length > 6 && (
            <p className="text-xs text-stone-500 mt-2">Visar 6 av {publishWarnings.length} saker att kontrollera.</p>
          )}
        </div>
      )}
      <div className="sticky top-[72px] z-20 -mx-2 rounded-2xl bg-[#FBF8F4]/95 px-2 py-2 shadow-sm ring-1 ring-stone-200/70 backdrop-blur">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div className="flex gap-2 flex-wrap">
            {DAYS.map(d => (
              <button key={d.key} onClick={() => setActiveDay(d.key)}
                className={`px-4 py-2 rounded-lg text-sm transition ${activeDay === d.key ? 'bg-stone-800 text-white' : 'bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50'}`}>
                {d.label}
              </button>
            ))}
            <button key="fri" onClick={() => setActiveDay('fri')}
              className={`px-4 py-2 rounded-lg text-sm transition ${isFriday ? 'bg-stone-800 text-white' : 'bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50'}`}>
              Fredag
            </button>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            {isFriday && hasFridaySetup && (
              <div className="flex items-center gap-2 bg-white ring-1 ring-stone-200 rounded-lg px-2 py-1">
                <button onClick={() => setCurrentFridayWeek(w => ((w - 2 + fridayCycleWeeks) % fridayCycleWeeks) + 1)}
                  className="p-1 hover:bg-stone-100 rounded text-stone-600">‹</button>
                <span className="text-sm tabular-nums text-stone-700 px-2">
                  Vecka <span className="display-font" style={{ fontWeight: 500 }}>{currentFridayWeek}</span> av {fridayCycleWeeks}
                </span>
                <button onClick={() => setCurrentFridayWeek(w => (w % fridayCycleWeeks) + 1)}
                  className="p-1 hover:bg-stone-100 rounded text-stone-600">›</button>
              </div>
            )}
            {staffCount > 0 && (
              <button onClick={() => window.print()}
                className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50 transition"
                title="Skriv ut hela veckan – välj 'Spara som PDF' i webbläsarens print-dialog för att skapa en PDF-fil">
                <Printer size={14} />
                Skriv ut / PDF
              </button>
            )}
          </div>
        </div>
      </div>

      {isFriday && !hasFridaySetup && (
        <div className="bg-amber-50 ring-1 ring-amber-200 rounded-lg p-4 flex items-start gap-3">
          <AlertCircle size={16} className="text-amber-700 mt-0.5 flex-shrink-0" />
          <div className="text-sm text-stone-700">
            <p style={{ fontWeight: 500 }}>Ingen fredagsrutin ifylld än</p>
            <p className="text-xs text-stone-600 mt-1">Klicka på en person i Personal-fliken och fyll i deras fredagstider.</p>
          </div>
        </div>
      )}

      {/* Diff-indikator: visas bara om det finns ändringar på aktiv dag/vecka
          sedan senaste utgångspunkt (generering, exempelinläsning eller filimport). */}
      {changedRowIds.size > 0 && (
        <div className="bg-amber-50 ring-1 ring-amber-200 rounded-lg px-4 py-2.5 flex items-center justify-between gap-3 flex-wrap">
          <div className="text-sm text-stone-700 flex items-center gap-2">
            <span className="text-amber-700">?</span>
            <span>
              <span style={{ fontWeight: 500 }}>{changedRowIds.size}</span> manuell ändring{changedRowIds.size === 1 ? '' : 'ar'} sedan utgångspunkten
              {isFriday && ` på fredag vecka ${currentFridayWeek}`}
              {!isFriday && ` på ${dayLabel.toLowerCase()}`}
            </span>
          </div>
          <button type="button" onClick={resetActiveDay}
            className="text-xs px-3 py-1 rounded-md bg-white text-amber-700 ring-1 ring-amber-300 hover:bg-amber-100 transition">
            Återställ {isFriday ? 'fredag v.' + currentFridayWeek : dayLabel.toLowerCase()}
          </button>
        </div>
      )}

      {gapAlerts.length > 0 && (
        <div className="bg-orange-50 ring-1 ring-orange-200 rounded-xl p-4">
          <div className="flex items-center gap-2 mb-3">
            <AlertCircle size={15} className="text-orange-600" />
            <p className="text-sm text-stone-800" style={{ fontWeight: 500 }}>
              Bemanningsbrister {isFriday && hasFridaySetup ? `på fredag vecka ${currentFridayWeek}` : `på ${dayLabel.toLowerCase()}`}
            </p>
          </div>
          <div className="space-y-1.5">
            {gapAlerts.slice(0, 6).map(alert => (
              <div key={alert.id} className="text-sm text-stone-700 flex items-start gap-2">
                <ChevronRight size={14} className="text-orange-600 mt-0.5 flex-shrink-0" />
                <span>
                  <span style={{ fontWeight: 500 }}>{alert.label}:</span> under krav {minToTime(alert.start)}–{minToTime(alert.end)}
                  {` · som mest ${alert.maxShortfall} ${alert.maxShortfall === 1 ? 'person' : 'personer'} kort`}
                </span>
              </div>
            ))}
            {gapAlerts.length > 6 && (
              <p className="text-xs text-stone-500 pt-1">
                Visar de 6 största bristerna. Växla mellan korten ovan för att se varje avdelning mer i detalj.
              </p>
            )}
          </div>
        </div>
      )}

      {overAlerts.length > 0 && (
        <div className="bg-amber-50 ring-1 ring-amber-200 rounded-xl p-4">
          <div className="flex items-center gap-2 mb-3">
            <AlertCircle size={15} className="text-amber-700" />
            <p className="text-sm text-stone-800" style={{ fontWeight: 500 }}>
              Fler än planerat {isFriday && hasFridaySetup ? `på fredag vecka ${currentFridayWeek}` : `på ${dayLabel.toLowerCase()}`}
            </p>
          </div>
          <div className="space-y-1.5">
            {overAlerts.slice(0, 4).map(alert => (
              <div key={alert.id} className="text-sm text-stone-700 flex items-start gap-2">
                <ChevronRight size={14} className="text-amber-700 mt-0.5 flex-shrink-0" />
                <span>
                  <span style={{ fontWeight: 500 }}>{alert.label}:</span> fler än max {minToTime(alert.start)}–{minToTime(alert.end)}
                  {` · som mest ${alert.maxOverflow} ${alert.maxOverflow === 1 ? 'person för mycket' : 'personer för mycket'}`}
                </span>
              </div>
            ))}
          </div>
        </div>
      )}

      {visibleCoverageViews.length > 0 && (
        <div className="grid md:grid-cols-2 xl:grid-cols-4 gap-3">
          {visibleCoverageViews.map(view => {
            const selected = focusedCoverage?.key === view.key;
            return (
              <button key={view.key} onClick={() => setCoverageFocus(view.key)}
                className={`text-left rounded-xl p-4 transition ring-1 ${selected ? 'bg-stone-800 text-white ring-stone-800 shadow-lg' : 'bg-white text-stone-800 ring-stone-200 hover:bg-stone-50'}`}>
                <div className="flex items-center justify-between gap-3">
                  <span className="text-sm" style={{ fontWeight: 500 }}>{view.label}</span>
                  <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: view.color }} />
                </div>
                <p className={`text-xs mt-2 ${selected ? 'text-stone-300' : 'text-stone-500'}`}>
                  {view.slots.some(s => s.min > 0)
                    ? `${view.gaps.length} gap · ${view.gapMinutes} min underskott${view.overs.length > 0 ? ` · ${view.overs.length} över max` : ''}`
                    : 'Inga krav satta än'}
                </p>
              </button>
            );
          })}
        </div>
      )}

      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
        <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
          <div>
            <h2 className="display-font text-xl text-stone-800">{dayLabel}{isFriday && hasFridaySetup ? ` · vecka ${currentFridayWeek}` : ''}</h2>
            {focusedCoverage && (
              <p className="text-xs text-stone-500 mt-1">
                Visar bemanning för <span style={{ fontWeight: 500 }}>{focusedCoverage.label.toLowerCase()}</span>
              </p>
            )}
          </div>
          <div className="flex gap-3 text-xs flex-wrap">
            {departments.map(d => (
              <span key={d.id} className="flex items-center gap-1.5">
                <span className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: d.color }} />
                <span className="text-stone-600">{d.name}</span>
              </span>
            ))}
          </div>
        </div>

        <div className="relative h-6 mb-2 ml-32 border-b border-stone-200">
          {ticks.map(m => (
            <div key={m} className="absolute top-0 text-[10px] text-stone-400" style={{ left: `${pctFromMin(m)}%`, transform: 'translateX(-50%)' }}>
              {minToTime(m)}<div className="w-px h-1.5 bg-stone-300 mx-auto mt-0.5" />
            </div>
          ))}
        </div>

        <div className="space-y-1.5">
          {visiblePresent.length === 0 && (
            <p className="text-sm text-stone-400 italic py-4 text-center">
              {focusedCoverage?.scopeType === COVERAGE_DEPARTMENT ? 'Ingen personal från denna avdelning arbetar just nu' : `Ingen personal arbetar denna ${isFriday ? 'fredag' : 'dag'}`}
            </p>
          )}
          {visiblePresent.map(p => {
            const dept = getDept(p.deptId, departments);
            const soft = softColor(dept.color);
            const currentShift = isFriday ? p._friShift : p.sched[activeDay];
            const shiftLabel = `${currentShift[0]}–${currentShift[1]}`;
            const isEditing = editingRowId === p.id;
            const isChanged = changedRowIds.has(p.id);
            // Hitta passnamnet om passet matchar passbanken
            const matchingPass = (typeof passBank !== 'undefined' && Array.isArray(passBank))
              ? normalizePassBank(passBank).find(pass =>
                  pass.days.includes(activeDay) && shiftMatchesPass(currentShift, pass)
                )
              : null;
            const passName = matchingPass?.name || '';
            const tooltipText = passName
              ? `${p.name} – ${passName} (${shiftLabel})`
              : `${p.name} – ${shiftLabel}`;

            // Veckotim-räkning för raden. När personen redigeras live visar vi
            // en *preview* baserat på utkastet så användaren ser konsekvensen
            // av sitt byte direkt utan att behöva spara.
            const previewShift = isEditing && editDraft.start && editDraft.end
              && timeToMin(editDraft.end) > timeToMin(editDraft.start)
              ? normalizeShift([editDraft.start, editDraft.end])
              : null;
            const personForCalc = isEditing && previewShift
              ? buildPreviewPerson(p, activeDay, previewShift, currentFridayWeek, fridayCycleWeeks)
              : p;
            const weekMin = weeklyMinutes(personForCalc, fridayCycleWeeks, fridayTemplateRotation);
            const targetMin = getTargetMin(p);
            const diffMin = weekMin - targetMin;
            const onTarget = Math.abs(diffMin) <= 5;
            const hoursColor = onTarget ? 'text-stone-500' : (diffMin > 0 ? 'text-amber-700' : 'text-orange-700');
            const hoursLabel = `${minToHM(weekMin)} / ${minToHM(targetMin)}`;
            const diffLabel = onTarget ? '' : (diffMin > 0 ? `+${minToHM(diffMin)}` : `-${minToHM(-diffMin)}`);

            return (
              <div key={p.id} className="flex items-center group">
                <div className="w-32 pr-3 text-right">
                  <button onClick={() => onEdit(p.id)} className="text-sm text-stone-800 hover:text-stone-900 truncate flex items-center gap-1 ml-auto">
                    <Edit3 size={10} className="opacity-0 group-hover:opacity-50 transition" />{p.name}
                  </button>
                  {p.role && <p className="text-[10px] text-stone-500 truncate">{p.role}</p>}
                  <p className={`text-[10px] truncate tabular-nums ${hoursColor}`} title={`Veckotid på plats: ${minToHM(weekMin)} (mål på plats ${minToHM(targetMin)})`}>
                    {hoursLabel}{diffLabel && <span className="ml-1">({diffLabel})</span>}
                  </p>
                </div>
                {isEditing ? (
                  /* Inline-redigering: två time-fält + spara/avbryt/markera ledig */
                  <div className="flex-1 flex items-center gap-2 bg-amber-50 ring-1 ring-amber-200 rounded-md px-2 py-1">
                    <input type="time" className="input w-28" autoFocus
                      value={editDraft.start}
                      onChange={e => { setEditDraft(d => ({ ...d, start: e.target.value })); setEditError(''); }} />
                    <span className="text-stone-400 text-xs">–</span>
                    <input type="time" className="input w-28"
                      value={editDraft.end}
                      onChange={e => { setEditDraft(d => ({ ...d, end: e.target.value })); setEditError(''); }} />
                    {editDraft.start && editDraft.end && timeToMin(editDraft.end) > timeToMin(editDraft.start) && (
                      <span className="text-[10px] text-stone-500 tabular-nums" title={getWorkedDurationTitleFromRawMinutes(timeToMin(editDraft.end) - timeToMin(editDraft.start))}>
                        {formatWorkedDurationFromRawMinutes(timeToMin(editDraft.end) - timeToMin(editDraft.start))}
                      </span>
                    )}
                    {editError && <span className="text-[10px] text-rose-700 ml-1">{editError}</span>}
                    <div className="ml-auto flex items-center gap-1">
                      <button type="button" onClick={saveInlineEdit}
                        className="text-[11px] px-2 py-1 rounded bg-stone-800 text-white hover:bg-stone-900 transition">
                        Spara
                      </button>
                      <button type="button" onClick={cancelInlineEdit}
                        className="text-[11px] px-2 py-1 rounded bg-white text-stone-600 ring-1 ring-stone-200 hover:bg-stone-50 transition">
                        Avbryt
                      </button>
                      <button type="button" onClick={setMarkedAsOff}
                        className="text-[11px] px-2 py-1 rounded text-stone-500 hover:text-rose-700 transition"
                        title="Markera personen som ledig denna dag">
                        Ledig
                      </button>
                    </div>
                  </div>
                ) : (
                  /* Läsläge: stapel som öppnar inline-redigering vid klick */
                  <div className={`flex-1 relative h-7 bg-stone-50 rounded-md cursor-pointer ${isChanged ? 'ring-1 ring-amber-400 ring-dashed' : ''}`}
                    onClick={() => startInlineEdit(p)}
                    title={`${tooltipText}${isChanged ? ' · Ändrad sedan utgångspunkt' : ''} · Klicka för att redigera tid`}>
                    <div className="absolute h-full rounded-md flex items-center px-2 transition-all hover:opacity-90"
                      style={{ left: `${pctFromMin(p.startMin)}%`, width: `${pctFromMin(p.endMin) - pctFromMin(p.startMin)}%`,
                        backgroundColor: soft, borderLeft: `3px solid ${isChanged ? '#d97706' : dept.color}` }}>
                      <span className="text-[11px] truncate text-stone-700" style={{ fontWeight: 500 }}>
                        {isChanged && <span className="text-amber-700 mr-1" title="Ändrad sedan utgångspunkt">?</span>}
                        {passName ? `${shiftLabel} · ${passName}` : shiftLabel}
                      </span>
                    </div>
                    {isChanged && onResetShift && (
                      <button type="button"
                        onClick={(e) => {
                          e.stopPropagation();
                          onResetShift(p.id, activeDay, { fridayWeek: currentFridayWeek });
                        }}
                        className="absolute right-1 top-1/2 -translate-y-1/2 text-[10px] px-1.5 py-0.5 rounded bg-white text-amber-700 ring-1 ring-amber-300 hover:bg-amber-50 opacity-0 group-hover:opacity-100 transition"
                        title="Återställ denna rad till utgångspunkten">
                        Återställ
                      </button>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {focusedCoverage && (
          <div className="mt-6 pt-4 border-t border-stone-100">
            <div className="flex items-center justify-between mb-2">
              <p className="text-xs uppercase tracking-wider text-stone-500">Antal personal per 15 min</p>
              {focusedCoverage.gaps.length > 0 ? (
                <span className="text-xs text-orange-600 flex items-center gap-1">
                  <AlertCircle size={12} />{focusedCoverage.gaps.length} {focusedCoverage.gaps.length === 1 ? 'tillfälle' : 'tillfällen'} med för lite personal
                </span>
              ) : focusedCoverage.overs.length > 0 ? (
                <span className="text-xs text-amber-700 flex items-center gap-1">
                  <AlertCircle size={12} />{focusedCoverage.overs.length} perioder över max
                </span>
              ) : (
                <span className="text-xs text-emerald-600 flex items-center gap-1">
                  <CheckCircle2 size={12} />Täcker alla krav
                </span>
              )}
            </div>
            <div className="ml-32 relative h-16 bg-stone-50 rounded-md overflow-hidden">
              {focusedCoverage.slots.map(s => {
                const w = 100 / focusedCoverage.slots.length;
                const left = ((s.start - TIMELINE_START) / TIMELINE_RANGE) * 100;
                const h = (s.count / maxCount) * 100;
                return <div key={s.start} className="absolute bottom-0" style={{ left: `${left}%`, width: `${w}%`, height: `${h}%`,
                  backgroundColor: s.gap ? '#F59E0B' : (s.over ? '#D97706' : focusedCoverage.color), opacity: s.gap || s.over ? 0.85 : 0.55 }} />;
              })}
              {focusedCoverage.slots.map(s => {
                const left = ((s.start - TIMELINE_START) / TIMELINE_RANGE) * 100;
                const w = 100 / focusedCoverage.slots.length;
                const h = (s.min / maxCount) * 100;
                return <div key={`m${s.start}`} className="absolute" style={{ left: `${left}%`, width: `${w}%`,
                  bottom: `${h}%`, height: '1px', backgroundColor: '#dc2626', opacity: 0.6 }} />;
              })}
            </div>
            <div className="ml-32 mt-1 flex items-center gap-4 text-[10px] text-stone-500">
              <span className="flex items-center gap-1"><span className="w-2 h-2" style={{ backgroundColor: focusedCoverage.color, opacity: 0.55 }} />Faktisk</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2" style={{ backgroundColor: '#F59E0B', opacity: 0.85 }} />Under min</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2" style={{ backgroundColor: '#D97706', opacity: 0.85 }} />Över max</span>
              <span className="flex items-center gap-1"><span className="w-3 h-px" style={{ backgroundColor: '#dc2626' }} />Krav</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function StaffView({ staff, fridayCycleWeeks, fridayTemplateRotation, violations, onEdit, onAdd, onLoadExample, departments }) {
  const [roleFilter, setRoleFilter] = useState('all');
  const [staffSearch, setStaffSearch] = useState('');
  const roleFilterOptions = [
    { id: 'all', label: 'Alla', match: () => true },
    { id: 'generator', label: 'Schemagenerator', match: person => isFritidsGeneratorPerson(person) },
    { id: 'fritids', label: 'Lärare i fritidshem', match: person => getStaffRoleCategory(person) === 'fritids' },
    { id: 'teacher', label: 'Lärare', match: person => getStaffRoleCategory(person) === 'teacher' },
    { id: 'support', label: 'Vikarie/resurs', match: person => getStaffRoleCategory(person) === 'support' },
    { id: 'other', label: 'Övriga', match: person => getStaffRoleCategory(person) === 'other' },
  ];
  const roleCounts = useMemo(() => {
    return Object.fromEntries(roleFilterOptions.map(option => [
      option.id,
      staff.filter(person => option.match(person)).length,
    ]));
  }, [staff]);
  const filteredStaff = useMemo(() => {
    const activeOption = roleFilterOptions.find(option => option.id === roleFilter) || roleFilterOptions[0];
    const needle = staffSearch.trim().toLowerCase();
    return staff.filter(person => {
      if (!activeOption.match(person)) return false;
      if (!needle) return true;
      const dept = getDept(person.deptId, departments);
      const text = `${person.name || ''} ${getStaffRoleLabel(person.employmentRole)} ${person.role || ''} ${dept.name || ''}`.toLowerCase();
      return text.includes(needle);
    });
  }, [staff, departments, roleFilter, staffSearch]);
  if (staff.length === 0) {
    return (
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-12 text-center">
        <Users size={32} className="mx-auto text-stone-300 mb-3" />
        <div className="display-font text-2xl text-stone-800 mb-2">Lägg till första personen</div>
        <p className="text-sm text-stone-500 mb-6 max-w-md mx-auto">
          Börja med en person i taget. Du anger främst avdelning, tjänstgöringsgrad, vilka pass personen får ta, fredagsrutin och villkor som styr när personen kan arbeta.
        </p>
        <div className="flex gap-2 justify-center flex-wrap">
          <button onClick={onAdd} className="px-5 py-2.5 rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition text-sm flex items-center gap-2">
            <Plus size={14} />Lägg till personal
          </button>
          <button onClick={onLoadExample} className="px-5 py-2.5 rounded-lg bg-stone-100 text-stone-700 hover:bg-stone-200 transition text-sm">
            Välj exempeldata
          </button>
        </div>
        <p className="text-xs text-stone-400 mt-6 max-w-sm mx-auto">
          Exempeldatan använder påhittade namn och olika typer av passbanker, så du kan testa generatorn utan att blanda in riktig personal.
        </p>
      </div>
    );
  }
  return (
    <div className="space-y-4">
      <TabIntro>
        Lägg till och redigera personer, befattning, fritidsavdelning, tjänstgöring, fredagsrutin och arbetstider. Lärare kan ligga utan fritidsavdelning och ändå användas i Personligt schema, Uppdrag, Skola och Drift.
      </TabIntro>
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-4 flex flex-col gap-3">
        <div className="flex items-start justify-between gap-3 flex-wrap">
          <div>
            <p className="text-xs uppercase tracking-wider text-stone-500 mb-1">Filtrera personal</p>
            <p className="text-sm text-stone-600">Visa bara den grupp du arbetar med just nu. Filtret påverkar bara listan här, inte schemat eller generatorn.</p>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            <button onClick={onAdd} className="px-4 py-2 rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition text-sm flex items-center gap-2">
              <Plus size={14} />Lägg till personal
            </button>
            <input type="search" value={staffSearch} onChange={e => setStaffSearch(e.target.value)}
              placeholder="Sök namn, roll, avdelning..."
              className="px-3 py-2 rounded-lg bg-white ring-1 ring-stone-200 text-sm text-stone-700 min-w-[260px]" />
          </div>
        </div>
        <div className="flex gap-1 p-1 rounded-xl bg-stone-100 overflow-x-auto">
          {roleFilterOptions.map(option => (
            <button key={option.id} type="button" onClick={() => setRoleFilter(option.id)}
              className={`px-3 py-2 rounded-lg text-sm whitespace-nowrap transition ${roleFilter === option.id ? 'bg-white text-stone-900 shadow-sm ring-1 ring-stone-200' : 'text-stone-600 hover:text-stone-900 hover:bg-stone-50'}`}>
              {option.label}
              <span className={`ml-1.5 text-[10px] rounded-full px-1.5 py-0.5 ${roleFilter === option.id ? 'bg-stone-100 text-stone-600' : 'bg-white/70 text-stone-500'}`}>
                {roleCounts[option.id] || 0}
              </span>
            </button>
          ))}
        </div>
      </div>
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-stone-50 border-b border-stone-200">
            <tr className="text-left text-xs uppercase tracking-wider text-stone-500">
              <th className="px-4 py-3">Namn</th><th className="px-4 py-3">Fritidsavdelning</th>
              <th className="px-4 py-3">Roll</th>
              <th className="px-4 py-3 text-right">Tjänst</th>
              <th className="px-4 py-3 text-right">Mål på plats</th>
              <th className="px-4 py-3 text-right">Faktisk på plats</th>
              <th className="px-4 py-3 text-right">Diff</th>
              <th className="px-4 py-3">Villkor</th>
              <th className="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody>
            {filteredStaff.map(s => {
              const wm = weeklyMinutes(s, fridayCycleWeeks, fridayTemplateRotation);
              const targetMin = getTargetMin(s);
              const diff = wm - targetMin;
              const hasGeneratedWeek = hasWeekdaySchedule(s);
              const off = hasGeneratedWeek && Math.abs(diff) > 5;
              const onTarget = hasGeneratedWeek && diff === 0;
              const diffLabel = !hasGeneratedWeek
                ? 'Ej genererat'
                : diff === 0
                  ? 'OK'
                  : `${diff > 0 ? '+' : '-'}${minToHM(Math.abs(diff))}`;
              const dept = getDept(s.deptId, departments);
              const tags = [];
              if (s.fixedTimes) tags.push('Fast tid');
              tags.push(isFritidsGeneratorPerson(s) ? 'Ingår i generator' : 'Ej generator');
              if (isFritidsGeneratorPerson(s) && !s.deptId) tags.push('Ingen fritidsavdelning');
              if (s.onlyAfternoons) tags.push('Endast em.');
              if (s.earliestStart != null) tags.push(`Tidigast ${minToTime(s.earliestStart)}`);
              if (s.latestStart  != null) tags.push(`Senast börja ${minToTime(s.latestStart)}`);
              if (s.earliestEnd  != null) tags.push(`Minst till ${minToTime(s.earliestEnd)}`);
              if (s.latestEnd    != null) tags.push(`Senast ${minToTime(s.latestEnd)}`);
              if ((s.allowedPassTypes || []).length === 0) tags.push('Alla passtyper');
              if ((s.allowedPassTypes || []).length > 0) tags.push(`${s.allowedPassTypes.length} passtyper`);
              if ((s.allowedPassIds || []).length > 0) tags.push(`${s.allowedPassIds.length} exakta pass`);
              const overrideDays = Object.keys(s.dayOverrides || {}).filter(k => s.dayOverrides[k] && Object.values(s.dayOverrides[k]).some(v => v != null));
              if (overrideDays.length > 0) tags.push(`Dagsundantag: ${overrideDays.map(k => getDayMeta(k).short).join(', ')}`);
              const parityKeys = Object.keys(s.parityOverrides || {}).filter(k => s.parityOverrides[k] && Object.values(s.parityOverrides[k]).some(v => v != null));
              if (parityKeys.length > 0) tags.push(`Varannan: ${parityKeys.map(k => k === 'even' ? 'jämn' : 'udda').join(', ')}`);
              const offDayLabels = getOverviewDaysOffLabels(s, fridayCycleWeeks, fridayTemplateRotation);
              if (offDayLabels.length > 0) tags.push(`Ledig ${offDayLabels.join(', ')}`);
              if (s.fridayMode === 'rotation' && s.fridayUseTemplate) tags.push(`Fredagsmall: start v${s.fridayTemplateStartWeek || 1}`);
              if (s.fridayMode === 'fixed' && normalizeShift(s.fridayShift)) tags.push('Fast fredag');
              if (s.fridayMode === 'fixed' && !normalizeShift(s.fridayShift)) tags.push('Utanför fredagsrullen');
              if (s.fridayMode === 'passbank') tags.push('Passbank på fredag');
              if (s.fridayMode == null) tags.push('? Fredagsläge ej valt');
              return (
                <tr key={s.id} className="border-b border-stone-100 last:border-0 hover:bg-stone-50/50">
                  <td className="px-4 py-3"><p className="text-stone-800" style={{ fontWeight: 500 }}>{s.name}</p></td>
                  <td className="px-4 py-3">
                    <span className="inline-flex items-center gap-1.5 text-xs">
                      <span className="w-2 h-2 rounded-sm" style={{ backgroundColor: dept.color }} />
                      {dept.name}
                    </span>
                  </td>
                  <td className="px-4 py-3 text-stone-600">
                    <p>{getStaffRoleLabel(s.employmentRole)}</p>
                    {s.role && <p className="text-[10px] text-stone-400 mt-0.5">{s.role}</p>}
                  </td>
                  <td className="px-4 py-3 text-right text-stone-700 tabular-nums text-xs">
                    {(s.percent ?? 100)}% av {(s.fullTimeHours ?? 37.5)}h
                  </td>
                  <td className="px-4 py-3 text-right text-stone-700 tabular-nums">{minToHM(targetMin)}</td>
                  <td className={`px-4 py-3 text-right tabular-nums ${off ? (diff > 0 ? 'text-orange-600' : 'text-amber-700') : 'text-stone-700'}`}>
                    {hasGeneratedWeek ? minToHM(wm) : '—'}
                  </td>
                  <td className={`px-4 py-3 text-right tabular-nums text-xs ${off ? (diff > 0 ? 'text-orange-600' : 'text-amber-700') : onTarget ? 'text-emerald-700' : 'text-stone-400'}`}>
                    {onTarget ? (
                      <span className="inline-flex items-center justify-end gap-1 font-medium">
                        <CheckCircle2 size={13} />OK
                      </span>
                    ) : diffLabel}
                  </td>
                  <td className="px-4 py-3">
                    <div className="flex flex-wrap gap-1">
                      {tags.length === 0 && <span className="text-xs text-stone-400">—</span>}
                      {tags.map((c, i) => (<span key={i} className="text-[10px] px-1.5 py-0.5 rounded bg-stone-100 text-stone-700">{c}</span>))}
                    </div>
                  </td>
                  <td className="px-4 py-3">
                    <button onClick={() => onEdit(s.id)} className="text-xs text-stone-500 hover:text-stone-900 flex items-center gap-1">
                      <Edit3 size={12} />Redigera
                    </button>
                  </td>
                </tr>
              );
            })}
            {filteredStaff.length === 0 && (
              <tr>
                <td colSpan="9" className="px-4 py-8 text-center text-sm text-stone-500">
                  Ingen personal matchar filtret eller sökningen.
                </td>
              </tr>
            )}
          </tbody>
        </table>
        <div className="px-4 py-3 bg-stone-50/50 border-t border-stone-200 flex justify-between items-center flex-wrap gap-2">
          <span className="text-xs text-stone-500">{filteredStaff.length} visas av {staff.length} personer totalt</span>
          <button onClick={onAdd} className="text-sm flex items-center gap-1.5 text-stone-700 hover:text-stone-900">
            <Plus size={14} />Lägg till personal
          </button>
        </div>
      </div>

      {violations.length > 0 && (
        <div className="bg-orange-50 ring-1 ring-orange-200 rounded-xl p-4">
          <div className="flex items-center gap-2 mb-3">
            <AlertCircle size={14} className="text-orange-600" />
            <p className="text-xs uppercase tracking-wider text-orange-700">Att kolla på ({violations.length})</p>
          </div>
          <ul className="space-y-1.5">
            {violations.map((v, i) => (
              <li key={i} className="text-sm text-stone-700 flex items-start gap-2">
                <ChevronRight size={14} className={`mt-0.5 flex-shrink-0 ${v.severity === 'high' ? 'text-orange-600' : 'text-amber-500'}`} />
                <span><span style={{ fontWeight: 500 }}>{v.name}:</span> {v.msg}</span>
              </li>
            ))}
          </ul>
        </div>
      )}
    </div>
  );
}

function AssignmentsView({ staff, departments, assignments, assignmentWindows, setAssignmentWindows, activeDay, setActiveDay, fridayCycleWeeks, fridayTemplateRotation, currentFridayWeek, setCurrentFridayWeek, onEditAssignment }) {
  const [staffQuery, setStaffQuery] = useState('');
  if (staff.length === 0) {
    return (
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-12 text-center">
        <Briefcase size={32} className="mx-auto text-stone-300 mb-3" />
        <div className="display-font text-2xl text-stone-800 mb-2">Uppdrag läggs ovanpå ett färdigt schema</div>
        <p className="text-sm text-stone-500 max-w-md mx-auto">
          Börja i planeringsdelarna först. När personalen har arbetspass kan du här fylla på dagen med lektioner, rastvärd, samverkan, raster och andra bundna uppdrag.
        </p>
      </div>
    );
  }

  const rows = staff.map(person => {
    const shift = getShiftForDay(person, activeDay, {
      fridayWeek: currentFridayWeekSafe(activeDay),
      cycleWeeks: fridayCycleWeeks,
      fridayTemplateRotation,
    });
    const tasks = getAssignmentsForDay(assignments, person.id, activeDay, {
      fridayWeek: currentFridayWeekSafe(activeDay),
      cycleWeeks: fridayCycleWeeks,
    });
    const issues = collectAssignmentIssues(tasks, shift);
    const shiftStart = shift ? timeToMin(shift[0]) : null;
    const baseSegments = getBaseActivitySegments(person, shift, assignmentWindows);
    return { person, shift, tasks, issues, shiftStart, baseSegments };
  }).sort((a, b) => {
    if (a.shiftStart == null && b.shiftStart == null) return a.person.name.localeCompare(b.person.name, 'sv');
    if (a.shiftStart == null) return 1;
    if (b.shiftStart == null) return -1;
    if (a.shiftStart !== b.shiftStart) return a.shiftStart - b.shiftStart;
    return a.person.name.localeCompare(b.person.name, 'sv');
  });

  const withShift = rows.filter(row => row.shift).length;
  const totalTasks = rows.reduce((sum, row) => sum + row.tasks.length, 0);
  const mustCoverCount = rows.reduce((sum, row) => sum + row.tasks.filter(task => task.mustCover).length, 0);
  const issueCount = rows.reduce((sum, row) => sum + row.issues.length, 0);
  const normalizedStaffQuery = staffQuery.trim().toLowerCase();
  const visibleRows = (
    normalizedStaffQuery
      ? rows.filter(row => {
          const dept = getDept(row.person.deptId, departments);
          const haystack = `${row.person.name} ${row.person.role || ''} ${dept.name}`.toLowerCase();
          return haystack.includes(normalizedStaffQuery);
        })
      : rows
  );

  function currentFridayWeekSafe(dayKey) {
    return dayKey === 'fri' ? currentFridayWeek : 1;
  }
  const updateSharedWindow = (patch) => setAssignmentWindows(prev => ({
    ...(prev || {}),
    sharedMorning: { ...(assignmentWindows?.sharedMorning || {}), ...patch },
  }));
  const updateDeptWindow = (deptId, patch) => setAssignmentWindows(prev => ({
    ...(prev || {}),
    deptWindows: {
      ...((prev && prev.deptWindows) || assignmentWindows?.deptWindows || {}),
      [deptId]: { ...(assignmentWindows?.deptWindows?.[deptId] || {}), ...patch },
    },
  }));

  return (
    <div className="space-y-4">
      <style>{`

                        {tasks.map(task => {
                          const meta = getAssignmentTypeMeta(task.type);

                          return (

                              title={`${task.label} · ${minToTime(task.start)}–${minToTime(task.end)}${task.target ? ` · ${task.target}` : ''} · ${task.mustCover ? 'måste täckas' : 'kan släppas'}`}

                      {tasks.length > 0 && (

                                {assignmentCountsAsBreak(task) && (
                                  <span>· {task.breakFlexibility === 'flexible' ? 'flexibel' : 'fast'}</span>
