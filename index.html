        {staff.map(person => {
          const dept = getDept(person.deptId, departments);
          const isOffAlways = (person.daysOff || []).includes('fri');
          const modeLabel = person.fridayMode === 'fixed' ? 'Fast' : person.fridayMode === 'passbank' ? 'Passbank' : person.fridayMode === 'rotation' && person.fridayUseTemplate ? 'Mall' : person.fridayMode === 'rotation' ? 'Egen' : '–';

          const cells = Array.from({ length: N }, (_, idx) => {
            const w = idx + 1;
            if (isOffAlways) return { kind: 'off' };
            if (person.fridayMode === 'fixed') return person.fridayShift ? { kind: 'shift', shift: person.fridayShift, overrideFlag: false } : { kind: 'off' };
            if (person.fridayMode === 'passbank') return { kind: 'passbank' };
            if (person.fridayMode === 'rotation') {
              const isOverride = hasFridayTemplateOverride(person, w);

            return { kind: 'unknown' };
          });
          const workedMins = cells.filter(c => c.kind === 'shift').map(c => workedDayMinutes(c.shift));

                    <span>{person.percent || 100}%</span>
                    <span className="text-stone-300">·</span>
                    <span style={{ color: modeColor, fontWeight: 500 }}>{modeLabel}</span>
                  </div>
                </div>
              </div>
              {cells.map((c, i) => {
                const w = i + 1;
                const isCurrent = w === currentFridayWeek;
                const bg = isCurrent ? '#FFF6EF' : c.overrideFlag ? '#FEF3C7' : '#fff';
                return (
                  <div key={w} className="px-2 py-2 text-center text-[11px] tabular-nums"

                      <span style={{ whiteSpace: 'nowrap' }}>{c.shift[0]}–{c.shift[1]}</span>
                    ) : c.kind === 'passbank' ? (
                      <span className="italic" style={{ color: '#0284C7' }}>passbank</span>
                    ) : (
                      <span className="italic">ledig</span>
                    )}

                );
              })}
              <div className="bg-white px-2 py-2 text-center text-[11px] text-stone-500 tabular-nums">
                {avg > 0 ? `${Math.round(avg / 60 * 10) / 10}h` : '–'}
              </div>
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function PassEditorModal({ pass, departments, isNew, onSave, onClose, onRemove }) {
  const [draft, setDraft] = useState(() => ({
    name: pass?.name || 'Nytt pass',
    start: pass?.start ?? 480,
    end: pass?.end ?? 960,
    passType: pass?.passType || inferPassType({ start: pass?.start ?? 480, end: pass?.end ?? 960 }),
    days: pass?.days?.length ? [...pass.days] : [...WEEKDAY_KEYS],
    deptId: pass?.deptId || '',
    instances: pass?.instances ?? 1,
  }));
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);
  const meta = PASS_TYPES.find(t => t.id === draft.passType) || PASS_TYPES[2];
  const durationMin = Math.max(0, draft.end - draft.start);
  const durationHours = Math.round(durationMin / 6) / 10;
  const valid = draft.name.trim() && draft.end > draft.start && draft.days.length > 0;

  const TIME_START = 360, TIME_END = 1080;
  const pctFn = (m) => Math.max(0, Math.min(100, ((m - TIME_START) / (TIME_END - TIME_START)) * 100));

  const handleSave = () => {
    if (!valid) return;
    onSave({ ...pass, ...draft, name: draft.name.trim() });
  };

  return (
    <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-[#FCFAF7] rounded-3xl shadow-2xl w-full max-w-xl max-h-[92vh] overflow-hidden ring-1 ring-black/5 flex flex-col"

                {draft.name || 'Nytt pass'}

            </div>
          </div>
          <button onClick={onClose} className="text-stone-400 hover:text-stone-700 p-1.5 rounded-lg hover:bg-stone-100 transition shrink-0">
            <X size={18} />
          </button>
        </div>

        {/* Body */}
        <div className="px-6 py-5 space-y-5 overflow-y-auto">
          {/* Name */}
          <div>
            <label className="text-[10.5px] font-semibold uppercase tracking-wider text-stone-500 block mb-1.5">Namn</label>
            <input value={draft.name} onChange={e => setDraft(d => ({ ...d, name: e.target.value }))} autoFocus
              className="w-full px-3 py-2 rounded-lg bg-white text-sm text-stone-800 ring-1 ring-stone-200 outline-none focus:ring-stone-400" />

                    {t.label}
                  </button>
                );

          {/* Days */}

            <label className="text-[10.5px] font-semibold uppercase tracking-wider text-stone-500 block mb-1.5">Dagar</label>
            <div className="flex gap-1.5">
              {DAY_META.map(day => {
                const on = draft.days.includes(day.key);
                return (
                  <button key={day.key} type="button" onClick={() => setDraft(d => ({
                    ...d, days: on ? d.days.filter(k => k !== day.key) : [...d.days, day.key],

            <p className="text-[11px] text-stone-500 mt-1.5">Markera vilka dagar passet ska kunna tilldelas. Aktivera <strong>fre</strong> för att kunna ge det till personer med <em>Passbank</em>-läge på fredag.</p>
          </div>

          <div className="grid grid-cols-2 gap-3">
            {/* Avdelning */}
            <div>
              <label className="text-[10.5px] font-semibold uppercase tracking-wider text-stone-500 block mb-1.5">Avdelning</label>
              <select value={draft.deptId} onChange={e => setDraft(d => ({ ...d, deptId: e.target.value }))}
                className="w-full px-3 py-2 rounded-lg bg-white text-sm text-stone-800 ring-1 ring-stone-200 outline-none focus:ring-stone-400 cursor-pointer">
                <option value="">Alla avdelningar</option>
                {departments.map(dept => <option key={dept.id} value={dept.id}>{dept.name}</option>)}
              </select>
            </div>

            {/* Antal */}
            <div>
              <label className="text-[10.5px] font-semibold uppercase tracking-wider text-stone-500 block mb-1.5">
                Antal {draft.instances === 0 ? <span className="text-stone-400 italic font-normal normal-case tracking-normal">obegränsat</span> : null}
              </label>
              <div className="flex items-center gap-2">
                <button type="button" onClick={() => setDraft(d => ({ ...d, instances: Math.max(0, d.instances - 1) }))}
                  className="w-9 h-9 rounded-lg bg-white text-stone-500 ring-1 ring-stone-200 hover:bg-stone-50 transition flex items-center justify-center">−</button>
                <input type="number" min="0" value={draft.instances}
                  onChange={e => setDraft(d => ({ ...d, instances: Math.max(0, parseInt(e.target.value || '0', 10)) }))}
                  className="flex-1 px-3 py-2 rounded-lg bg-white text-base text-center text-stone-800 ring-1 ring-stone-200 outline-none focus:ring-stone-400 tabular-nums" />
                <button type="button" onClick={() => setDraft(d => ({ ...d, instances: d.instances + 1 }))}
                  className="w-9 h-9 rounded-lg bg-white text-stone-500 ring-1 ring-stone-200 hover:bg-stone-50 transition flex items-center justify-center">+</button>
              </div>
              <p className="text-[11px] text-stone-500 mt-1.5">Max antal personer per dag. 0 = obegränsat.</p>
            </div>
          </div>
        </div>

        {/* Footer */}
        <div className="px-6 py-4 border-t border-stone-200 bg-white/85 flex items-center justify-between gap-3 flex-shrink-0">
          {!isNew && onRemove ? (
            <button onClick={() => { if (confirm(`Ta bort passet "${draft.name}"?`)) onRemove(); }}
              className="px-3 py-2 rounded-lg text-sm text-rose-600 hover:bg-rose-50 transition flex items-center gap-1.5">
              <Trash2 size={14} />Ta bort
            </button>
          ) : <span />}
          <div className="flex gap-2">
            <button onClick={onClose} className="px-4 py-2 rounded-lg text-sm text-stone-600 hover:bg-stone-100 transition">Avbryt</button>
            <button onClick={handleSave} disabled={!valid}
              className="px-5 py-2 rounded-lg text-sm bg-stone-800 text-white hover:bg-stone-900 transition flex items-center gap-1.5 disabled:opacity-50 disabled:cursor-not-allowed">
              <CheckCircle2 size={14} />{isNew ? 'Lägg till' : 'Spara'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// -------- Passbank View (own tab) --------

function PassbankView({ passBank, setPassBank, staff, setStaff, departments }) {
  const passes = normalizePassBank(passBank);
  const [query, setQuery] = useState('');
  const [filterType, setFilterType] = useState('');
  const [filterDept, setFilterDept] = useState('');
  const [editorState, setEditorState] = useState(null); // { pass, isNew } or null

  const savePass = (updated) => {
    if (editorState?.isNew) {
      const id = updated.id || `pass-${Math.random().toString(36).slice(2, 8)}`;
      setPassBank([...passes, normalizePass({ ...updated, id })]);
    } else {
      setPassBank(normalizePassBank(passes.map(p => p.id === updated.id ? { ...p, ...updated } : p)));
    }
    setEditorState(null);
  };
  const removePassFromEditor = () => {
    if (!editorState?.pass) return;
    if (passes.length <= 1) { alert('Passbanken behöver minst ett pass.'); return; }
    setPassBank(normalizePassBank(passes.filter(p => p.id !== editorState.pass.id)));
    setStaff(prev => prev.map(person => ({
      ...person,
      allowedPassIds: (person.allowedPassIds || []).filter(passId => passId !== editorState.pass.id),
    })));
    setEditorState(null);
  };
  const openNew = () => {
    const last = passes[passes.length - 1] || initialPassBank[0];
    const start = clamp((last?.start || 480) + 30, 330, 1020);
    const end = clamp((last?.end || 960) + 30, start + 60, 1080);
    setEditorState({
      pass: { name: 'Nytt pass', start, end, days: WEEKDAY_KEYS, deptId: '', passType: inferPassType({ start, end }), instances: 1 },
      isNew: true,
    });
  };

  // Compute usage: how many staff have a shift matching each pass (sum across days)
  const usage = useMemo(() => {
    const map = new Map();
    passes.forEach(pass => {
      let totalUse = 0;
      (pass.days || []).forEach(day => {
        staff.forEach(person => {
          const shift = normalizeShift(person.sched?.[day]);
          if (shift && shiftMatchesPass(shift, pass)) totalUse++;
        });
      });
      map.set(pass.id, totalUse);
    });
    return map;
  }, [passes, staff]);

  // Summary stats
  const TIME_START = 360, TIME_END = 1080;
  const pctFn = (m) => Math.max(0, Math.min(100, ((m - TIME_START) / (TIME_END - TIME_START)) * 100));
  const earliestStart = passes.length ? Math.min(...passes.map(p => p.start)) : 0;
  const latestEnd = passes.length ? Math.max(...passes.map(p => p.end)) : 0;
  const totalSeats = passes.reduce((s, p) => s + (p.instances || 0), 0);
  const hasUnlimited = passes.some(p => p.instances === 0);

  const visible = passes.filter(p => {
    if (filterType && p.passType !== filterType) return false;
    if (filterDept && p.deptId !== filterDept) return false;
    if (query && !p.name.toLowerCase().includes(query.toLowerCase())) return false;
    return true;
  });

  const passTypeMeta = (id) => PASS_TYPES.find(t => t.id === id) || { id, label: 'Pass', color: '#475569' };
  const dayLabels = { mon: 'M', tue: 'T', wed: 'O', thu: 'T', fri: 'F' };

  return (
    <div className="space-y-4">
      <TabIntro>
        Passen som generatorn får använda på vardagar. Tid, typ och antal styr hur generatorn pusslar och om passet kan delas av flera. Ändringar slår igenom i Vecka, Generator och Drift.
      </TabIntro>

      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        <PbStat label="Totalt antal pass" value={passes.length} />
        <PbStat label="Platser i passbanken" value={totalSeats + (hasUnlimited ? '+' : '')} sub={hasUnlimited ? 'några obegränsade' : 'sammanlagt'} />
        <PbStat label="Pass per dag (mån–tor)" value={passes.filter(p => p.days.includes('mon')).length} sub="aktiva passmöjligheter" />
        <PbStat label="Tidigaste start" value={earliestStart ? minToTime(earliestStart) : '–'} sub={earliestStart ? passes.find(p => p.start === earliestStart)?.name : ''} />
        <PbStat label="Senaste slut" value={latestEnd ? minToTime(latestEnd) : '–'} sub={latestEnd ? passes.find(p => p.end === latestEnd)?.name : ''} />
      </div>

      <div className="flex items-center gap-2 flex-wrap">
        <div className="relative flex-1 max-w-xs">
          <span className="absolute left-3 top-2.5 text-stone-400">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          </span>
          <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Sök pass…"
            className="w-full pl-9 pr-3 py-2 rounded-lg text-sm bg-white ring-1 ring-stone-200 outline-none focus:ring-stone-400" />
        </div>
        <select value={filterType} onChange={e => setFilterType(e.target.value)}
          className="px-3 py-2 rounded-lg text-sm bg-white ring-1 ring-stone-200 outline-none focus:ring-stone-400">
          <option value="">Alla typer</option>
          {PASS_TYPES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
        </select>
        <select value={filterDept} onChange={e => setFilterDept(e.target.value)}
          className="px-3 py-2 rounded-lg text-sm bg-white ring-1 ring-stone-200 outline-none focus:ring-stone-400">
          <option value="">Alla avdelningar</option>
          {departments.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
        </select>
        <div className="flex-1" />
        <span className="text-xs text-stone-500">{visible.length} av {passes.length}</span>
        <button onClick={openNew} className="px-4 py-2 rounded-lg text-sm bg-stone-800 text-white hover:bg-stone-900 transition flex items-center gap-1.5">
          <Plus size={14} />Lägg till pass
        </button>
      </div>

      <div className="bg-white rounded-2xl ring-1 ring-stone-200 overflow-hidden">
        <div className="grid items-center gap-3 px-4 py-2.5 bg-stone-50 border-b border-stone-200 text-[10px] uppercase tracking-wider text-stone-500 font-semibold"
          style={{ gridTemplateColumns: '2fr 220px 130px 130px 80px 130px 30px' }}>
          <div>Namn</div>
          <div>Tid</div>
          <div>Dagar</div>
          <div>Typ</div>
          <div className="text-right">Antal</div>
          <div>Avdelning</div>
          <div></div>
        </div>
        {visible.length === 0 && (
          <div className="px-6 py-10 text-center text-sm text-stone-500">
            Inga pass matchade filtreringen. <button onClick={() => { setQuery(''); setFilterType(''); setFilterDept(''); }} className="underline text-stone-700">Rensa filter</button>
          </div>
        )}
        {visible.map(pass => {
          const meta = passTypeMeta(pass.passType);
          const dept = pass.deptId ? getDept(pass.deptId, departments) : null;
          const used = usage.get(pass.id) || 0;
          const cap = pass.instances || 0;
          const full = cap > 0 && used >= cap * (pass.days?.length || 1);
          const hours = Math.round((pass.end - pass.start) / 6) / 10;
          return (
            <button key={pass.id} type="button" onClick={() => setEditorState({ pass, isNew: false })}
              className="w-full text-left grid items-center gap-3 px-4 py-3 border-b border-stone-100 last:border-0 hover:bg-stone-50 transition"
              style={{ gridTemplateColumns: '2fr 220px 130px 130px 80px 130px 30px' }}>
              <div className="flex items-center gap-2 min-w-0">
                <span className="w-1 h-7 rounded-full shrink-0" style={{ background: meta.color }} />
                <div className="min-w-0 flex-1">
                  <div className="text-sm font-medium text-stone-800 truncate">{pass.name}</div>
                  <div className="text-[11px] text-stone-500">{hours} h</div>
                </div>
              </div>
              <div>
                <div className="text-sm text-stone-800 tabular-nums">
                  {minToTime(pass.start)} <span className="text-stone-300">→</span> {minToTime(pass.end)}
                </div>
                <div className="relative mt-1.5 h-1.5 rounded-full bg-stone-100">
                  <div className="absolute h-full rounded-full" style={{
                    left: `${pctFn(pass.start)}%`,
                    width: `${pctFn(pass.end) - pctFn(pass.start)}%`,
                    background: meta.color, opacity: 0.7,
                  }} />
                </div>
              </div>
              <div className="flex gap-1">
                {['mon','tue','wed','thu','fri'].map(day => {
                  const on = pass.days.includes(day);
                  return (
                    <span key={day}
                      className={`w-6 h-6 rounded-md text-[10.5px] font-semibold flex items-center justify-center ${on ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-400'}`}
                      title={DAY_META.find(d => d.key === day)?.label}>
                      {dayLabels[day]}
                    </span>
                  );
                })}
              </div>
              <div>
                <span className="text-xs px-2 py-1 rounded-full inline-block"
                  style={{ color: meta.color, boxShadow: `inset 0 0 0 1px ${meta.color}44`, background: '#fff' }}>
                  {meta.label}
                </span>
              </div>
              <div className="text-right">
                {cap === 0 ? (
                  <span className="text-xs text-stone-400 italic">obegr.</span>
                ) : (
                  <span className="display-font tabular-nums" style={{ fontSize: 16, fontWeight: 500, color: full ? '#B45309' : '#1C1917' }}>
                    {cap}
                    {full && <span className="ml-1.5 text-[10px] font-semibold normal-case tracking-normal" style={{ color: '#B45309' }}>fullt</span>}
                  </span>
                )}
              </div>
              <div>
                {dept ? (
                  <span className="inline-flex items-center gap-1.5 text-[11.5px] px-2 py-0.5 rounded-full"
                    style={{ background: softColor(dept.color), color: dept.color, boxShadow: `inset 0 0 0 1px ${dept.color}44` }}>
                    <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{ background: dept.color }} />
                    {dept.name}
                  </span>
                ) : (
                  <span className="text-xs text-stone-400">– alla –</span>
                )}
              </div>
              <div className="flex justify-end">
                <ChevronRight size={15} className="text-stone-300" />
              </div>
            </button>
          );
        })}
        <button onClick={openNew} className="w-full px-4 py-3 text-sm text-stone-400 hover:text-stone-700 hover:bg-stone-50 transition flex items-center justify-center gap-2 border-t border-dashed border-stone-200">
          <Plus size={15} />Lägg till nytt pass
        </button>
      </div>

      <div className="rounded-xl bg-stone-50 ring-1 ring-stone-200 p-4">
        <p className="text-xs uppercase tracking-wider text-stone-500 mb-2">Så används passbanken</p>
        <div className="space-y-1 text-sm text-stone-600 leading-relaxed">
          <p>Generatorn väljer i första hand bland dessa pass i stället för att hitta på fria tider. Klicka på en rad för att redigera tid, typ, dagar, antal och avdelning.</p>
          <p><strong>Antal:</strong> max antal personer per dag som kan ha just det här passet. 1 betyder unikt (bara en stänger t.ex.), högre om flera kan ha samma passtider, 0 för obegränsat.</p>
          <p>Pass kan göras avdelningsspecifika eller gälla alla avdelningar. Aktivera <strong>F</strong> på ett pass om det ska kunna tilldelas personal som valt <strong>Passbank</strong> som fredagshantering.</p>
        </div>
      </div>

      {editorState && (
        <PassEditorModal
          pass={editorState.pass}
          isNew={editorState.isNew}
          departments={departments}
          onSave={savePass}
          onClose={() => setEditorState(null)}
          onRemove={editorState.isNew ? null : removePassFromEditor}
        />
      )}
    </div>
  );
}

function PbStat({ label, value, sub }) {
  return (
    <div className="bg-white rounded-xl ring-1 ring-stone-200 px-3.5 py-3">
      <div className="text-[10.5px] font-semibold uppercase tracking-wider text-stone-500">{label}</div>
      <div className="display-font tabular-nums" style={{ fontSize: 22, lineHeight: 1.1, color: '#1C1917', fontWeight: 500, letterSpacing: '-0.02em', marginTop: 2 }}>{value}</div>
      {sub && <div className="text-[11px] text-stone-500 mt-0.5">{sub}</div>}
    </div>
  );
}

// -------- Färgwizard & färginställningar --------
// Wizard som visas första gången Personligt schema öppnas, plus en motsvarande
// editor-sektion i Inställningar. Båda muterar samma localStorage-nyckel via
// saveAssignmentColorOverridesToStorage så paletten håller sig synkad mellan
// tidslinjen och Excel-exporten.

function buildInitialColorDraft() {
  // Bygg ett komplett utkast (alla typer) genom att lägga ev. override ovanpå default.
  const draft = {};
  for (const type of ASSIGNMENT_TYPES) {
    draft[type.id] = getAssignmentColor(type.id);
  }
  return draft;
}

function ColorPickerGrid({ draft, setDraft }) {
  // Två kolumner med en färg-input + label per typ. Återanvänds av både wizard och Inställningar.
  return (
    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
      {ASSIGNMENT_TYPES.map(type => {
        const current = draft[type.id] || type.color;
        const isDefault = String(current).toLowerCase() === String(type.color).toLowerCase();
        return (
          <div key={type.id} className="flex items-center gap-3 px-3 py-2 rounded-xl bg-white ring-1 ring-stone-200">
            <input
              type="color"
              className="w-9 h-9 rounded cursor-pointer border-0 p-0 shrink-0"
              value={current}
              onChange={(e) => setDraft({ ...draft, [type.id]: e.target.value })}
              aria-label={`Färg för ${type.label}`}
            />
            <div className="min-w-0 flex-1">
              <p className="text-sm text-stone-800 truncate" style={{ fontWeight: 500 }}>{type.label}</p>
              <p className="text-[10px] text-stone-500 tabular-nums">{String(current).toLowerCase()} {isDefault && <span className="text-stone-400">· standard</span>}</p>
            </div>
            {!isDefault && (
              <button
                type="button"
                onClick={() => setDraft({ ...draft, [type.id]: type.color })}
                className="text-[10px] text-stone-500 hover:text-stone-800 underline shrink-0"
                title="Återställ till standardfärg"
              >
                Återställ
              </button>
            )}
          </div>
        );
      })}
    </div>
  );
}

function ColorWizardModal({ onClose }) {
  const [draft, setDraft] = useState(() => buildInitialColorDraft());
  const handleSave = () => {
    saveAssignmentColorOverridesToStorage(draft);
    setColorWizardSeen();
    onClose?.();
  };
  const handleSkip = () => {
    // Användaren vill bara börja jobba — markera som sedd men spara ingen ändring.
    setColorWizardSeen();
    onClose?.();
  };
  const handleResetAll = () => {
    const fresh = {};
    for (const type of ASSIGNMENT_TYPES) fresh[type.id] = type.color;
    setDraft(fresh);
  };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(28, 25, 23, 0.5)' }}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[92vh] flex flex-col overflow-hidden">
        <div className="px-6 py-5 border-b border-stone-200">
          <p className="text-xs uppercase tracking-widest text-stone-500 mb-1">Personligt schema</p>
          <h2 className="display-font text-2xl text-stone-800" style={{ letterSpacing: '-0.01em' }}>Välj färger för era uppdragstyper</h2>
          <p className="text-sm text-stone-600 mt-2">Färgerna används både i tidslinjen när du bygger schemat och i Excel-exporten — samma palett båda ställen. Standardfärgerna är förifyllda, du kan ändra senare i <strong>Inställningar</strong>.</p>
        </div>
        <div className="px-6 py-5 overflow-y-auto flex-1">
          <ColorPickerGrid draft={draft} setDraft={setDraft} />
        </div>
        <div className="px-6 py-4 border-t border-stone-200 bg-stone-50 flex gap-2 justify-between flex-wrap">
          <button onClick={handleResetAll}
            className="px-3 py-2 text-sm rounded-lg text-stone-600 hover:bg-stone-100 transition">
            Återställ alla till standard
          </button>
          <div className="flex gap-2 flex-wrap">
            <button onClick={handleSkip}
              className="px-4 py-2 text-sm rounded-lg text-stone-600 hover:bg-stone-100 transition">
              Hoppa över
            </button>
            <button onClick={handleSave}
              className="px-5 py-2 text-sm rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition flex items-center gap-2">
              Spara färger <ArrowRight size={14} />
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AssignmentTypeColorsSection() {
  // Settings-sektion — egen lokal state så användaren kan ångra innan spar.
  const [draft, setDraft] = useState(() => buildInitialColorDraft());
  const [savedAt, setSavedAt] = useState(0);
  const isDirty = useMemo(
    () => ASSIGNMENT_TYPE_IDS.some(id => String(draft[id] || '').toLowerCase() !== String(getAssignmentColor(id)).toLowerCase()),
    [draft, savedAt]
  );
  const hasAnyOverride = useMemo(
    () => ASSIGNMENT_TYPE_IDS.some(id => String(getAssignmentColor(id)).toLowerCase() !== String(ASSIGNMENT_DEFAULT_COLORS[id]).toLowerCase()),
    [savedAt]
  );
  const handleSave = () => {
    saveAssignmentColorOverridesToStorage(draft);
    setSavedAt(Date.now());
  };
  const handleResetAllDefaults = () => {
    const fresh = {};
    for (const type of ASSIGNMENT_TYPES) fresh[type.id] = type.color;
    setDraft(fresh);
  };
  const handleRevertChanges = () => {
    setDraft(buildInitialColorDraft());
  };
  return (
    <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
      <div className="flex items-start justify-between mb-4 gap-4 flex-wrap">
        <div>
          <h2 className="display-font text-xl text-stone-800">Färger för uppdragstyper</h2>
          <p className="text-sm text-stone-500 mt-0.5 max-w-2xl">
            Samma palett används i Personligt schema (tidslinjen) och i Excel-exporten. Färgerna sparas lokalt i webbläsaren. Du sätter färg per <em>typ</em> — inte per specifik etikett — så att t.ex. alla resurspass får samma färg oavsett vad du kallar dem.
          </p>
        </div>
      </div>
      <ColorPickerGrid draft={draft} setDraft={setDraft} />
      <div className="mt-4 flex gap-2 justify-between flex-wrap">
        <button onClick={handleResetAllDefaults}
          disabled={!hasAnyOverride && !isDirty}
          className="px-3 py-2 text-sm rounded-lg text-stone-600 hover:bg-stone-100 transition disabled:opacity-40 disabled:cursor-not-allowed">
          Återställ alla till standard
        </button>
        <div className="flex gap-2 flex-wrap">
          {isDirty && (
            <button onClick={handleRevertChanges}
              className="px-3 py-2 text-sm rounded-lg text-stone-600 hover:bg-stone-100 transition">
              Ångra ändringar
            </button>
          )}
          <button onClick={handleSave}
            disabled={!isDirty}
            className={`px-4 py-2 text-sm rounded-lg flex items-center gap-2 transition ${isDirty ? 'bg-stone-800 text-white hover:bg-stone-900' : 'bg-stone-200 text-stone-500 cursor-not-allowed'}`}>
            Spara färger
          </button>
        </div>
      </div>
    </div>
  );
}

// -------- Settings View (departments etc.) --------

function SettingsView({ departments, setDepartments, staff, setStaff, coverageBlocks, setCoverageBlocks,
                        passBank, setPassBank, fridayTemplateRotation, setFridayTemplateRotation, fridayCycleWeeks, setFridayCycleWeeks, onLoadExample, onClearAll, mode = 'all' }) {
  const updateDept = (id, patch) => setDepartments(departments.map(d => d.id === id ? { ...d, ...patch } : d));
  const removeDept = (id) => {
    const usedBy = staff.filter(s => s.deptId === id);
    if (usedBy.length > 0) {
      if (!confirm(`${usedBy.length} person(er) tillhör denna avdelning: ${usedBy.map(s => s.name).join(', ')}. De kommer behöva bytas till en annan avdelning manuellt. Fortsätt?`)) return;
    }
    const coverageForDept = coverageBlocks.filter(b => b.scopeType === COVERAGE_DEPARTMENT && b.deptId === id).length;
    if (coverageForDept > 0) {
      setCoverageBlocks(coverageBlocks.filter(b => !(b.scopeType === COVERAGE_DEPARTMENT && b.deptId === id)));
    }
    setDepartments(departments.filter(d => d.id !== id));
  };
  const addDept = () => {
    const newId = 'd' + (Math.max(0, ...departments.map(d => parseInt(d.id.replace('d','')) || 0)) + 1);
    const usedColors = departments.map(d => d.color);
    const nextColor = DEPT_COLORS.find(c => !usedColors.includes(c)) || DEPT_COLORS[departments.length % DEPT_COLORS.length];
    setDepartments([...departments, { id: newId, name: 'Ny avdelning', color: nextColor }]);
  };
  const updatePass = (id, patch) => setPassBank(normalizePassBank(passBank.map(pass => pass.id === id ? { ...pass, ...patch } : pass)));
  const removePass = (id) => {
    if (passBank.length <= 1) {
      alert('Passbanken behöver minst ett pass.');
      return;
    }
    setPassBank(normalizePassBank(passBank.filter(pass => pass.id !== id)));
    setStaff(prev => prev.map(person => ({
      ...person,
      allowedPassIds: (person.allowedPassIds || []).filter(passId => passId !== id),
    })));
  };
  const addPass = () => {
    const sorted = normalizePassBank(passBank);
    const base = sorted[sorted.length - 1] || initialPassBank[0];
    const start = clamp((base?.start || 480) + 30, 330, 1020);
    const end = clamp((base?.end || 960) + 30, start + 60, 1080);
    setPassBank([...sorted, normalizePass({
      id: `pass-${Math.random().toString(36).slice(2, 8)}`,
      name: `Nytt pass ${sorted.length + 1}`,
      start,
      end,
      days: WEEKDAY_KEYS,
      deptId: '',
      passType: base?.passType || inferPassType({ start, end }),
      instances: 1, // Default: 1 instans (unikt pass). Användaren kan öka för delade pass.
    })]);
  };

  const counts = Object.fromEntries(departments.map(d => [d.id, staff.filter(s => s.deptId === d.id).length]));
  const orphaned = staff.filter(s => s.deptId && !departments.find(d => d.id === s.deptId));
  const rotators = staff.filter(s => s.hasFridayRotation);
  const updateTemplateWeek = (weekIdx, idx, val) => {
    const next = resizeRotation(fridayTemplateRotation, fridayCycleWeeks);
    const cur = next[weekIdx] || ['',''];
    next[weekIdx] = idx === 0 ? [val, cur[1]] : [cur[0], val];
    if (!next[weekIdx][0] && !next[weekIdx][1]) next[weekIdx] = null;
    setFridayTemplateRotation(next);
  };
  const setTemplateWeekOff = (weekIdx, off) => {
    const next = resizeRotation(fridayTemplateRotation, fridayCycleWeeks);
    next[weekIdx] = off ? null : ['07:00','15:30'];
    setFridayTemplateRotation(next);
  };

  return (
    <div className="space-y-4">
      {(mode === 'all' || mode === 'settings') && (
      <TabIntro>
        Övergripande inställningar. Här ändrar du avdelningar, arbetsflöde och hanterar din data. <em>Passbank</em> och <em>Fredagsrull</em> har egna flikar nu — du hittar dem i sidopanelen.
      </TabIntro>
      )}
      {mode === 'passbank' && (
      <TabIntro>
        Passen som generatorn får använda på vardagar. Tid, typ och antal styr hur generatorn pusslar och om passet kan delas av flera. Ändringar slår igenom i Vecka, Generator och Drift.
      </TabIntro>
      )}
      {mode === 'friday' && (
      <TabIntro>
        Fredagsrullen är en mall som upprepas. Bygg en central mall här, låt varje person välja vilken vecka i mallen som ska vara deras vecka 1, och lägg ev. egna undantag i Personal-fliken.
      </TabIntro>
      )}
      {/* Avdelningar */}
      {(mode === 'all' || mode === 'settings') && (
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
        <div className="flex items-start justify-between mb-4">
          <div>
            <h2 className="display-font text-xl text-stone-800">Avdelningar</h2>
            <p className="text-sm text-stone-500 mt-0.5">Lägg till, döp om, ändra färg eller ta bort avdelningar.</p>
          </div>
        </div>

        <div className="space-y-2">
          <div className="grid grid-cols-12 gap-2 text-[10px] uppercase tracking-wider text-stone-500 px-2 pb-1">
            <div className="col-span-1">Färg</div>
            <div className="col-span-6">Namn</div>
            <div className="col-span-3">Personal</div>
            <div className="col-span-2"></div>
          </div>
          {departments.map(d => (
            <div key={d.id} className="grid grid-cols-12 gap-2 items-center py-2 px-2 rounded-lg hover:bg-stone-50">
              <div className="col-span-1 flex items-center">
                <input type="color" className="w-8 h-8 rounded cursor-pointer border-0 p-0"
                  value={d.color} onChange={e => updateDept(d.id, { color: e.target.value })} />
              </div>
              <div className="col-span-6">
                <input className="rules-input w-full" value={d.name}
                  onChange={e => updateDept(d.id, { name: e.target.value })} placeholder="Avdelningsnamn" />
              </div>
              <div className="col-span-3 text-sm text-stone-600">
                {counts[d.id] || 0} {counts[d.id] === 1 ? 'person' : 'personer'}
              </div>
              <div className="col-span-2 flex justify-end">
                <button onClick={() => removeDept(d.id)} className="text-stone-400 hover:text-red-600 p-1">
                  <Trash2 size={14} />
                </button>
              </div>
            </div>
          ))}
        </div>

        <button onClick={addDept}
          className="mt-3 text-sm text-stone-700 hover:text-stone-900 flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-stone-100">
          <Plus size={14} />Lägg till avdelning
        </button>

        {orphaned.length > 0 && (
          <div className="mt-5 pt-4 border-t border-orange-200 bg-orange-50/50 -mx-5 -mb-5 px-5 py-4 rounded-b-2xl">
            <div className="flex items-start gap-2">
              <AlertCircle size={14} className="text-orange-600 mt-0.5 flex-shrink-0" />
              <div className="flex-1">
                <p className="text-sm text-stone-700" style={{ fontWeight: 500 }}>{orphaned.length} person(er) saknar avdelning</p>
                <p className="text-xs text-stone-600 mt-1">{orphaned.map(o => o.name).join(', ')} — gå till Personal-fliken och tilldela dem en avdelning.</p>
              </div>
            </div>
          </div>
        )}
      </div>
      )}

      {/* Färger för uppdragstyper */}
      {(mode === 'all' || mode === 'settings') && (
      <AssignmentTypeColorsSection />
      )}

      {(mode === 'all' || mode === 'passbank') && (
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
        <div className="flex items-start justify-between mb-4 gap-4 flex-wrap">
          <div>
            <h2 className="display-font text-xl text-stone-800">Passbank</h2>
            <p className="text-sm text-stone-500 mt-0.5 max-w-2xl">
              Här lägger du in de riktiga pass som generatorn får använda på vardagar. Varje pass har både tid och passtyp, så personalen kan styras enklare utan att du behöver välja varje enskilt pass.
            </p>
          </div>
          <button onClick={addPass}
            className="px-4 py-2 rounded-lg text-sm bg-stone-100 text-stone-700 hover:bg-stone-200 transition flex items-center gap-1.5">
            <Plus size={14} />Lägg till pass
          </button>
        </div>

        <div className="space-y-2">
          <div className="grid grid-cols-12 gap-2 text-[10px] uppercase tracking-wider text-stone-500 px-2 pb-1">
            <div className="col-span-2">Namn</div>
            <div className="col-span-2">Typ</div>
            <div className="col-span-1">Start</div>
            <div className="col-span-1">Slut</div>
            <div className="col-span-1" title="Max antal personer som kan tilldelas detta pass per dag. 1 = unikt pass. Lämna tomt eller skriv 0 för obegränsat.">Antal</div>
            <div className="col-span-2">Dagar</div>
            <div className="col-span-1">Avd.</div>
            <div className="col-span-2"></div>
          </div>
          {normalizePassBank(passBank).map(pass => (
            <div key={pass.id} className="grid grid-cols-12 gap-2 items-center py-2 px-2 rounded-lg hover:bg-stone-50">
              <div className="col-span-2">
                <input className="rules-input w-full" autoComplete="off" spellCheck="false" value={pass.name}
                  onChange={e => updatePass(pass.id, { name: e.target.value })} placeholder="Passnamn" />
              </div>
              <div className="col-span-2">
                <select className="rules-input w-full" value={pass.passType}
                  onChange={e => updatePass(pass.id, { passType: e.target.value })}>
                  {PASS_TYPES.map(type => <option key={type.id} value={type.id}>{type.label}</option>)}
                </select>
              </div>
              <div className="col-span-1">
                <TimeTextInput className="rules-input w-full" valueMinutes={pass.start}
                  onCommit={(minutes) => updatePass(pass.id, { start: minutes })} />
              </div>
              <div className="col-span-1">
                <TimeTextInput className="rules-input w-full" valueMinutes={pass.end}
                  onCommit={(minutes) => updatePass(pass.id, { end: minutes })} />
              </div>
              <div className="col-span-1">
                <input
                  type="number"
                  min="0"
                  step="1"
                  className="rules-input w-full text-center"
                  value={pass.instances === 0 ? '' : pass.instances}
                  placeholder="8"
                  title={pass.instances === 0 ? 'Obegränsat antal personer kan ta detta pass' : `Max ${pass.instances} ${pass.instances === 1 ? 'person' : 'personer'} per dag`}
                  onChange={e => {
                    const v = e.target.value;
                    if (v === '') {
                      updatePass(pass.id, { instances: 0 });
                    } else {
                      const num = parseInt(v, 10);
                      if (Number.isFinite(num) && num >= 0) updatePass(pass.id, { instances: num });
                    }
                  }} />
              </div>
              <div className="col-span-2 flex flex-wrap gap-1">
                {DAY_META.map(day => {
                  const active = pass.days.includes(day.key);
                  return (
                    <button key={day.key} type="button" onClick={() => updatePass(pass.id, {
                      days: active ? pass.days.filter(key => key !== day.key) : [...pass.days, day.key],
                    })}
                      className={`px-2 py-1 rounded text-[10px] transition ${active ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>
                      {day.short}
                    </button>
                  );
                })}
              </div>
              <div className="col-span-1">
                <select className="rules-input w-full" value={pass.deptId || ''}
                  onChange={e => updatePass(pass.id, { deptId: e.target.value })}>
                  <option value="">Alla</option>
                  {departments.map(dept => <option key={dept.id} value={dept.id}>{dept.name}</option>)}
                </select>
              </div>
              <div className="col-span-2 flex justify-end">
                <button onClick={() => removePass(pass.id)} className="text-stone-400 hover:text-red-600 p-1">
                  <Trash2 size={14} />
                </button>
              </div>
            </div>
          ))}
        </div>

        <div className="mt-4 rounded-xl bg-stone-50 ring-1 ring-stone-200 p-4">
          <p className="text-xs uppercase tracking-wider text-stone-500 mb-2">Så används passbanken</p>
          <div className="space-y-1 text-sm text-stone-600">
            <p>Generatorn väljer i första hand bland dessa pass i stället för att hitta på fria tider.</p>
            <p>Passtypen hjälper personalrutan att svara på frågor som "kan öppna" eller "kan bara ta eftermiddag" utan att du behöver välja varje pass manuellt.</p>
            <p><strong>Antal:</strong> max antal personer som kan tilldelas passet per dag. 1 betyder att passet är unikt – t.ex. bara en person stänger. Sätt högre om flera kan ha samma passtider, eller lämna tomt för obegränsat.</p>
            <p>Bemanningsblocken avgör när de här passen faktiskt behövs, så passbank och bemanning måste fungera tillsammans.</p>
            <p>Pass kan göras avdelningsspecifika eller gälla alla avdelningar.</p>
            <p>Aktivera <strong>fre</strong> på ett pass om det ska gå att tilldela personal som har valt <strong>Passbank</strong> som fredagshantering. Personer med fast fredag eller fredagsrull styrs fortfarande av sina egna fredagsfält längre ner.</p>
          </div>
        </div>
      </div>
      )}

      {/* Fredagsrullen */}
      {(mode === 'all' || mode === 'friday') && (
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
        <div className="flex items-start justify-between mb-4 gap-4 flex-wrap">
          <div>
            <h2 className="display-font text-xl text-stone-800">Fredagscykel och fredagsrull</h2>
            <p className="text-sm text-stone-500 mt-0.5 max-w-md">
              Definiera gärna en central mall här först. Sedan kan varje person välja vilken vecka i mallen som ska vara deras vecka 1, och vid behov lägga egna undantag.
            </p>
          </div>
          <div className="flex items-center gap-2 bg-stone-50 rounded-lg px-3 py-2">
            <span className="text-xs text-stone-600">Antal veckor:</span>
            <input type="number" min="1" max="20" className="rules-input w-16 text-center"
              value={fridayCycleWeeks}
              onChange={e => setFridayCycleWeeks(Math.max(1, Math.min(20, parseInt(e.target.value) || 1)))} />
            <span className="text-xs text-stone-600">veckor</span>
          </div>
        </div>

        <div className="mb-4 rounded-xl bg-amber-50 ring-1 ring-amber-200 p-4">
          <p className="text-xs uppercase tracking-wider text-amber-700 mb-1">Här ställer du fredagscykeln</p>
          <p className="text-sm text-stone-700">
            Om ni till exempel har en rull på <strong>8 veckor</strong> är det här du anger det. Den här siffran styr hela fredagsrullen för personal som använder <strong>Rull</strong>.
          </p>
        </div>

        <div className="mb-5">
          <p className="text-xs uppercase tracking-wider text-stone-500 mb-2">Central fredagsmall</p>
          <div className="space-y-1.5">
            {Array.from({ length: fridayCycleWeeks }).map((_, w) => {
              const sh = fridayTemplateRotation[w];
              const isOff = sh == null;
              return (
                <div key={w} className="flex items-center gap-2 flex-wrap rounded-lg bg-stone-50 px-3 py-2">
                  <span className="display-font text-sm text-stone-700 w-12 tabular-nums text-center">
                    v{w + 1}
                  </span>
                  <input type="time" className="rules-input w-28" disabled={isOff}
                    value={sh ? sh[0] : ''}
                    onChange={e => updateTemplateWeek(w, 0, e.target.value)} />
                  <span className="text-stone-400 text-xs">–</span>
                  <input type="time" className="rules-input w-28" disabled={isOff}
                    value={sh ? sh[1] : ''}
                    onChange={e => updateTemplateWeek(w, 1, e.target.value)} />
                  {!isOff && (
                    <span className="text-[10px] text-stone-500 tabular-nums ml-1" title={getWorkedShiftDurationTitle(sh)}>
                      {getWorkedShiftDurationLabel(sh)}
                    </span>
                  )}
                  <button type="button" onClick={() => setTemplateWeekOff(w, !isOff)}
                    className={`ml-auto text-[10px] px-2 py-0.5 rounded ${isOff ? 'bg-stone-700 text-white' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>
                    {isOff ? 'Ledig' : 'Markera som ledig'}
                  </button>
                </div>
              );
            })}
          </div>
          <p className="text-[10px] text-stone-400 mt-2">
            Mallen används av personer som har valt <strong>Rull</strong> + <strong>Central mall</strong> som fredagshantering. De kan ange startvecka och göra egna undantag per vecka.
          </p>
        </div>

        {rotators.length === 0 ? (
          <div className="bg-stone-50 rounded-lg p-6 text-center text-sm text-stone-500">
            Ingen i personalen använder fredagsrullen än. Öppna en person under <strong>Personal</strong> och välj <strong>Rull</strong> som fredagshantering. (De andra lägena – Passbank och Fast tid – styrs på personnivå och påverkas inte av den här mallen.)
          </div>
        ) : (
          <div>
            <p className="text-xs uppercase tracking-wider text-stone-500 mb-3">Översikt av rullen</p>
            <div className="overflow-x-auto">
              <table className="text-xs w-full">
                <thead>
                  <tr className="text-stone-500">
                    <th className="text-left px-2 py-1 sticky left-0 bg-white">Person</th>
                    {Array.from({ length: fridayCycleWeeks }).map((_, w) => (
                      <th key={w} className="text-center px-2 py-1 min-w-[72px]">v{w + 1}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rotators.map(p => (
                    <tr key={p.id} className="border-t border-stone-100">
                      <td className="px-2 py-1.5 sticky left-0 bg-white text-stone-800">
                        <div style={{ fontWeight: 500 }}>{p.name}</div>
                        {p.fridayUseTemplate && <div className="text-[10px] text-stone-400">mall · start v{p.fridayTemplateStartWeek || 1}</div>}
                      </td>
                      {Array.from({ length: fridayCycleWeeks }).map((_, w) => {
                        const sh = getFridayShift(p, w + 1, fridayCycleWeeks, fridayTemplateRotation);
                        return (
                          <td key={w} className="px-2 py-1.5 text-center text-stone-600 tabular-nums">
                            {sh ? `${sh[0]}–${sh[1]}` : <span className="text-stone-300">—</span>}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <p className="text-[10px] text-stone-400 mt-2">— betyder ledig den fredagen. Klicka på personen i Personal-fliken för att redigera deras tider.</p>
          </div>
        )}
      </div>
      )}

      {/* Data — exempel och rensning */}
      {(mode === 'all' || mode === 'settings') && (
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
        <h2 className="display-font text-xl text-stone-800">Data</h2>
        <p className="text-sm text-stone-500 mt-0.5 mb-4">Återställning och flera olika testscenarier. Påverkar all personal och ersätter nuvarande data.</p>
        <div className="space-y-3">
          <div className="flex items-start justify-between gap-4 flex-wrap py-2">
            <div className="flex-1 min-w-[200px]">
              <p className="text-sm text-stone-800" style={{ fontWeight: 500 }}>Ladda exempeldata</p>
            <p className="text-xs text-stone-500 mt-0.5">Öppnar flera påhittade testscenarier med olika storlek, avdelningar och bemanningskrav. Vardagspass är inte färdigifyllda.</p>
              <p className="text-[10px] text-stone-400 mt-1">Varje scenario laddar också en passbank som generatorn använder.</p>
            </div>
            <button onClick={onLoadExample}
              className="px-4 py-2 rounded-lg text-sm bg-stone-100 text-stone-700 hover:bg-stone-200 transition whitespace-nowrap">
              Välj scenario
            </button>
          </div>
          <div className="flex items-start justify-between gap-4 flex-wrap py-2 border-t border-stone-100 pt-3">
            <div className="flex-1 min-w-[200px]">
              <p className="text-sm text-stone-800" style={{ fontWeight: 500 }}>Töm all personal</p>
              <p className="text-xs text-stone-500 mt-0.5">Tar bort alla personer. Avdelningar, bemanningskrav och fredagscykel behålls.</p>
            </div>
            <button onClick={onClearAll}
              className="px-4 py-2 rounded-lg text-sm bg-white text-red-700 ring-1 ring-red-200 hover:bg-red-50 transition whitespace-nowrap">
              Töm allt
            </button>
          </div>
        </div>
      </div>
      )}

      <style>{`
        .rules-input { background: white; border: 1px solid #e7e5e4; border-radius: 6px; padding: 5px 8px; font-size: 13px; color: #1c1917; outline: none; }
        .rules-input:focus { border-color: #78716c; box-shadow: 0 0 0 2px rgba(120, 113, 108, 0.1); }
        .rules-input:disabled { background: #f5f5f4; color: #a8a29e; }
      `}</style>
    </div>
  );
}

// -------- Behörighets-tab i personredigeringen --------
// Lärarlegitimation + manuella utökningar per ämne och stadium. Två listor:
// "Lägg till"-formulär överst, befintliga behörigheter som rader nedanför.
// Stage-väljaren är multi-select (chips) eftersom en lärare ofta är behörig
// för flera stadier i samma ämne. Utökningar visas med en tydlig markering
// så det syns var avstegen från formell legitimation ligger.
function CertificationsTab({ certifications = [], onChange, isTeacherRole }) {
  const [draftSubject, setDraftSubject] = useState('');
  const [draftStages, setDraftStages] = useState([]);
  const [draftType, setDraftType] = useState('formal');
  const [draftNote, setDraftNote] = useState('');

  const sortedCerts = useMemo(() => {
    // Visa legitimationer först, sedan utökningar — så formella behörigheter
    // hamnar överst och avvikelser nederst där de är lätta att granska.
    return [...certifications].sort((a, b) => {
      if (a.type !== b.type) return a.type === 'formal' ? -1 : 1;
      const aMeta = getSchoolSubjectMeta(a.subject);
      const bMeta = getSchoolSubjectMeta(b.subject);
      return (aMeta?.label || '').localeCompare(bMeta?.label || '', 'sv');
    });
  }, [certifications]);

  const canAdd = draftSubject && draftStages.length > 0;

  const handleAdd = () => {
    if (!canAdd) return;
    const newCert = {
      id: `cert-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`,
      subject: draftSubject,
      stages: [...draftStages],
      type: draftType,
      note: draftType === 'extension' ? draftNote.trim() : '',
    };
    onChange([...(certifications || []), newCert]);
    setDraftSubject('');
    setDraftStages([]);
    setDraftType('formal');
    setDraftNote('');
  };

  const handleRemove = (id) => {
    onChange((certifications || []).filter(c => c.id !== id));
  };

  const handleToggleStage = (certId, stage) => {
    onChange((certifications || []).map(c => {
      if (c.id !== certId) return c;
      const has = c.stages.includes(stage);
      return { ...c, stages: has ? c.stages.filter(s => s !== stage) : [...c.stages, stage] };
    }));
  };

  const handleChangeType = (certId, type) => {
    onChange((certifications || []).map(c => c.id === certId ? { ...c, type } : c));
  };

  const handleChangeNote = (certId, note) => {
    onChange((certifications || []).map(c => c.id === certId ? { ...c, note } : c));
  };

  const toggleDraftStage = (stage) => {
    setDraftStages(prev => prev.includes(stage) ? prev.filter(s => s !== stage) : [...prev, stage]);
  };

  // Grupper för dropdown — språk, ma/nat, so, praktisk.
  const subjectGroups = useMemo(() => {
    const groups = {};
    for (const s of SCHOOL_SUBJECT_OPTIONS) {
      groups[s.group] = groups[s.group] || { id: s.group, items: [] };
      groups[s.group].items.push(s);
    }
    const groupLabels = { språk: 'Språk', matnat: 'Matematik och naturvetenskap', so: 'SO-ämnen', praktisk: 'Praktisk-estetiska' };
    return Object.values(groups).map(g => ({ ...g, label: groupLabels[g.id] || g.id }));
  }, []);

  return (
    <div className="space-y-6">
      <Section title="Behörigheter">
        <div className="rounded-xl bg-stone-50 ring-1 ring-stone-200 p-4 space-y-3">
          <p className="text-sm text-stone-700">
            Vilka ämnen och stadier får personen undervisa i? Schemabyggaren använder det här för att föreslå rätt lärare till rätt lektion.
          </p>
          <p className="text-xs text-stone-600 leading-relaxed">
            <strong>Legitimation</strong> = formell lärarlegitimation från Skolverket. <strong>Manuell utökning</strong> = rektors beslut att personen får undervisa något hen saknar formell behörighet i. Utökningar är giltiga men markeras tydligt så det syns var avstegen ligger.
          </p>
          {!isTeacherRole && (
            <p className="text-xs text-amber-800 rounded bg-amber-50 ring-1 ring-amber-200 px-2 py-1.5 inline-block">
              Den här personen har inte befattningen <em>Lärare</em>. Behörigheter går att lägga in ändå (t.ex. för fritidspedagoger som tar lektioner).
            </p>
          )}
        </div>
      </Section>

      <Section title="Lägg till behörighet">
        <div className="rounded-xl bg-white ring-1 ring-stone-200 p-4 space-y-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <Field label="Ämne">
              <select className="input w-full" value={draftSubject} onChange={e => setDraftSubject(e.target.value)}>
                <option value="">Välj ämne...</option>
                {subjectGroups.map(group => (
                  <optgroup key={group.id} label={group.label}>
                    {group.items.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                  </optgroup>
                ))}
              </select>
            </Field>
            <Field label="Typ">
              <div className="flex gap-2 flex-wrap">
                {CERTIFICATION_TYPES.map(t => (
                  <button key={t.id} type="button" onClick={() => setDraftType(t.id)}
                    className={`px-3 py-2 rounded-lg text-sm transition ring-1 ${draftType === t.id
                      ? (t.id === 'extension' ? 'bg-amber-100 ring-amber-300 text-amber-900' : 'bg-emerald-100 ring-emerald-300 text-emerald-900')
                      : 'bg-white ring-stone-200 text-stone-600 hover:bg-stone-50'}`}>
                    {t.label}
                  </button>
                ))}
              </div>
            </Field>
          </div>
          <Field label="Stadier (välj ett eller flera)">
            <div className="flex gap-2 flex-wrap">
              {SCHOOL_STAGE_OPTIONS.map(stage => {
                const active = draftStages.includes(stage.id);
                return (
                  <button key={stage.id} type="button" onClick={() => toggleDraftStage(stage.id)}
                    title={stage.desc}
                    className={`px-3 py-1.5 rounded-lg text-sm transition ring-1 ${active ? 'bg-stone-800 text-white ring-stone-800' : 'bg-white text-stone-700 ring-stone-200 hover:bg-stone-50'}`}>
                    {stage.label}
                  </button>
                );
              })}
            </div>
          </Field>
          {draftType === 'extension' && (
            <Field label="Anteckning (visas i utökningslistan)">
              <input className="input w-full" type="text" value={draftNote} onChange={e => setDraftNote(e.target.value)}
                placeholder="T.ex. 'Behov ht 2025' eller 'Erfaren — godkänd av rektor'" />
            </Field>
          )}
          <div className="flex justify-end">
            <button type="button" onClick={handleAdd} disabled={!canAdd}
              className={`px-4 py-2 rounded-lg text-sm flex items-center gap-2 transition ${canAdd ? 'bg-stone-800 text-white hover:bg-stone-900' : 'bg-stone-200 text-stone-500 cursor-not-allowed'}`}>
              <Plus size={14} />Lägg till behörighet
            </button>
          </div>
        </div>
      </Section>

      <Section title={`Befintliga behörigheter (${certifications.length})`}>
        {certifications.length === 0 ? (
          <p className="rounded-xl bg-stone-50 ring-1 ring-stone-200 p-6 text-sm text-stone-500 text-center">
            Inga behörigheter inlagda än. Använd formuläret ovan för att lägga till första.
          </p>
        ) : (
          <div className="space-y-2">
            {sortedCerts.map(cert => {
              const subjectMeta = getSchoolSubjectMeta(cert.subject);
              const typeMeta = getCertificationTypeMeta(cert.type);
              const isExtension = cert.type === 'extension';
              return (
                <div key={cert.id}
                  className={`rounded-xl ring-1 p-3 ${isExtension ? 'bg-amber-50/50 ring-amber-200' : 'bg-white ring-stone-200'}`}>
                  <div className="flex items-start gap-3 flex-wrap">
                    <div className="min-w-0 flex-1">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="text-sm text-stone-800" style={{ fontWeight: 600 }}>{subjectMeta?.label || cert.subject}</span>
                        <span className={`text-[10px] rounded-full px-2 py-0.5 ring-1 ${isExtension
                          ? 'bg-amber-100 ring-amber-300 text-amber-900'
                          : 'bg-emerald-100 ring-emerald-300 text-emerald-900'}`}>
                          {isExtension && <AlertCircle size={10} className="inline mr-0.5 -mt-0.5" />}
                          {typeMeta.label}
                        </span>
                      </div>
                      {/* Stage-chips per rad — togglas direkt utan att gå via en modal */}
                      <div className="flex gap-1.5 flex-wrap mt-2">
                        {SCHOOL_STAGE_OPTIONS.map(stage => {
                          const active = cert.stages.includes(stage.id);
                          return (
                            <button key={stage.id} type="button" onClick={() => handleToggleStage(cert.id, stage.id)}
                              title={stage.desc}
                              className={`px-2 py-0.5 rounded-md text-[11px] transition ring-1 ${active ? 'bg-stone-700 text-white ring-stone-700' : 'bg-white text-stone-500 ring-stone-200 hover:bg-stone-50'}`}>
                              {stage.label}
                            </button>
                          );
                        })}
                      </div>
                      {isExtension && (
                        <input className="input w-full mt-2 text-xs" type="text"
                          placeholder="Anteckning (frivillig)"
                          value={cert.note || ''}
                          onChange={e => handleChangeNote(cert.id, e.target.value)} />
                      )}
                      <div className="flex gap-1 mt-2">
                        {CERTIFICATION_TYPES.map(t => (
                          <button key={t.id} type="button" onClick={() => handleChangeType(cert.id, t.id)}
                            className={`text-[10px] px-2 py-0.5 rounded transition ${cert.type === t.id ? 'bg-stone-200 text-stone-800' : 'text-stone-500 hover:bg-stone-100'}`}>
                            {t.short}
                          </button>
                        ))}
                      </div>
                    </div>
                    <button type="button" onClick={() => handleRemove(cert.id)}
                      className="text-stone-400 hover:text-rose-600 transition p-1 -m-1"
                      title="Ta bort behörigheten" aria-label="Ta bort">
                      <Trash2 size={14} />
                    </button>
                  </div>
                  {cert.stages.length === 0 && (
                    <p className="text-[10px] text-amber-700 mt-2">
                      Inga stadier valda — behörigheten är inte aktiv förrän minst ett stadium är markerat.
                    </p>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </Section>
    </div>
  );
}

// -------- Edit Modal --------

function StaffEditModal({ staff, departments, passBank, fridayCycleWeeks, fridayTemplateRotation, onSave, onClose, onRemove }) {
  const [form, setForm] = useState(() => {
    return normalizePerson(JSON.parse(JSON.stringify(staff)), fridayCycleWeeks);
  });
  const [staffEditTab, setStaffEditTab] = useState('basic');
  const wm = weeklyMinutes(form, fridayCycleWeeks, fridayTemplateRotation);
  const targetMin = getTargetMin(form);
  const diff = wm - targetMin;
  const off = hasWeekdaySchedule(form) && Math.abs(diff) > 5;
  const dept = getDept(form.deptId, departments);
  const effectiveFridayRotation = buildEffectiveFridayRotation(form, fridayCycleWeeks, fridayTemplateRotation);
  const fixedFridayOff = !form.hasFridayRotation && !form.fridayShift;
  const normalizedPassBank = normalizePassBank(passBank);
  const availablePassTypes = PASS_TYPES.filter(type => normalizedPassBank.some(pass => pass.passType === type.id));
  const effectiveAllowedPassTypes = getAllowedPassTypesForPerson(form, normalizedPassBank);
  const effectiveAllowedPassIds = getAllowedPassIdsForPerson(form, normalizedPassBank);
  const usingAllPassTypes = (form.allowedPassTypes || []).length === 0;
  const usingAllPasses = (form.allowedPassIds || []).length === 0;
  const setEmploymentRole = (employmentRole) => {
    const category = getStaffRoleCategory({ ...form, employmentRole });
    const isTeacher = category === 'teacher';
    setForm({
      ...form,
      employmentRole,
      deptId: isTeacher ? '' : form.deptId,
      includeInGenerator: !!employmentRole && !isTeacher,
    });
  };
  const passTypeGroups = availablePassTypes.map(type => {
    const passes = normalizedPassBank.filter(pass => pass.passType === type.id);
    return {
      ...type,
      passes,
      selected: effectiveAllowedPassTypes.includes(type.id),
    };
  });
  const backdropPressStarted = useRef(false);

  // Uppdatera en enskild fredagsvecka i rullen
  const updateFridayWeek = (weekIdx, idx, val) => {
    const next = resizeRotation(form.fridayRotation, fridayCycleWeeks);
    const cur = next[weekIdx] || ['',''];
    next[weekIdx] = idx === 0 ? [val, cur[1]] : [cur[0], val];
    if (!next[weekIdx][0] && !next[weekIdx][1]) next[weekIdx] = null;
    setForm({ ...form, fridayRotation: next });
  };
  const setWeekOff = (weekIdx, off) => {
    const next = resizeRotation(form.fridayRotation, fridayCycleWeeks);
    next[weekIdx] = off ? null : ['07:00','15:30'];
    setForm({ ...form, fridayRotation: next });
  };
  const updateFridayTemplateOverride = (weekIdx, idx, val) => {
    const week = String(weekIdx + 1);
    const nextOverrides = { ...(form.fridayTemplateOverrides || {}) };
    const base = getTemplateFridayShift(fridayTemplateRotation, weekIdx + 1, form.fridayTemplateStartWeek || 1, fridayCycleWeeks);
    const cur = hasFridayTemplateOverride(form, weekIdx + 1)
      ? (nextOverrides[week] || ['',''])
      : (base || ['','']);
    const next = idx === 0 ? [val, cur[1] || ''] : [cur[0] || '', val];
    nextOverrides[week] = (!next[0] && !next[1]) ? null : next;
    setForm({ ...form, fridayTemplateOverrides: nextOverrides });
  };
  const resetFridayTemplateOverride = (weekIdx) => {
    const week = String(weekIdx + 1);
    const nextOverrides = { ...(form.fridayTemplateOverrides || {}) };
    delete nextOverrides[week];
    setForm({ ...form, fridayTemplateOverrides: nextOverrides });
  };
  const setTemplateWeekOff = (weekIdx, off) => {
    const week = String(weekIdx + 1);
    const nextOverrides = { ...(form.fridayTemplateOverrides || {}) };
    if (!off) {
      delete nextOverrides[week];
    } else {
      nextOverrides[week] = null;
    }
    setForm({ ...form, fridayTemplateOverrides: nextOverrides });
  };
  const enableFridayTemplateWeek = (weekIdx) => {
    const week = String(weekIdx + 1);
    const nextOverrides = { ...(form.fridayTemplateOverrides || {}) };
    const base = getTemplateFridayShift(fridayTemplateRotation, weekIdx + 1, form.fridayTemplateStartWeek || 1, fridayCycleWeeks);
    nextOverrides[week] = base || ['07:00','15:30'];
    setForm({ ...form, fridayTemplateOverrides: nextOverrides });
  };
  const switchToManualFridayRotation = () => {
    setForm({
      ...form,
      fridayUseTemplate: false,
      fridayRotation: effectiveFridayRotation,
      fridayTemplateOverrides: form.fridayTemplateOverrides || {},
    });
  };
  const switchToTemplateFridayRotation = () => {
    setForm({
      ...form,
      fridayUseTemplate: true,
      fridayTemplateStartWeek: Math.min(Math.max(1, form.fridayTemplateStartWeek || 1), fridayCycleWeeks),
      fridayTemplateOverrides: form.fridayTemplateOverrides || {},
    });
  };
  const setFixedFridayOff = (off) => {
    setForm({ ...form, fridayShift: off ? null : (form.fridayShift || ['07:45','15:45']) });
  };
  // Byt fredagsläge. Helpern säkerställer att alla syskonfält är konsistenta så
  // att UI:t inte visar gammal rotation-data när man bytt till fast tid osv.
  // sched.fri rensas bara när man byter BORT från passbank, så generatorns ev.
  // tidigare tilldelning behålls om man tillfälligt tittar på ett annat läge
  // och byter tillbaka.
  const setFridayMode = (mode) => {
    if (mode === 'passbank') {
      setForm({
        ...form,
        fridayMode: 'passbank',
        hasFridayRotation: false,
        fridayShift: null,
        fridayRotation: null,
        fridayUseTemplate: false,
        fridayTemplateOverrides: {},
      });
    } else if (mode === 'fixed') {
      const nextSched = { ...(form.sched || {}) };
      delete nextSched.fri;
      setForm({
        ...form,
        fridayMode: 'fixed',
        hasFridayRotation: false,
        fridayShift: form.fridayShift || ['07:45','15:45'],
        fridayRotation: null,
        fridayUseTemplate: false,
        fridayTemplateOverrides: {},
        sched: nextSched,
      });
    } else if (mode === 'rotation') {
      const nextSched = { ...(form.sched || {}) };
      delete nextSched.fri;
      setForm({
        ...form,
        fridayMode: 'rotation',
        hasFridayRotation: true,
        fridayShift: null,
        fridayRotation: resizeRotation(form.fridayRotation || [], fridayCycleWeeks),
        sched: nextSched,
      });
    }
  };
  const scrollToFridaySection = () => {
    document.getElementById('staff-edit-friday-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  const autofillWeekSchedule = () => {
    setForm(preparePersonForUse(form, fridayCycleWeeks, fridayTemplateRotation, normalizedPassBank));
  };
  const toggleAllowedPassType = (passType) => {
    const current = normalizeAllowedPassTypes(form.allowedPassTypes);
    const allTypes = availablePassTypes.map(type => type.id);
    let next;
    if (current.length === 0) {
      next = allTypes.filter(type => type !== passType);
    } else if (current.includes(passType)) {
      if (current.length === 1) return;
      next = current.filter(type => type !== passType);
    } else {
      next = [...current, passType];
    }
    if (next.length === allTypes.length) next = [];
    const nextTypeSet = new Set(next.length === 0 ? allTypes : next);
    const nextAllowedPassIds = normalizeAllowedPassIds(form.allowedPassIds)
      .filter(passId => {
        const pass = normalizedPassBank.find(item => item.id === passId);
        return pass && nextTypeSet.has(pass.passType);
      });
    setForm({ ...form, allowedPassTypes: next, allowedPassIds: nextAllowedPassIds });
  };
  const selectAllPassTypes = () => setForm({ ...form, allowedPassTypes: [], allowedPassIds: [] });
  const selectSuggestedPassTypes = () => {
    const suggestion = availablePassTypes
      .filter(type => normalizedPassBank
        .filter(pass => pass.passType === type.id)
        .some(pass => WEEKDAY_KEYS.some(dayKey => pass.days.includes(dayKey) && isShiftLegal(form, dayKey, passToShift(pass)))))
      .map(type => type.id);
    setForm({ ...form, allowedPassTypes: suggestion.length === availablePassTypes.length ? [] : suggestion, allowedPassIds: [] });
  };
  const toggleAllowedPass = (passId) => {
    const current = normalizeAllowedPassIds(form.allowedPassIds);
    const allowedTypeSet = new Set(effectiveAllowedPassTypes);
    const allIds = normalizedPassBank.filter(pass => allowedTypeSet.has(pass.passType)).map(pass => pass.id);
    let next;
    if (current.length === 0) {
      next = allIds.filter(id => id !== passId);
    } else if (current.includes(passId)) {
      if (current.length === 1) return;
      next = current.filter(id => id !== passId);
    } else {
      next = [...current, passId];
    }
    if (next.length === allIds.length) next = [];
    setForm({ ...form, allowedPassIds: next });
  };
  const clearExactPassFilter = () => setForm({ ...form, allowedPassIds: [] });
  const selectSuggestedPasses = () => {
    const suggestion = normalizedPassBank
      .filter(pass => effectiveAllowedPassTypes.includes(pass.passType))
      .filter(pass => (!form.onlyAfternoons || pass.start >= 720) && (!pass.deptId || pass.deptId === form.deptId))
      .filter(pass => WEEKDAY_KEYS.some(dayKey => pass.days.includes(dayKey) && isShiftLegal(form, dayKey, passToShift(pass))))
      .map(pass => pass.id);
    const availableIds = normalizedPassBank.filter(pass => effectiveAllowedPassTypes.includes(pass.passType)).map(pass => pass.id);
    setForm({ ...form, allowedPassIds: suggestion.length === availableIds.length ? [] : suggestion });
  };

  const updateShift = (day, idx, val) => {
    const newSched = { ...form.sched };
    if (!newSched[day]) newSched[day] = ['',''];
    newSched[day] = [...newSched[day]];
    newSched[day][idx] = val;
    setForm({ ...form, sched: newSched });
  };
  const toggleDayOff = (day) => {
    const cur = form.daysOff || [];
    setForm({ ...form, daysOff: cur.includes(day) ? cur.filter(d => d !== day) : [...cur, day] });
  };
  const handleBackdropMouseDown = (e) => {
    backdropPressStarted.current = e.target === e.currentTarget;
  };
  const handleBackdropClick = (e) => {
    const shouldClose = backdropPressStarted.current && e.target === e.currentTarget;
    backdropPressStarted.current = false;
    if (shouldClose) onClose();
  };

  return (
    <div
      className="fixed inset-0 z-50 flex items-center justify-center p-4"
      style={{ backgroundColor: 'rgba(28, 25, 23, 0.4)' }}
      onMouseDown={handleBackdropMouseDown}
      onClick={handleBackdropClick}
    >
      <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="sticky top-0 bg-white border-b border-stone-200 px-6 py-4 flex items-center justify-between z-10">
          <div>
            <h2 className="display-font text-2xl text-stone-800">{form.name}</h2>
            <p className="text-xs text-stone-500">{dept.name} · {getStaffRoleLabel(form.employmentRole)}{form.role ? ` · ${form.role}` : ''}</p>
          </div>
          <button onClick={onClose} className="text-stone-400 hover:text-stone-700"><X size={20} /></button>
        </div>

        <div className="p-6 space-y-6">
          <div className="sticky top-0 z-10 -mx-1 bg-white/95 backdrop-blur border-b border-stone-100 pb-3">
            <div className="flex gap-1 p-1 bg-stone-100 rounded-xl">
              {[
                { key: 'basic', label: 'Grund', hint: 'Namn, befattning och generator' },
                { key: 'schedule', label: 'Befintligt schema', hint: 'Skriv in tider direkt' },
                { key: 'rules', label: 'Pusselregler', hint: 'Generator och fredagar' },
                { key: 'certs', label: 'Behörigheter', hint: 'Ämnen och stadier' },
              ].map(tab => (
                <button key={tab.key} type="button" onClick={() => setStaffEditTab(tab.key)}
                  className={`flex-1 px-3 py-2 rounded-lg text-left transition ${staffEditTab === tab.key ? 'bg-white text-stone-900 shadow-sm ring-1 ring-stone-200' : 'text-stone-600 hover:bg-stone-50'}`}>
                  <span className="block text-sm" style={{ fontWeight: 500 }}>{tab.label}</span>
                  <span className="block text-[10px] opacity-70 mt-0.5">{tab.hint}</span>
                </button>
              ))}
            </div>
          </div>

          <div className={staffEditTab === 'basic' ? 'space-y-6' : 'hidden'}>
          {/* Grunduppgifter */}
          <Section title="Grunduppgifter">
            <div className="grid grid-cols-2 gap-4">
              <Field label="Namn"><input className="input" autoComplete="off" spellCheck="false" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} /></Field>
              <Field label="Befattning">
                <select className="input" value={form.employmentRole || ''} onChange={e => setEmploymentRole(e.target.value)}>
                  {STAFF_ROLE_OPTIONS.map(option => <option key={option.id || 'empty'} value={option.id}>{option.label}</option>)}
                </select>
              </Field>
              <Field label="Fritidsavdelning">
                <select className="input" value={form.deptId || ''} onChange={e => setForm({ ...form, deptId: e.target.value })}>
                  <option value="">Skola / ingen fritidsavdelning</option>
                  {departments.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                </select>
              </Field>
              <Field label="Förtydligande/undervisning"><input className="input" value={form.role} onChange={e => setForm({ ...form, role: e.target.value })} placeholder="ex. åk 1, musik, samverkan" /></Field>
            </div>
            <p className="text-xs text-stone-500 mt-2">Befattning styr filtren i Skola. Fritidsavdelning behövs främst för generator, bemanning och avdelningspass. Lärare kan lämnas på Skola / ingen fritidsavdelning.</p>
            <div className="mt-4 rounded-xl bg-stone-50 ring-1 ring-stone-200 p-3">
              <Toggle checked={!!form.includeInGenerator} onChange={v => setForm({ ...form, includeInGenerator: v })}
                label="Ingår i Schemagenerator"
                hint={form.includeInGenerator ? 'Kan få fritidspass när generatorn pusslar förslag' : 'Finns kvar i huvudappen men lämnas utanför generatorförslag'}
                tip="Använd detta för fritidshemspersonal som ska kunna pusslas inför nytt läsår. Stäng av för renodlade lärare eller personer som bara ska finnas i Personligt schema, Uppdrag, Skola och Drift." />
            </div>
            <div className="mt-4">
              <p className="text-xs text-stone-600 mb-2" style={{ fontWeight: 500 }}>Tjänstgöring</p>
              <div className="grid grid-cols-2 gap-4">
                <Field label="Tid på arbetsplats vid 100%"
