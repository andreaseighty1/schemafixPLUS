<script>
// Bygg lucide-react-stilade komponenter ovanpå lucide UMD.
// lucide UMD exponerar varje ikon som en array av barn-element: [[tag, attrs], [tag, attrs], ...]
// Vi bygger en React-komponent som tar size/className/fill/style etc precis som lucide-react.
(function() {
  const { createElement: h } = React;
  const iconNames = ['AlertCircle', 'Clock', 'Users', 'Calendar', 'CheckCircle2', 'ChevronRight', 'Edit3', 'Sparkles', 'X', 'Plus', 'Trash2', 'Wand2', 'Settings', 'Download', 'Upload', 'Circle', 'HelpCircle', 'ArrowRight', 'Printer', 'Briefcase', 'Layers', 'Repeat', 'Building2', 'Menu'];
  const defaultSvgAttrs = {
    xmlns: 'http://www.w3.org/2000/svg',
    viewBox: '0 0 24 24',
    fill: 'none',
    stroke: 'currentColor',
    strokeWidth: 2,
    strokeLinecap: 'round',
    strokeLinejoin: 'round',
  };
  const icons = {};
  iconNames.forEach(name => {
    icons[name] = function IconComponent(props = {}) {
      const { size = 24, fill, color, className, style, ...rest } = props;
      const iconChildren = window.lucide && window.lucide[name];
      if (!iconChildren || !Array.isArray(iconChildren)) {
        return h('span', { className, style });
      }
      const children = iconChildren.map((child, i) => {
        const [tag, childAttrs] = child;
        // Konvertera kebab-case attrs (stroke-width) ? camelCase för React
        const reactAttrs = {};
        Object.entries(childAttrs || {}).forEach(([k, v]) => {
          const reactKey = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
          reactAttrs[reactKey] = v;
        });
        return h(tag, { key: i, ...reactAttrs });
      });
      return h('svg', {
        ...defaultSvgAttrs,
        width: size, height: size,
        fill: fill || defaultSvgAttrs.fill,
        stroke: color || defaultSvgAttrs.stroke,
        className, style,
        ...rest,
      }, ...children);
    };
  });
  window.__icons = icons;
})();
</script>

// Default-avdelning vid första start (en enda, döpas/ändras enkelt)

// Hjälp: räkna ut "soft" pastellvariant från huvudfärg
function softColor(hex) {
  if (!hex || hex.length < 7) return '#f5f5f4';
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const blend = c => Math.round(c * 0.18 + 255 * 0.82);
  const toHex = c => c.toString(16).padStart(2, '0');
  return `#${toHex(blend(r))}${toHex(blend(g))}${toHex(blend(b))}`;
}

// Slå upp en avdelning från id (eller fallback om den raderats)
function getDept(deptId, departments) {
  return departments.find(d => d.id === deptId) || { id: '?', name: '(saknas)', color: '#999999' };
}
function getDayMeta(dayKey) {
  return DAY_META.find(day => day.key === dayKey) || { key: dayKey, label: dayKey, short: dayKey };
}

// Returnerar den effektiva tidsbegränsningen för en person på en specifik dag.
// Prioritetsordning: dagsundantag > paritetsundantag (jämn/udda vecka) > generell regel.
function getConstraint(person, dayKey, key, parity) {
  const dayOv = (person.dayOverrides || {})[dayKey];
  if (dayOv && dayOv[key] !== undefined) return dayOv[key];
  if (parity) {
    const parOv = (person.parityOverrides || {})[parity];
    if (parOv && parOv[key] !== undefined) return parOv[key];
  }
  return person[key];
}

// Räkna ut målet i minuter från fullTimeHours + percent
function getTargetMin(person) {
  return Math.round(((person.fullTimeHours ?? 37.5) * 60 * (person.percent ?? 100)) / 100);
}

// Räkna ut en persons fredagspass för en given vecka i cykeln (1-indexerad).
// Modell: varje person har sin EGNA lista av fredagspass (en per vecka i cykeln).
// Det är samma struktur som i den ursprungliga Excel-filen — varje person har sin rad.
function getTemplateFridayShift(fridayTemplateRotation, week, startWeek = 1, cycleWeeks = 8) {
  if (!Array.isArray(fridayTemplateRotation) || fridayTemplateRotation.length === 0) return null;
  const len = fridayTemplateRotation.length;
  const idx = (((week - 1) + ((startWeek || 1) - 1)) % len + len) % len;
  return fridayTemplateRotation[idx] || null;
}

function hasFridayTemplateOverride(person, week) {
  return Object.prototype.hasOwnProperty.call(person.fridayTemplateOverrides || {}, String(week));
}

function getFridayShift(person, week, cycleWeeks, fridayTemplateRotation = []) {
  if ((person.daysOff || []).includes('fri')) return null;
  if (!person.hasFridayRotation && person.fridayShift) return person.fridayShift;
  if (person.hasFridayRotation && person.fridayUseTemplate) {
    if (hasFridayTemplateOverride(person, week)) {
      return (person.fridayTemplateOverrides || {})[String(week)] || null;
    }
    return getTemplateFridayShift(fridayTemplateRotation, week, person.fridayTemplateStartWeek || 1, cycleWeeks);
  }
  if (person.hasFridayRotation && Array.isArray(person.fridayRotation) && person.fridayRotation.length > 0) {
    const len = person.fridayRotation.length;
    const idx = (((week - 1) % len) + len) % len;
    return person.fridayRotation[idx] || null;
  }
  return null;
}

function isPersonOffEveryFriday(person, cycleWeeks, fridayTemplateRotation = []) {
  if ((person.daysOff || []).includes('fri')) return true;
  if (person.fridayMode === 'fixed') return !normalizeShift(person.fridayShift);
  if (person.fridayMode === 'rotation') {
    const effectiveRotation = buildEffectiveFridayRotation(person, cycleWeeks, fridayTemplateRotation);
    return effectiveRotation.length > 0 && effectiveRotation.every(shift => !normalizeShift(shift));
  }
  return false;
}

function getOverviewDaysOffLabels(person, cycleWeeks, fridayTemplateRotation = []) {
  const offDays = new Set((person.daysOff || []).filter(day => WEEKDAY_KEYS.includes(day)));
  if (isPersonOffEveryFriday(person, cycleWeeks, fridayTemplateRotation)) offDays.add('fri');
  return DAY_META.filter(day => offDays.has(day.key)).map(day => day.short);
}

// Snittlig fredagstid över cykeln, räknad som arbetstid efter rastregel.
function avgFridayWorkedMinutes(person, cycleWeeks, fridayTemplateRotation = []) {
  if ((person.daysOff || []).includes('fri')) return 0;
  if (!person.hasFridayRotation && person.fridayShift) return workedDayMinutes(person.fridayShift);
  if (!person.hasFridayRotation) return 0;
  if (!person.fridayUseTemplate && (!Array.isArray(person.fridayRotation) || person.fridayRotation.length === 0)) return 0;
  let sum = 0;
  for (let w = 1; w <= cycleWeeks; w++) {
    const sh = getFridayShift(person, w, cycleWeeks, fridayTemplateRotation);
    if (sh) sum += workedDayMinutes(sh);
  }
  return sum / cycleWeeks;
}

// Justera längden på en persons rotation-array (fyll med null eller trunkera)
function resizeRotation(rotation, length) {
  const cur = Array.isArray(rotation) ? rotation : [];
  const out = new Array(length).fill(null);
  for (let i = 0; i < Math.min(cur.length, length); i++) out[i] = cur[i];
  return out;
}

function buildEffectiveFridayRotation(person, cycleWeeks, fridayTemplateRotation = []) {
  return Array.from({ length: cycleWeeks }, (_, idx) => getFridayShift(person, idx + 1, cycleWeeks, fridayTemplateRotation));
}

function assignmentIsBoundaryType(typeId) {

  return ['break', 'pedLunch'].includes(task?.type);
}
function normalizeComparableText(value) {
  return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
}
function assignmentsShareTarget(a, b) {
  const aTarget = normalizeComparableText(a?.target);
  const bTarget = normalizeComparableText(b?.target);
  return !!aTarget && aTarget === bTarget;
}

function getPassTypeLabel(passType) {
  return PASS_TYPES.find(type => type.id === passType)?.label || 'Pass';

function inferPassType(pass) {
  const explicit = typeof pass?.passType === 'string' ? pass.passType.trim() : '';
  if (PASS_TYPE_IDS.includes(explicit)) return explicit;
  const name = String(pass?.name || '').toLowerCase();
  const start = asNumber(pass?.start, null);
  const end = asNumber(pass?.end, null);
  if (name.includes('stäng')) return 'close';
  if (name.includes('öpp')) return 'open';
  if (name.includes('eftermiddag')) return 'afternoon';
  if (name.includes('morgon')) return start != null && start <= 390 ? 'open' : 'morning';
  if (name.includes('dag') || name.includes('skoldag')) return 'day';
  if (start != null && start < 390) return 'open';
  if (start != null && start < 480) return 'morning';
  if (start != null && start >= 720) return 'afternoon';

function normalizePassDays(days) {
  const source = Array.isArray(days) && days.length > 0 ? days : WEEKDAY_KEYS;
  // Tar nu med fredag som giltig dag (steg 4c). Pass kan markeras för 'fri'
  // om de ska kunna tilldelas av generatorn till passbank-läges-personer.
  return Array.from(new Set(source.filter(day => ALL_DAY_KEYS.includes(day))));
}

function normalizePass(pass, fallbackDays = WEEKDAY_KEYS) {
  const days = normalizePassDays(pass?.days || fallbackDays);
  const start = asNumber(pass?.start, 480);
  const end = asNumber(pass?.end, 960);
  const safeStart = clamp(roundToStep(start), 330, 1020);
  const safeEnd = clamp(roundToStep(end), safeStart + 60, 1080);
  const passType = inferPassType({ ...pass, start: safeStart, end: safeEnd });
  // instances = max antal personer som får tilldelas detta pass per dag.
  // 1 = unikt pass (default). 0 eller negativt tolkas som obegränsat.
  // Saknat fält (gamla data) tolkas som obegränsat så befintliga
  // scenarier inte plötsligt blir för restriktiva.
  let instances;
  if (pass?.instances === undefined || pass?.instances === null) {
    instances = 0; // obegränsat – bakåtkompatibilitet
  } else {
    const parsed = Math.floor(Number(pass.instances));
    instances = Number.isFinite(parsed) && parsed >= 0 ? parsed : 0;
  }
  return {
    id: pass?.id || `pass-${Math.random().toString(36).slice(2, 8)}`,
    name: typeof pass?.name === 'string' ? pass.name : `${minToTime(safeStart)}–${minToTime(safeEnd)}`,
    start: safeStart,
    end: safeEnd,
    days,
    deptId: pass?.deptId || '',
    passType,
    instances,
  };
}

function normalizePassBank(passBank) {
  const normalized = (Array.isArray(passBank) ? passBank : initialPassBank).map(pass => normalizePass(pass));
  return normalized.length > 0 ? normalized : initialPassBank.map(pass => normalizePass(pass));
}

function passToShift(pass) {
  if (!pass) return null;
  return [minToTime(pass.start), minToTime(pass.end)];
}

function passDuration(pass) {
  return Math.max(0, (pass?.end || 0) - (pass?.start || 0));
}
function shiftMatchesPass(shift, pass) {
  if (!shift || !pass) return false;
  return shift[0] === minToTime(pass.start) && shift[1] === minToTime(pass.end);
}

// Räknar hur många personer som har varje pass tilldelat en given dag.
// Returnerar en Map från passId ? antal personer.
// Endast pass som matchar exakt (samma start- och sluttid) räknas.
function countPassUsageForDay(staff, dayKey, passBank = []) {
  const usage = new Map();
  const passes = normalizePassBank(passBank).filter(p => p.days.includes(dayKey));
  if (passes.length === 0) return usage;
  staff.forEach(person => {
    const shift = normalizeShift(person.sched?.[dayKey]);
    if (!shift) return;
    // Hitta matchande pass i passbanken
    const match = passes.find(p => shiftMatchesPass(shift, p));
    if (match) {
      usage.set(match.id, (usage.get(match.id) || 0) + 1);
    }
  });
  return usage;
}

// Returnerar true om passet kan tilldelas till en (till) person.
// instances === 0 betyder obegränsat. Annars: usage < instances.
// Om personen redan har passet räknas det som tillgängligt (för byten).
function isPassAvailableForPerson(pass, dayKey, staff, person, passBank = []) {
  if (!pass) return false;
  if (!pass.instances || pass.instances <= 0) return true; // obegränsat
  const usage = countPassUsageForDay(staff, dayKey, passBank);
  const currentUsage = usage.get(pass.id) || 0;
  // Om personen redan har detta pass, räkna ned med 1 (de är redan inräknade)
  const currentShift = normalizeShift(person?.sched?.[dayKey]);
  const personHasThisPass = currentShift && shiftMatchesPass(currentShift, pass);
  const effectiveUsage = personHasThisPass ? currentUsage - 1 : currentUsage;
  return effectiveUsage < pass.instances;
}

function getPassDisplayLabel(pass) {
  if (!pass) return '';
  return `${getPassTypeLabel(pass.passType)} · ${minToTime(pass.start)}–${minToTime(pass.end)}`;
}

    person.onlyAfternoons ? 12 * 60 : 8 * 60,
    Number.isFinite(strict.earliestStart) ? strict.earliestStart : 330,
    Number.isFinite(strict.latestStart) ? strict.latestStart : 1020

    fallbackStart + desiredMinutes,
    Number.isFinite(strict.earliestEnd) ? strict.earliestEnd : fallbackStart + 60,
    Number.isFinite(strict.latestEnd) ? strict.latestEnd : 1080

    .map(pass => {

    // är den mest begränsade rollen (färre personer kan/vill jobba sent).
    // Detta speglar hur en mänsklig schemaläggare faktiskt jobbar.
    const anchors = getCoverageAnchorSlots(scope).slice().sort((a, b) => {
      if (a.anchorKind === 'close' && b.anchorKind !== 'close') return -1;
      if (b.anchorKind === 'close' && a.anchorKind !== 'close') return 1;
      return 0;

    anchors.forEach(anchor => {
      const currentCount = prepared.filter(member => {
        if (!personMatchesCoverageScope(member, scope)) return false;
        const shift = member.sched?.[dayKey];
        if (!shift) return false;
        return timeToMin(shift[0]) <= anchor.start && timeToMin(shift[1]) > anchor.start;

        .filter(member => personMatchesCoverageScope(member, scope) && !(member.daysOff || []).includes(dayKey) && !member.fixedTimes)

        .map(member => {

            currentCovers,

        .filter(item => !item.currentCovers && item.coveringPasses.length > 0)
        .sort((a, b) => a.optionCount - b.optionCount || a.latestStart - b.latestStart);

        const idx = prepared.findIndex(member => member.id === candidate.member.id);

        prepared[idx] = {
          ...prepared[idx],
          sched: {
            ...prepared[idx].sched,
            [dayKey]: passToShift(chosenPass),

        const eligiblePasses = getAvailableEligiblePassesForDay(person, dayKey, prepared, passBank);
        const currentShift = normalizeShift(person.sched?.[dayKey]);
        const isValidCurrentPass = currentShift && eligiblePasses.some(pass => shiftMatchesPass(currentShift, pass));
        return { person, eligiblePasses, isValidCurrentPass };
      })
      .sort((a, b) => {
        if (a.isValidCurrentPass !== b.isValidCurrentPass) return a.isValidCurrentPass ? 1 : -1;
        if (a.person.fixedTimes !== b.person.fixedTimes) return a.person.fixedTimes ? 1 : -1;
        if (a.eligiblePasses.length !== b.eligiblePasses.length) return a.eligiblePasses.length - b.eligiblePasses.length;
        const aLatest = getStrictConstraints(a.person, dayKey).latestStart;
        const bLatest = getStrictConstraints(b.person, dayKey).latestStart;
        return (aLatest ?? Infinity) - (bLatest ?? Infinity);
      });

    candidates.forEach(({ person, eligiblePasses, isValidCurrentPass }) => {
      if (isValidCurrentPass || eligiblePasses.length === 0) return;
      // Skicka in prepared så build-funktionerna ser uppdaterad usage
      const autoShift = buildCoverageAwareShift(person, dayKey, prepared, coverageScopes, cycleWeeks, fridayTemplateRotation, passBank)
        || buildSuggestedShift(person, dayKey, cycleWeeks, fridayTemplateRotation, passBank, prepared);
      const idx = prepared.findIndex(member => member.id === person.id);
      if (idx === -1) return;
      if (autoShift) {
        prepared[idx] = { ...prepared[idx], sched: { ...prepared[idx].sched, [dayKey]: autoShift } };
      } else {
        const nextSched = { ...prepared[idx].sched };
        delete nextSched[dayKey];
        prepared[idx] = { ...prepared[idx], sched: nextSched };
      }
    });
  });

  return prepared;
}
function weeklyMinutes(staff, cycleWeeks = 8, fridayTemplateRotation = []) {
  let total = 0;
  for (const d of DAYS) {
    if ((staff.daysOff || []).includes(d.key)) continue;
    if (staff.sched?.[d.key]) total += workedDayMinutes(staff.sched[d.key]);
  }
  // Fredag: passbank-läget räknar sched.fri direkt; övriga lägen använder
  // legacy-snittet över rullen (avgFridayWorkedMinutes returnerar 0 för passbank-läge
  // eftersom fridayShift och fridayRotation då är tomma, så vi kan inte bara
  // alltid kalla det – vi måste byta beräkningssätt baserat på läge).
  if (staff.fridayMode === 'passbank') {
    if (!(staff.daysOff || []).includes('fri') && staff.sched?.fri) total += workedDayMinutes(staff.sched.fri);
  } else {
    total += avgFridayWorkedMinutes(staff, cycleWeeks, fridayTemplateRotation);
  }
  return Math.round(total);
}
function hasWeekdaySchedule(person) {
  if (DAYS.some(d => !(person.daysOff || []).includes(d.key) && normalizeShift(person.sched?.[d.key]))) return true;
  // Passbank-läget kan ha schemat enbart på fredag – räkna det också.
  if (person.fridayMode === 'passbank' && !(person.daysOff || []).includes('fri') && normalizeShift(person.sched?.fri)) return true;
  return false;
}

// ==================== SCHEDULE GENERATOR (Simulated Annealing) ====================

function personMatchesCoverageScope(person, scope) {
  return scope.scopeType !== COVERAGE_DEPARTMENT || person.deptId === scope.deptId;
}

// True om generatorn får skriva i person.sched[dayKey] för denna person.
// För mån-tor: alltid sant. För 'fri': bara om personen är i passbank-läge.
// Övriga fredagslägen (rotation/fixed/null) styrs av andra fält och får
// inte mutateras genom sched.fri.
function isGeneratorManagedDay(person, dayKey) {
  if (dayKey === 'fri') return person.fridayMode === 'passbank';
  return WEEKDAY_KEYS.includes(dayKey);
}

// Lista över dagar generatorn ansvarar för, för en specifik person.
// Passbank-läge ? mån-tor + fre. Annars ? mån-tor.
function generatorDaysForPerson(person) {
  return person.fridayMode === 'passbank' ? [...WEEKDAY_KEYS, 'fri'] : WEEKDAY_KEYS.slice();
}

function getShiftForDay(person, dayKey, options = {}) {
  if ((person.daysOff || []).includes(dayKey)) return null;
  if (dayKey === 'fri') {
    // Passbank-läget: fredag bor i sched.fri precis som vilken annan dag.
    if (person.fridayMode === 'passbank') {
      return person.sched?.fri || null;
    }
    // Övriga lägen (rotation, fixed, eller ej valt): använd legacy-uppslagningen.
    return getFridayShift(person, options.fridayWeek || 1, options.cycleWeeks || 8, options.fridayTemplateRotation || []);
  }
  return person.sched?.[dayKey] || null;
}

// Bygger en hypotetisk personkopia med ett pass på en specifik dag — används av
// inline-redigering i schemavyn för att förhandsvisa veckotimmar utan att
// behöva spara. Speglar logiken i updateScheduleShift (uppdaterar rätt fält
// baserat på fredagsläget) men *muterar inget* — returnerar en ny person.
function buildPreviewPerson(person, dayKey, newShift, fridayWeek = 1, cycleWeeks = 8) {
  const cleanShift = newShift ? normalizeShift(newShift) : null;
  if (dayKey !== 'fri') {
    const sched = { ...(person.sched || {}) };
    if (cleanShift) sched[dayKey] = cleanShift;
    else delete sched[dayKey];
    return { ...person, sched };
  }
  if (person.fridayMode === 'passbank') {
    const sched = { ...(person.sched || {}) };
    if (cleanShift) sched.fri = cleanShift;
    else delete sched.fri;
    return { ...person, sched };
  }
  if (person.fridayMode === 'fixed') {
    return { ...person, fridayShift: cleanShift };
  }
  if (person.fridayMode === 'rotation') {
    if (person.fridayUseTemplate) {
      const overrides = { ...(person.fridayTemplateOverrides || {}) };
      overrides[String(fridayWeek)] = cleanShift;
      return { ...person, fridayTemplateOverrides: overrides };
    }
    const rotation = (person.fridayRotation || []).slice();
    while (rotation.length < cycleWeeks) rotation.push(null);
    rotation[fridayWeek - 1] = cleanShift;
    return { ...person, fridayRotation: rotation };
  }
  return person;
}

function computeSlots(staff, dayKey, coverageSlots, scope = { scopeType: COVERAGE_SHARED, deptId: null }, options = {}) {
  return coverageSlots.map(slot => {
    let count = 0;
    for (const p of staff) {
      if (!personMatchesCoverageScope(p, scope)) continue;
      const sh = getShiftForDay(p, dayKey, options);
      if (!sh) continue;
      const start = timeToMin(sh[0]);
      const end = timeToMin(sh[1]);
      if (start <= slot.start && end > slot.start) count++;
    }
    return { ...slot, count };
  });
}

function getAssignedPassMeta(shift, dayKey, passBank = []) {
  if (!shift) return null;
  const pass = normalizePassBank(passBank).find(candidate => candidate.days.includes(dayKey) && shiftMatchesPass(shift, candidate));
  if (pass) {
    return {
      key: pass.id,
      type: pass.passType || inferPassType(pass),
    };
  }
  return {
    key: `${shift[0]}-${shift[1]}`,
    type: inferPassType({ start: timeToMin(shift[0]), end: timeToMin(shift[1]) }),
  };
}

function scheduleSpreadPenalty(staff, passBank = []) {
  let penalty = 0;
  const normalizedPasses = normalizePassBank(passBank);

  for (const day of DAYS) {
    const passOptionsByType = new Map();
    normalizedPasses
      .filter(pass => pass.days.includes(day.key))
      .forEach(pass => {
        const type = pass.passType || inferPassType(pass);
        if (!passOptionsByType.has(type)) passOptionsByType.set(type, new Set());
        passOptionsByType.get(type).add(pass.id);
      });

    const assignedByType = new Map();
    for (const person of staff) {
      const shift = getShiftForDay(person, day.key);
      if (!shift) continue;
      const meta = getAssignedPassMeta(shift, day.key, passBank);
      if (!meta) continue;
      if (!assignedByType.has(meta.type)) assignedByType.set(meta.type, new Map());
      const counts = assignedByType.get(meta.type);
      counts.set(meta.key, (counts.get(meta.key) || 0) + 1);
    }

    assignedByType.forEach((counts, type) => {
      const assignedTotal = [...counts.values()].reduce((sum, count) => sum + count, 0);
      const optionCount = Math.max(1, passOptionsByType.get(type)?.size || counts.size || 1);
      const softCap = Math.max(1, Math.ceil(assignedTotal / optionCount));
      counts.forEach(count => {
        if (count > softCap) penalty += (count - softCap) ** 2;
      });
    });
  }

  return penalty;
}

function scheduleScore(staff, coverageScopes, cycleWeeks, fridayTemplateRotation, weights = { gap: 30, hours: 2, over: 10, spread: 0 }, passBank = []) {
  let score = 0;
  // Hour target
  for (const p of staff) {
    const wm = weeklyMinutes(p, cycleWeeks, fridayTemplateRotation);
    score -= Math.abs(wm - getTargetMin(p)) * weights.hours;
  }
  // Coverage (mån-tor)
  for (const d of DAYS) {
    for (const scope of coverageScopes) {
      const slots = computeSlots(staff, d.key, scope.slots, scope);
      for (const s of slots) {
        if (s.count < s.min) score -= (s.min - s.count) ** 2 * weights.gap;
        if (s.count > s.max) score -= (s.count - s.max) ** 2 * weights.over;
      }
    }
  }
  // Coverage (fredag) räknas som snitt över rullen så fredagen väger som en vanlig veckodag.
  if (cycleWeeks > 0) {
    let fridayPenalty = 0;
    for (let week = 1; week <= cycleWeeks; week++) {
      for (const scope of coverageScopes) {
        const slots = computeSlots(staff, 'fri', scope.slots, scope, { fridayWeek: week, cycleWeeks, fridayTemplateRotation });
        for (const s of slots) {
          if (s.count < s.min) fridayPenalty += (s.min - s.count) ** 2 * weights.gap;
          if (s.count > s.max) fridayPenalty += (s.count - s.max) ** 2 * weights.over;
        }
      }
    }
    score -= fridayPenalty / cycleWeeks;
  }
  if ((weights.spread || 0) > 0) {
    score -= scheduleSpreadPenalty(staff, passBank) * weights.spread;
  }
  return score;
}

function summarizeCoverageHealth(staff, coverageScopes, cycleWeeks, fridayTemplateRotation = []) {
  let totalGaps = 0;
  let totalGapMinutes = 0;
  let totalOver = 0;
  let totalOverMinutes = 0;

  for (const d of DAYS) {
    for (const scope of coverageScopes) {
      const slots = computeSlots(staff, d.key, scope.slots, scope);
      for (const s of slots) {
        if (s.count < s.min) {
          totalGaps++;
          totalGapMinutes += SLOT_STEP_MINUTES * (s.min - s.count);
        }
        if (s.count > s.max) {
          totalOver++;
          totalOverMinutes += SLOT_STEP_MINUTES * (s.count - s.max);
        }
      }
    }
  }

  if (cycleWeeks > 0) {
    for (let week = 1; week <= cycleWeeks; week++) {
      for (const scope of coverageScopes) {
        const slots = computeSlots(staff, 'fri', scope.slots, scope, { fridayWeek: week, cycleWeeks, fridayTemplateRotation });
        for (const s of slots) {
          if (s.count < s.min) {
            totalGaps++;
            totalGapMinutes += SLOT_STEP_MINUTES * (s.min - s.count);
          }
          if (s.count > s.max) {
            totalOver++;
            totalOverMinutes += SLOT_STEP_MINUTES * (s.count - s.max);
          }
        }
      }
    }
  }

  return { totalGaps, totalGapMinutes, totalOver, totalOverMinutes };
}

function summarizeDayCoverageHealth(staff, dayKey, coverageScopes) {
  let totalGaps = 0;
  let totalGapMinutes = 0;
  let totalOver = 0;
  let totalOverMinutes = 0;

  for (const scope of coverageScopes) {
    const slots = computeSlots(staff, dayKey, scope.slots, scope);
    for (const s of slots) {
      if (s.count < s.min) {
        totalGaps++;
        totalGapMinutes += SLOT_STEP_MINUTES * (s.min - s.count);
      }
      if (s.count > s.max) {
        totalOver++;
        totalOverMinutes += SLOT_STEP_MINUTES * (s.count - s.max);
      }
    }
  }

  return { totalGaps, totalGapMinutes, totalOver, totalOverMinutes };
}

function compareCoverageHealth(a, b) {
  if ((a?.totalOver || 0) !== (b?.totalOver || 0)) return (a?.totalOver || 0) - (b?.totalOver || 0);
  if ((a?.totalOverMinutes || 0) !== (b?.totalOverMinutes || 0)) return (a?.totalOverMinutes || 0) - (b?.totalOverMinutes || 0);
  if ((a?.totalGaps || 0) !== (b?.totalGaps || 0)) return (a?.totalGaps || 0) - (b?.totalGaps || 0);
  if ((a?.totalGapMinutes || 0) !== (b?.totalGapMinutes || 0)) return (a?.totalGapMinutes || 0) - (b?.totalGapMinutes || 0);
  return 0;
}

// För ankarbemanning (öppning/stängning) bryr vi oss enbart om UNDERBEMANNING.
// Att ha "för många" på öppning är inte ett ankarbrott – det är bara onödigt
// och hanteras av den vanliga overbemanning-poängen. Den här jämförelsen
// låter sökmotorn flytta runt personer fritt så länge det fortfarande
// finns någon som öppnar och någon som stänger.
function compareAnchorDeficit(a, b) {
  if ((a?.totalGaps || 0) !== (b?.totalGaps || 0)) return (a?.totalGaps || 0) - (b?.totalGaps || 0);
  if ((a?.totalGapMinutes || 0) !== (b?.totalGapMinutes || 0)) return (a?.totalGapMinutes || 0) - (b?.totalGapMinutes || 0);
  return 0;
}

function summarizeAnchorCoverageHealth(staff, dayKey, coverageScopes, person = null) {
  let totalGaps = 0;
  let totalGapMinutes = 0;
  let totalOver = 0;
  let totalOverMinutes = 0;

  for (const scope of coverageScopes) {
    if (person && !personMatchesCoverageScope(person, scope)) continue;
    const anchors = getCoverageAnchorSlots(scope);
    for (const anchor of anchors) {
      let count = 0;
      for (const member of staff) {
        if (!personMatchesCoverageScope(member, scope)) continue;
        const shift = member.sched?.[dayKey];
        if (!shift) continue;
        if (timeToMin(shift[0]) <= anchor.start && timeToMin(shift[1]) > anchor.start) count++;
      }
      if (count < anchor.min) {
        totalGaps++;
        totalGapMinutes += SLOT_STEP_MINUTES * (anchor.min - count);
      }
      if (count > anchor.max) {
        totalOver++;
        totalOverMinutes += SLOT_STEP_MINUTES * (count - anchor.max);
      }
    }
  }

  return { totalGaps, totalGapMinutes, totalOver, totalOverMinutes };
}

function summarizeGlobalAnchorCoverageHealth(staff, coverageScopes, cycleWeeks, fridayTemplateRotation = []) {
  let totalGaps = 0;
  let totalGapMinutes = 0;
  let totalOver = 0;
  let totalOverMinutes = 0;

  for (const day of DAYS) {
    const dayHealth = summarizeAnchorCoverageHealth(staff, day.key, coverageScopes);
    totalGaps += dayHealth.totalGaps;
    totalGapMinutes += dayHealth.totalGapMinutes;
    totalOver += dayHealth.totalOver;
    totalOverMinutes += dayHealth.totalOverMinutes;
  }

  if (cycleWeeks > 0) {
    for (let week = 1; week <= cycleWeeks; week++) {
      let weekGaps = 0;
      let weekGapMinutes = 0;
      let weekOver = 0;
      let weekOverMinutes = 0;
      for (const scope of coverageScopes) {
        const anchors = getCoverageAnchorSlots(scope);
        for (const anchor of anchors) {
          let count = 0;
          for (const member of staff) {
            if (!personMatchesCoverageScope(member, scope)) continue;
            const shift = getShiftForDay(member, 'fri', { fridayWeek: week, cycleWeeks, fridayTemplateRotation });
            if (!shift) continue;
            if (timeToMin(shift[0]) <= anchor.start && timeToMin(shift[1]) > anchor.start) count++;
          }
          if (count < anchor.min) {
            weekGaps++;
            weekGapMinutes += SLOT_STEP_MINUTES * (anchor.min - count);
          }
          if (count > anchor.max) {
            weekOver++;
            weekOverMinutes += SLOT_STEP_MINUTES * (count - anchor.max);
          }
        }
      }
      totalGaps += weekGaps / cycleWeeks;
      totalGapMinutes += weekGapMinutes / cycleWeeks;
      totalOver += weekOver / cycleWeeks;
      totalOverMinutes += weekOverMinutes / cycleWeeks;
    }
  }

  return { totalGaps, totalGapMinutes, totalOver, totalOverMinutes };
}

function isShiftLegal(person, dayKey, newShift) {
  const start = timeToMin(newShift[0]);
  const end = timeToMin(newShift[1]);
  if (start === null || end === null) return false;
  if (end - start < 60) return false;
  if (start < 330 || end > 1080) return false;
  if (person.onlyAfternoons && start < 720) return false;
  const strict = getStrictConstraints(person, dayKey);
  if (Number.isFinite(strict.earliestStart) && start < strict.earliestStart) return false;
  if (Number.isFinite(strict.latestStart)   && start > strict.latestStart)   return false;
  if (Number.isFinite(strict.earliestEnd)   && end   < strict.earliestEnd)   return false;
  if (Number.isFinite(strict.latestEnd)     && end   > strict.latestEnd)     return false;
  if ((person.daysOff || []).includes(dayKey)) return false;
  return true;
}

function attemptShiftMutation(staff, passBank = [], cycleWeeks = 8, fridayTemplateRotation = [], coverageScopes = []) {
  const mutables = staff.filter(p => !p.fixedTimes);
  if (mutables.length === 0) return null;
  const p = mutables[Math.floor(Math.random() * mutables.length)];
  // Tillåt fredag som mutationsdag bara om personen är i passbank-läge.
  // Övriga lägen styrs av andra fält som generatorn inte rör.
  const eligibleDayKeys = generatorDaysForPerson(p);
  const validDays = eligibleDayKeys.filter(key => !(p.daysOff || []).includes(key));
  if (validDays.length === 0) return null;
  const dayKey = validDays[Math.floor(Math.random() * validDays.length)];
  // Respektera instances: bara pass som inte är fullbokade får väljas.
  // Personens nuvarande pass räknas som tillgängligt.
  const eligiblePasses = getAvailableEligiblePassesForDay(p, dayKey, staff, passBank);
  if (eligiblePasses.length === 0) return null;
  const current = normalizeShift(p.sched?.[dayKey]);
  const possibleShifts = eligiblePasses
    .map(passToShift)
    .filter(shift => !current || shift[0] !== current[0] || shift[1] !== current[1]);
  if (possibleShifts.length === 0) return null;
  const preferred = buildSuggestedShift(p, dayKey, cycleWeeks, fridayTemplateRotation, passBank, staff);
  const currentAnchorHealth = coverageScopes.length > 0 ? summarizeAnchorCoverageHealth(staff, dayKey, coverageScopes, p) : null;
  const currentDayHealth = coverageScopes.length > 0 ? summarizeDayCoverageHealth(staff, dayKey, coverageScopes) : null;
  const variants = possibleShifts.map(shift => {
    const candidate = staff.map(person => person.id === p.id
      ? { ...person, sched: { ...person.sched, [dayKey]: shift } }
      : person
    );
    const preferenceScore = preferred
      ? Math.abs(timeToMin(shift[0]) - timeToMin(preferred[0])) + Math.abs(dayMinutes(shift) - dayMinutes(preferred))
      : 0;
    return {
      shift,
      candidate,
      preferenceScore,
      anchorHealth: coverageScopes.length > 0 ? summarizeAnchorCoverageHealth(candidate, dayKey, coverageScopes, p) : null,
      dayHealth: coverageScopes.length > 0 ? summarizeDayCoverageHealth(candidate, dayKey, coverageScopes) : null,
    };
  });
  variants.sort((a, b) => {
    const anchorDiff = compareAnchorDeficit(a.anchorHealth, b.anchorHealth);
    if (anchorDiff !== 0) return anchorDiff;
    const healthDiff = compareCoverageHealth(a.dayHealth, b.dayHealth);
    if (healthDiff !== 0) return healthDiff;
    return a.preferenceScore - b.preferenceScore;
  });

  const anchorSafe = currentAnchorHealth
    ? variants.filter(variant => compareAnchorDeficit(variant.anchorHealth, currentAnchorHealth) <= 0)
    : variants;
  if (currentAnchorHealth && anchorSafe.length === 0) return null;
  const nonWorsening = currentDayHealth
    ? anchorSafe.filter(variant => compareCoverageHealth(variant.dayHealth, currentDayHealth) <= 0)
    : anchorSafe;
  const selectedPool = nonWorsening.length > 0
    ? nonWorsening
    : anchorSafe;
  const topSlice = selectedPool.slice(0, Math.min(4, selectedPool.length));
  const chosen = Math.random() < 0.55
    ? topSlice[Math.floor(Math.random() * topSlice.length)]
    : selectedPool[Math.floor(Math.random() * selectedPool.length)];

  return chosen?.candidate || null;
}

// Swap-mutation: byter pass mellan två personer på samma dag i ETT steg.
// Detta är värdefullt eftersom det låter algoritmen flytta runt personer
// utan att gå genom dåliga mellanlägen. Exempel: om Anna har stängningen
// och Bo har öppningen, men det vore bättre tvärtom – då kan vi byta direkt
// utan att tillfälligt ha "ingen på stängning" eller "två på öppning".
function attemptSwapMutation(staff, passBank = [], cycleWeeks = 8, fridayTemplateRotation = [], coverageScopes = []) {
  const mutables = staff.filter(p => !p.fixedTimes);
  if (mutables.length < 2) return null;
  // Välj slumpmässig dag — inkl fredag, men byten på fredag tillåts bara
  // mellan två passbank-personer (filtreras nedan i workingToday).
  const allDays = [...WEEKDAY_KEYS, 'fri'];
  const dayKey = allDays[Math.floor(Math.random() * allDays.length)];
  // Hitta personer som jobbar denna dag (har ett pass och inte är ledig).
  // För fredag: bara passbank-läges-personer kvalificerar (legacy-personer
  // kan inte byta sin fredag genom sched-mutationer).
  const workingToday = mutables.filter(p =>
    !(p.daysOff || []).includes(dayKey)
    && p.sched?.[dayKey]
    && isGeneratorManagedDay(p, dayKey)
  );
  if (workingToday.length < 2) return null;
  // Välj två slumpmässiga personer
  const idxA = Math.floor(Math.random() * workingToday.length);
  let idxB = Math.floor(Math.random() * (workingToday.length - 1));
  if (idxB >= idxA) idxB++;
  const personA = workingToday[idxA];
  const personB = workingToday[idxB];
  const shiftA = normalizeShift(personA.sched?.[dayKey]);
  const shiftB = normalizeShift(personB.sched?.[dayKey]);
  if (!shiftA || !shiftB) return null;
  // Identiska pass – inget att byta
  if (shiftA[0] === shiftB[0] && shiftA[1] === shiftB[1]) return null;
  // Kontrollera att båda personerna kan ta varandras pass
  if (!isShiftLegal(personA, dayKey, shiftB)) return null;
  if (!isShiftLegal(personB, dayKey, shiftA)) return null;
  // Och att passen finns i deras respektive eligible-lista (passBank-regler)
  const eligibleA = getEligiblePassesForDay(personA, dayKey, passBank);
  const eligibleB = getEligiblePassesForDay(personB, dayKey, passBank);
  const aCanTakeB = eligibleA.some(pass => {
    const s = passToShift(pass);
    return s[0] === shiftB[0] && s[1] === shiftB[1];
  });
  const bCanTakeA = eligibleB.some(pass => {
    const s = passToShift(pass);
    return s[0] === shiftA[0] && s[1] === shiftA[1];
  });
  if (!aCanTakeB || !bCanTakeA) return null;
  // Bygg kandidat med bytet
  const candidate = staff.map(person => {
    if (person.id === personA.id) return { ...person, sched: { ...person.sched, [dayKey]: shiftB } };
    if (person.id === personB.id) return { ...person, sched: { ...person.sched, [dayKey]: shiftA } };
    return person;
  });
  // Ankarsäkerhet: byte får inte öka underbemanning av öppning/stängning
  if (coverageScopes.length > 0) {
    const currentAnchor = summarizeAnchorCoverageHealth(staff, dayKey, coverageScopes);
    const candAnchor = summarizeAnchorCoverageHealth(candidate, dayKey, coverageScopes);
    if (compareAnchorDeficit(candAnchor, currentAnchor) > 0) return null;
  }
  return candidate;
}

// Dispatcher: ~70% shift-mutation (en person byter pass), ~30% swap-mutation
// (två personer byter pass). Behåller originalfunktionens namn så
// resten av koden inte behöver ändras.
function attemptMutation(staff, passBank = [], cycleWeeks = 8, fridayTemplateRotation = [], coverageScopes = []) {
  if (Math.random() < 0.3) {
    const swapResult = attemptSwapMutation(staff, passBank, cycleWeeks, fridayTemplateRotation, coverageScopes);
    if (swapResult) return swapResult;
    // Om swap inte gick (t.ex. för få personer på dagen), faller vi tillbaka
    // på shift-mutation istället för att returnera null.
  }
  return attemptShiftMutation(staff, passBank, cycleWeeks, fridayTemplateRotation, coverageScopes);
}

function yieldToBrowser() {
  return new Promise(resolve => {
    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(() => resolve());
      return;
    }
    setTimeout(resolve, 0);
  });
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function runSearchAsync(initialStaff, coverageScopes, cycleWeeks, fridayTemplateRotation, passBank, weights, iterations = 2500, options = {}) {
  const { chunkSize = 100, onProgress } = options;
  let current = initialStaff.map(p => ({ ...p, sched: { ...p.sched } }));
  let currentAnchorHealth = summarizeGlobalAnchorCoverageHealth(current, coverageScopes, cycleWeeks, fridayTemplateRotation);
  let currentScore = scheduleScore(current, coverageScopes, cycleWeeks, fridayTemplateRotation, weights, passBank);
  let currentHealth = summarizeCoverageHealth(current, coverageScopes, cycleWeeks, fridayTemplateRotation);
  let best = current;
  let bestAnchorHealth = currentAnchorHealth;
  let bestScore = currentScore;
  let bestHealth = currentHealth;
  let temp = 80;
  const coolRate = 0.9985;

  for (let chunkStart = 0; chunkStart < iterations; chunkStart += chunkSize) {
    const chunkEnd = Math.min(iterations, chunkStart + chunkSize);
    for (let i = chunkStart; i < chunkEnd; i++) {
      const cand = attemptMutation(current, passBank, cycleWeeks, fridayTemplateRotation, coverageScopes);
      if (!cand) continue;
      const candAnchorHealth = summarizeGlobalAnchorCoverageHealth(cand, coverageScopes, cycleWeeks, fridayTemplateRotation);
      const cs = scheduleScore(cand, coverageScopes, cycleWeeks, fridayTemplateRotation, weights, passBank);
      const candHealth = summarizeCoverageHealth(cand, coverageScopes, cycleWeeks, fridayTemplateRotation);
      // Ankaret skyddas hårt: vi accepterar ALDRIG mutationer som ökar
      // underbemanningen på öppning/stängning. Däremot tillåter vi nu
      // försämringar i andra mål med temperaturberoende sannolikhet
      // (riktig simulated annealing) – annars fastnar sökningen i
      // första närmaste lokala minimum.
      const anchorDelta = compareAnchorDeficit(candAnchorHealth, currentAnchorHealth);
      const healthDelta = compareCoverageHealth(candHealth, currentHealth);
      const delta = cs - currentScore;
      let acceptCandidate = false;
      if (anchorDelta <= 0) {
        // Ankaret är minst lika bra – pröva resten med annealing.
        if (anchorDelta < 0) {
          // Strikt förbättring av ankaret – alltid acceptera.
          acceptCandidate = true;
        } else if (healthDelta < 0) {
          // Ankaret oförändrat, övrig bemanning bättre – acceptera.
          acceptCandidate = true;
        } else if (delta >= 0) {
          // Ingen försämring – acceptera.
          acceptCandidate = true;
        } else {
          // Försämring – acceptera med temperaturberoende sannolikhet.
          // Detta är hjärtat i simulated annealing och behövs för att
          // sökningen ska kunna ta sig ur lokala minima.
          acceptCandidate = Math.random() < Math.exp(delta / temp);
        }
      }
      if (acceptCandidate) {
        current = cand;
        currentAnchorHealth = candAnchorHealth;
        currentScore = cs;
        currentHealth = candHealth;
        const bestAnchorDelta = compareAnchorDeficit(candAnchorHealth, bestAnchorHealth);
        const bestHealthDelta = compareCoverageHealth(candHealth, bestHealth);
        if (bestAnchorDelta < 0 || (bestAnchorDelta === 0 && (bestHealthDelta < 0 || (bestHealthDelta === 0 && cs > bestScore)))) {
          best = cand;
          bestAnchorHealth = candAnchorHealth;
          bestScore = cs;
          bestHealth = candHealth;
        }
      }
      temp *= coolRate;
    }
    if (onProgress) onProgress(chunkEnd / iterations);
    if (chunkEnd < iterations) await yieldToBrowser();
  }
  return best;
}

function summarizeSchedule(staff, coverageScopes, cycleWeeks, fridayTemplateRotation = []) {
  let totalGaps = 0, totalGapMinutes = 0, totalOver = 0, totalOverMinutes = 0;
  for (const d of DAYS) {
    for (const scope of coverageScopes) {
      const slots = computeSlots(staff, d.key, scope.slots, scope);
      for (const s of slots) {
        if (s.count < s.min) { totalGaps++; totalGapMinutes += SLOT_STEP_MINUTES * (s.min - s.count); }
        if (s.count > s.max) { totalOver++; totalOverMinutes += SLOT_STEP_MINUTES * (s.count - s.max); }
      }
    }
  }
  if (cycleWeeks > 0) {
    let fridayGaps = 0;
    let fridayGapMinutes = 0;
    let fridayOver = 0;
    let fridayOverMinutes = 0;
    for (let week = 1; week <= cycleWeeks; week++) {
      for (const scope of coverageScopes) {
        const slots = computeSlots(staff, 'fri', scope.slots, scope, { fridayWeek: week, cycleWeeks, fridayTemplateRotation });
        for (const s of slots) {
          if (s.count < s.min) {
            fridayGaps++;
            fridayGapMinutes += SLOT_STEP_MINUTES * (s.min - s.count);
          }
          if (s.count > s.max) {
            fridayOver++;
            fridayOverMinutes += SLOT_STEP_MINUTES * (s.count - s.max);
          }
        }
      }
    }
    totalGaps += Math.round(fridayGaps / cycleWeeks);
    totalGapMinutes += Math.round(fridayGapMinutes / cycleWeeks);
    totalOver += Math.round(fridayOver / cycleWeeks);
    totalOverMinutes += Math.round(fridayOverMinutes / cycleWeeks);
  }
  let totalHourDev = 0, peopleOff = 0;
  for (const p of staff) {
    const dev = weeklyMinutes(p, cycleWeeks, fridayTemplateRotation) - getTargetMin(p);
    totalHourDev += Math.abs(dev);
    if (Math.abs(dev) > 5) peopleOff++;
  }
  return { totalGaps, totalGapMinutes, totalOver, totalOverMinutes, totalHourDev, peopleOff };
}

function summarizeGapSegments(slots = []) {
  const segments = [];
  let current = null;
  for (const slot of slots) {
    const shortfall = Math.max(0, (slot.min || 0) - (slot.count || 0));
    if (shortfall > 0) {
      if (!current) {
        current = {
          start: slot.start,
          end: slot.start + SLOT_STEP_MINUTES,
          slotCount: 1,
          totalShortfallMinutes: shortfall * SLOT_STEP_MINUTES,
          maxShortfall: shortfall,
        };
      } else {
        current.end = slot.start + SLOT_STEP_MINUTES;
        current.slotCount += 1;
        current.totalShortfallMinutes += shortfall * SLOT_STEP_MINUTES;
        current.maxShortfall = Math.max(current.maxShortfall, shortfall);
      }
    } else if (current) {
      segments.push(current);
      current = null;
    }
  }
  if (current) segments.push(current);
  return segments;
}

async function generateAlternativesAsync(initialStaff, coverageScopes, cycleWeeks, fridayTemplateRotation, passBank, onProgress) {
  const variants = [
    { label: 'Bemannings­fokus', desc: 'Prioriterar att alla pass är täckta utan att överbemanna', weights: { gap: 50, hours: 1, over: 35, spread: 4 } },
    { label: 'Tim­fokus',        desc: 'Prioriterar exakta veckotimmar men försöker sprida passen', weights: { gap: 15, hours: 5, over: 22, spread: 12 } },
    { label: 'Balanserat',       desc: 'Väger bemanning, timmål, maxantal och passpridning',        weights: { gap: 30, hours: 2, over: 28, spread: 8 } },
  ];
  const results = [];
  for (let i = 0; i < variants.length; i++) {
    const v = variants[i];
    const result = await runSearchAsync(
      initialStaff,
      coverageScopes,
      cycleWeeks,
      fridayTemplateRotation,
      passBank,
      v.weights,
      2500,
      {
        chunkSize: 50,
          onProgress: (variantProgress) => {
            if (!onProgress) return;
            const overall = ((i + variantProgress) / variants.length) * 100;
            // Bar:ns procent (höger) och fyllningen är totalprogressen. Labeln
            // visar bara variantens NAMN – variantens egna procent skulle bara
            // förvirra eftersom de redan ser totalprocenten till höger.
            onProgress({
              percent: Math.max(1, Math.min(100, overall)),
              label: v.label,
              detail: `Tar fram alternativ ${i + 1} av ${variants.length}`,
            });
          },
      }
    );
    results.push({
      ...v,
      staff: result,
      summary: summarizeSchedule(result, coverageScopes, cycleWeeks, fridayTemplateRotation),
    });
    if (i < variants.length - 1) await yieldToBrowser();
  }
  return results;
}

function getTotalRequiredAtTime(coverageScopes, time) {
  return coverageScopes.reduce((sum, scope) => {
    const slot = (scope.slots || []).find(s => s.start === time);
    return sum + (slot?.min || 0);
  }, 0);
}

function personCanCoverTime(person, dayKey, time, passBank = []) {
  return getEligiblePassesForDay(person, dayKey, passBank).some(pass => pass.start <= time && pass.end > time);
}

function personCanCoverTimes(person, dayKey, times, passBank = []) {
  if (!Array.isArray(times) || times.length === 0) return false;
  return getEligiblePassesForDay(person, dayKey, passBank).some(pass => times.every(time => pass.start <= time && pass.end > time));
}

function analyzeCoverageFeasibility(staff, passBank, coverageScopes, cycleWeeks = 8) {
  const normalizedStaff = normalizeStaffList(staff, cycleWeeks);
  const issues = [];

  for (const day of DAYS) {
    const dayStaff = normalizedStaff.filter(person => !(person.daysOff || []).includes(day.key));
    const positiveTimes = [...new Set(
      coverageScopes.flatMap(scope => (scope.slots || []).filter(slot => slot.min > 0).map(slot => slot.start))
    )].sort((a, b) => a - b);

    const availabilityByTime = new Map();
    positiveTimes.forEach(time => {
      availabilityByTime.set(time, dayStaff.filter(person => personCanCoverTime(person, day.key, time, passBank)).length);
    });

    positiveTimes.forEach(time => {
      const required = getTotalRequiredAtTime(coverageScopes, time);
      const available = availabilityByTime.get(time) || 0;
      if (available < required) {
        issues.push({
          kind: 'capacity',
          dayKey: day.key,
          message: `${getDayMeta(day.key).label}: ${required} behövs ${minToTime(time)}, men bara ${available} personer har något giltigt pass som täcker den tiden.`,
        });
      }

      // NY: Kontrollera att passbankens instances räcker för att täcka kravet.
      // Summera max-kapaciteten av alla pass som täcker tiden.
      const passes = normalizePassBank(passBank).filter(p =>
        p.days.includes(day.key) && p.start <= time && p.end > time
      );
      // Om något pass har obegränsat (instances=0), är kapaciteten oändlig.
      const hasUnlimited = passes.some(p => !p.instances || p.instances <= 0);
      if (!hasUnlimited && passes.length > 0) {
        const maxCapacity = passes.reduce((sum, p) => sum + (p.instances || 0), 0);
        if (maxCapacity < required) {
          issues.push({
            kind: 'instances',
            dayKey: day.key,
            message: `${getDayMeta(day.key).label}: ${minToTime(time)} kräver ${required} personer, men passbanken har bara plats för ${maxCapacity} (summan av "Antal" på pass som täcker tiden). Öka antalet på något pass eller lägg till ett pass.`,
          });
        }
      }
    });

    const boundaryTimes = positiveTimes.filter((time, idx) => idx === 0 || getTotalRequiredAtTime(coverageScopes, time) !== getTotalRequiredAtTime(coverageScopes, positiveTimes[idx - 1]));
    for (let i = 0; i < boundaryTimes.length; i++) {
      for (let j = i + 1; j < boundaryTimes.length; j++) {
        const early = boundaryTimes[i];
        const late = boundaryTimes[j];
        const earlyRequired = getTotalRequiredAtTime(coverageScopes, early);
        const lateRequired = getTotalRequiredAtTime(coverageScopes, late);
        const neededOverlap = Math.max(0, earlyRequired + lateRequired - dayStaff.length);
        if (neededOverlap <= 0) continue;
        const overlapAvailable = dayStaff.filter(person => personCanCoverTimes(person, day.key, [early, late], passBank)).length;
        if (overlapAvailable < neededOverlap) {
          issues.push({
            kind: 'flow',
            dayKey: day.key,
            message: `${getDayMeta(day.key).label}: bemanningen kräver att minst ${neededOverlap} person${neededOverlap === 1 ? '' : 'er'} täcker både ${minToTime(early)} och ${minToTime(late)}, men bara ${overlapAvailable} kan göra det med ett och samma pass. Det betyder att blocken över dagen krockar matematiskt.`,
          });
        }
      }
    }

    const criticalTimes = positiveTimes.filter(time => {
      const required = getTotalRequiredAtTime(coverageScopes, time);
      const available = availabilityByTime.get(time) || 0;
      return required > 0 && available === required;
    });

    for (const scope of coverageScopes) {
      const anchors = getCoverageAnchorSlots(scope);
      for (const anchor of anchors) {
        if ((anchor.min || 0) <= 0) continue;
        const scopeLabel = scope.scopeType === COVERAGE_DEPARTMENT ? scope.label : 'Gemensam bemanning';
        const anchorCandidates = dayStaff.filter(person =>
          personMatchesCoverageScope(person, scope) && personCanCoverTime(person, day.key, anchor.start, passBank)
        );
        if (anchorCandidates.length < anchor.min) {
          issues.push({
            kind: 'anchor',
            dayKey: day.key,
            message: `${getDayMeta(day.key).label}: ${scopeLabel} saknar kandidater för ${anchor.anchorKind === 'open' ? 'öppning' : 'stängning'} ${minToTime(anchor.start)}. Behöver ${anchor.min}, men bara ${anchorCandidates.length} personer har ett giltigt pass som täcker tiden.`,
          });
          continue;
        }

        const blockingCriticalTimes = criticalTimes.filter(time => time > anchor.start);
        if (blockingCriticalTimes.length === 0) continue;
        const bridgeCandidates = dayStaff.filter(person =>
          personMatchesCoverageScope(person, scope)
          && personCanCoverTimes(person, day.key, [anchor.start, ...blockingCriticalTimes], passBank)
        );
        if (bridgeCandidates.length < anchor.min) {
          issues.push({
            kind: 'bridge',
            dayKey: day.key,
            message: `${getDayMeta(day.key).label}: ${scopeLabel} kan inte bära ${anchor.anchorKind === 'open' ? 'öppningen' : 'stängningen'} ${minToTime(anchor.start)} hela vägen. Senare krävs alla samtidigt (${blockingCriticalTimes.map(minToTime).join(', ')}), men bara ${bridgeCandidates.length} personer har ett och samma pass som täcker både ankartiden och de senare fullbelagda tiderna.`,
          });
        }
      }
    }
  }

  const seen = new Set();
  return issues.filter(issue => {
    const key = `${issue.kind}-${issue.dayKey}-${issue.message}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function analyzeCoverageBlockStatus(block, staff, passBank, cycleWeeks = 8) {
  const normalizedStaff = normalizeStaffList(staff, cycleWeeks);
  const scope = {
    scopeType: block.scopeType === COVERAGE_DEPARTMENT ? COVERAGE_DEPARTMENT : COVERAGE_SHARED,
    deptId: block.scopeType === COVERAGE_DEPARTMENT ? block.deptId : null,
  };
  const times = [];
  for (let time = getCoverageBlockActiveStart(block); time < block.end; time += SLOT_STEP_MINUTES) times.push(time);

  // Vilka dagar ska analyseras? Mån-tor alltid. Fredag bara om någon i scopet
  // är i passbank-läge – fast/rull-personer styr fredag via egna fält och är
  // inte relevanta för pass-feasibilitet på fredag.
  const passbankInScope = normalizedStaff.some(person =>
    person.fridayMode === 'passbank' && personMatchesCoverageScope(person, scope)
  );
  const daysToCheck = passbankInScope
    ? [...DAYS, { key: 'fri', label: 'Fredag', short: 'fre' }]
    : DAYS;

  const dayChecks = daysToCheck.map(day => {
    let worstAvailable = Infinity;
    let worstTime = block.start;
    times.forEach(time => {
      const available = normalizedStaff.filter(person => {
        if ((person.daysOff || []).includes(day.key)) return false;
        if (!personMatchesCoverageScope(person, scope)) return false;
        // På fredag räknas bara passbank-personer – övriga sköts av legacy-fält
        // som denna analys inte täcker.
        if (day.key === 'fri' && person.fridayMode !== 'passbank') return false;
        return personCanCoverTime(person, day.key, time, passBank);
      }).length;
      if (available < worstAvailable) {
        worstAvailable = available;
        worstTime = time;
      }
    });
    if (!Number.isFinite(worstAvailable)) worstAvailable = 0;
    const minNeeded = block.min || 0;
    return {
      dayKey: day.key,
      ok: worstAvailable >= minNeeded,
      tight: minNeeded > 0 && worstAvailable === minNeeded,
      worstAvailable,
      worstTime,
      minNeeded,
    };
  });

  const worst = dayChecks.reduce((lowest, check) => {
    if (!lowest) return check;
    return check.worstAvailable < lowest.worstAvailable ? check : lowest;
  }, null);
  const allOk = dayChecks.every(check => check.ok);
  const anyTight = dayChecks.some(check => check.tight);

  return {
    allOk,
    anyTight,
    worst,
    dayChecks,
  };
}

const TIMELINE_START = 330;
const TIMELINE_END   = 1080;
const TIMELINE_RANGE = TIMELINE_END - TIMELINE_START;
const pctFromMin = m => ((m - TIMELINE_START) / TIMELINE_RANGE) * 100;

let nextId = 100;

function FritidsSchemaApp() {
  const [staff, setStaff] = useState(initialStaff);
  // Baseline: snapshot av staff från senaste "utgångspunkt" (generering,
  // exempelinläsning, filimport eller tömning). Används av schemavyn för att
  // visa vad användaren har manuellt ändrat sedan dess, och för återställning.
  // null betyder "ingen utgångspunkt satt än" – då visas inga diff-markeringar.
  const [baselineStaff, setBaselineStaff] = useState(null);
  const [departments, setDepartments] = useState(initialDepartments);
  const [coverageBlocks, setCoverageBlocks] = useState(initialCoverageBlocks);
  const [passBank, setPassBank] = useState(() => normalizePassBank(initialPassBank));
  const [assignments, setAssignments] = useState(initialAssignments);
  const [assignmentWindows, setAssignmentWindows] = useState(initialAssignmentWindows);
  const [fridayCycleWeeks, setFridayCycleWeeksRaw] = useState(8);
  const [fridayTemplateRotation, setFridayTemplateRotation] = useState(initialFridayTemplateRotation);
  const [currentFridayWeek, setCurrentFridayWeek] = useState(1);
  const normalizedCoverageBlocks = useMemo(
    () => normalizeCoverageBlocks(coverageBlocks, departments),
    [coverageBlocks, departments]
  );
  const coverageScopes = useMemo(
    () => buildCoverageScopes(normalizedCoverageBlocks, departments),
    [normalizedCoverageBlocks, departments]
  );
  const normalizedAssignmentWindows = useMemo(
    () => normalizeAssignmentWindows(assignmentWindows, departments, normalizedCoverageBlocks),
    [assignmentWindows, departments, normalizedCoverageBlocks]
  );
  const feasibilityIssues = useMemo(
    () => analyzeCoverageFeasibility(staff, passBank, coverageScopes, fridayCycleWeeks),
    [staff, passBank, coverageScopes, fridayCycleWeeks]
  );
  const [activeDay, setActiveDay] = useState('mon');
  const [assignmentDay, setAssignmentDay] = useState('mon');
  const [driftState, setDriftState] = useState(initialDriftState);
  const [view, setView] = useState('schedule');
  const [workflowMode, setWorkflowModeState] = useState(WORKFLOW_MODE_GENERATE);
  const [editingId, setEditingId] = useState(null);
  const [assignmentEditor, setAssignmentEditor] = useState(null);
  const [generating, setGenerating] = useState(false);
  const [generationProgress, setGenerationProgress] = useState({ percent: 0, label: '', detail: '' });
  const [alternatives, setAlternatives] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [dirty, setDirty] = useState(false);
  const [savedFileName, setSavedFileName] = useState(null);
  // Referens till en öppnad fil (File System Access API). Kan inte sparas i localStorage,
  // så den nollställs vid ny session — men då fortsätter Spara att fungera (faller tillbaka till nedladdning).
  const [fileHandle, setFileHandle] = useState(null);
  const [showWelcome, setShowWelcome] = useState(false);
  const [storageLoadError, setStorageLoadError] = useState(false);
  const [showExamplePicker, setShowExamplePicker] = useState(false);
  const [tourStep, setTourStep] = useState(null); // null = ingen tur aktiv, annars 0..5
  const [tourMode, setTourMode] = useState(WORKFLOW_MODE_GENERATE);

  // När cykellängden ändras: justera alla personers fridayRotation till rätt längd,
  // och håll currentFridayWeek inom giltigt intervall.
  const setFridayCycleWeeks = (n) => {
    const clamped = Math.max(1, Math.min(20, n || 1));
    setFridayCycleWeeksRaw(clamped);
    setStaff(prev => prev.map(s => ({
      ...s,
      fridayRotation: s.hasFridayRotation
        ? resizeRotation(s.fridayRotation, clamped)
        : s.fridayRotation,
      fridayTemplateStartWeek: Math.min(Math.max(1, s.fridayTemplateStartWeek || 1), clamped),
      fridayTemplateOverrides: Object.fromEntries(
        Object.entries(s.fridayTemplateOverrides || {}).filter(([week]) => parseInt(week, 10) <= clamped)
      ),
    })));
    setFridayTemplateRotation(prev => resizeRotation(prev, clamped));
    setCurrentFridayWeek(w => Math.min(Math.max(1, w), clamped));
  };

  // ----- Persistens -----
  // Autospar i localStorage som backup. Den primära "sanningen" är dock filen
  // som användaren själv exporterar/importerar — så data följer med mellan datorer/kollegor.
  const STORAGE_KEY = 'fritids-schema-v1';
  const WORKFLOW_MODE_STORAGE_KEY = 'schemafix-workflow-mode-v1';
  const STORAGE_RECOVERY_KEY = 'fritids-schema-v1-before-last-start';

  const preserveStoredBackup = (raw) => {
    if (!raw) return;
    try {
      const current = JSON.parse(raw);
      const currentStaffCount = Array.isArray(current?.staff) ? current.staff.length : 0;
      const existingRaw = localStorage.getItem(STORAGE_RECOVERY_KEY);
      const existing = existingRaw ? JSON.parse(existingRaw) : null;
      const existingStaffCount = Array.isArray(existing?.staff) ? existing.staff.length : 0;
      if (currentStaffCount > 0 || existingStaffCount === 0) {
        localStorage.setItem(STORAGE_RECOVERY_KEY, raw);
      }
    } catch {}
  };

  const activateWorkflowMode = (mode, options = {}) => {
    const normalized = normalizeWorkflowMode(mode);
    setWorkflowModeState(normalized);
    if (options.navigate === false) return;
    if (normalized === WORKFLOW_MODE_EXISTING) {
      setView(staff.length > 0 ? 'schedule' : 'staff');
      return;
    }
    setView((departments.length > 0 && staff.length > 0) ? 'schedule' : 'settings');
  };

  // Ladda backup vid start
  useEffect(() => {
    let foundData = false;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const storedWorkflowMode = normalizeWorkflowMode(localStorage.getItem(WORKFLOW_MODE_STORAGE_KEY));
        if (raw) {
          foundData = true;
          preserveStoredBackup(raw);
          const data = JSON.parse(raw);
          if (!data || typeof data !== 'object' || !Array.isArray(data.staff) || !Array.isArray(data.departments)) {
            throw new Error('Autosparningen har okänt format.');
          }
          setWorkflowModeState(normalizeWorkflowMode(data.workflowMode || storedWorkflowMode));
          const normalizedStaff = normalizeStaffList(data.staff || [], data.fridayCycleWeeks || 8);
          if (data.staff) {
            setStaff(normalizedStaff);
            if (normalizedStaff.length > 0) nextId = Math.max(...normalizedStaff.map(p => p.id), 99) + 1;
          }
          const loadedDepartments = data.departments || initialDepartments;
          if (data.departments) setDepartments(loadedDepartments);
          if (data.coverageBlocks) setCoverageBlocks(normalizeCoverageBlocks(data.coverageBlocks, loadedDepartments));
          setPassBank(normalizePassBank(data.passBank || initialPassBank));
          setAssignments(normalizeAssignmentsMap(data.assignments || initialAssignments, normalizedStaff));
          setAssignmentWindows(normalizeAssignmentWindows(data.assignmentWindows || initialAssignmentWindows, loadedDepartments, normalizeCoverageBlocks(data.coverageBlocks || initialCoverageBlocks, loadedDepartments)));
          setDriftState(normalizeDriftState(data.driftState || initialDriftState, normalizedStaff));
          if (data.fridayCycleWeeks) setFridayCycleWeeksRaw(data.fridayCycleWeeks);
          setFridayTemplateRotation(resizeRotation(data.fridayTemplateRotation, data.fridayCycleWeeks || 8));
          if (data.savedFileName) setSavedFileName(data.savedFileName);
        } else {
          setWorkflowModeState(storedWorkflowMode);
        }
    } catch (err) {
      setStorageLoadError(true);
      console.error('Kunde inte läsa backup från localStorage:', err);
    }
    // Visa välkomstvyn endast vid allra första besöket — tom localStorage
    const hasSeenWelcome = localStorage.getItem('schemafix-welcome-seen');
    if (!foundData && !hasSeenWelcome) {
      setShowWelcome(true);
    }
    setLoaded(true);
  }, []);

  const dismissWelcome = () => {
    localStorage.setItem('schemafix-welcome-seen', '1');
    setShowWelcome(false);
  };

  const startTour = (mode = workflowMode) => {
    const normalized = normalizeWorkflowMode(mode);
    activateWorkflowMode(normalized, { navigate: false });
    dismissWelcome();
    setTourMode(normalized);
    const tour = getWorkflowTour(normalized);
    setView(tour[0]?.view || 'settings');
    setTourStep(0);
  };

  const nextTourStep = () => {
    const tour = getWorkflowTour(tourMode);
    const next = (tourStep ?? -1) + 1;
    if (next >= tour.length) {
      setTourStep(null);
      return;
    }
    setView(tour[next].view);
    setTourStep(next);
  };

  const endTour = () => setTourStep(null);

  // Autospar till localStorage vid varje ändring + markera som "ändrat sedan senaste filsparning"
  useEffect(() => {
    if (!loaded) return;
    if (storageLoadError) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        staff: normalizeStaffList(staff, fridayCycleWeeks),
        departments, coverageBlocks: normalizedCoverageBlocks, passBank: normalizePassBank(passBank), assignments: normalizeAssignmentsMap(assignments, staff), assignmentWindows: normalizedAssignmentWindows, driftState: normalizeDriftState(driftState, staff), fridayCycleWeeks, fridayTemplateRotation, savedFileName, workflowMode,
      }));
      localStorage.setItem(WORKFLOW_MODE_STORAGE_KEY, workflowMode);
    } catch {}
    setDirty(true);
  }, [staff, departments, normalizedCoverageBlocks, passBank, assignments, normalizedAssignmentWindows, driftState, fridayCycleWeeks, fridayTemplateRotation, workflowMode, loaded, storageLoadError]);

  // Hjälp: bygg datapaketet att skriva till fil
  const buildSaveData = () => ({
    version: 8,
    exportedAt: new Date().toISOString(),
    staff: normalizeStaffList(staff, fridayCycleWeeks),
    departments, coverageBlocks: normalizedCoverageBlocks, passBank: normalizePassBank(passBank), assignments: normalizeAssignmentsMap(assignments, staff), assignmentWindows: normalizedAssignmentWindows, driftState: normalizeDriftState(driftState, staff), fridayCycleWeeks, fridayTemplateRotation, workflowMode,
    // Snapshot av staff från senaste utgångspunkt – används av schemavyn
    // för att visa vad som ändrats manuellt sedan generering/inläsning.
    baselineStaff: baselineStaff ? normalizeStaffList(baselineStaff, fridayCycleWeeks) : null,
  });

  // Skriv data till en redan öppnad fil-handle
  const writeToHandle = async (handle, data) => {
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
  };

  // Spara: använder File System Access API om webbläsaren stöder det,
  // annars faller den tillbaka till vanlig nedladdning (Hämtade filer).
  const saveToFile = async (saveAs = false) => {
    const data = buildSaveData();
    const today = new Date().toISOString().slice(0, 10);
    const defaultName = `schemafix-${today}.json`;

    // Modern API (Chrome/Edge/Opera): visar en riktig "Spara som"-dialog
    if (window.showSaveFilePicker) {
      try {
        let handle = fileHandle;
        // Inget öppet handle eller "Spara som" begärt — visa dialog
        if (!handle || saveAs) {
          handle = await window.showSaveFilePicker({
            suggestedName: savedFileName || defaultName,
            types: [{
              description: 'Schemafil',
              accept: { 'application/json': ['.json'] },
            }],
          });
          setFileHandle(handle);
        }
        await writeToHandle(handle, data);
        setSavedFileName(handle.name);
        setDirty(false);
        return;
      } catch (err) {
        // Användaren avbröt dialogen — gör inget
        if (err.name === 'AbortError') return;
        // Annat fel — fall ner till fallback
        console.error('File picker fel:', err);
      }
    }

    // Fallback (Firefox/Safari): vanlig nedladdning till Hämtade filer
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = savedFileName || defaultName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setSavedFileName(a.download);
    setDirty(false);
  };

  // Öppna fil: använder File System Access API om tillgängligt så att Spara
  // sedan kan skriva tillbaka till samma fil utan ny dialog.
  const openFile = async () => {
    if (window.showOpenFilePicker) {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{
            description: 'Schemafil',
            accept: { 'application/json': ['.json'] },
          }],
        });
        const file = await handle.getFile();
        await loadFromFileObject(file);
        setFileHandle(handle);
      } catch (err) {
        if (err.name !== 'AbortError') console.error('File picker fel:', err);
      }
      return;
    }
    // Fallback: trigga den dolda <input type="file">
    document.getElementById('loadFileInput').click();
  };

  // Läs in en File-instans (gemensam för båda flöden)
  const loadFromFileObject = (file) => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.staff || !data.departments) {
          alert('Den här filen ser inte ut att vara ett sparat schema.');
          resolve(false); return;
        }
        if (staff.length > 0 && !confirm('Detta ersätter all nuvarande data. Fortsätt?')) {
          resolve(false); return;
        }
        const loadedDepartments = data.departments || [];
        const normalizedStaff = normalizeStaffList(data.staff || [], data.fridayCycleWeeks || 8);
        setStaff(normalizedStaff);
        // Använd sparad baseline om filen har en. Annars sätt nuvarande
        // staff som baseline – då visas inga diff-markeringar tills
        // användaren genererar eller laddar exempel.
        const loadedBaseline = Array.isArray(data.baselineStaff) && data.baselineStaff.length > 0
          ? normalizeStaffList(data.baselineStaff, data.fridayCycleWeeks || 8)
          : JSON.parse(JSON.stringify(normalizedStaff));
        setBaselineStaff(loadedBaseline);
        setWorkflowModeState(normalizeWorkflowMode(data.workflowMode || WORKFLOW_MODE_GENERATE));
        setDepartments(loadedDepartments);
        setCoverageBlocks(normalizeCoverageBlocks(data.coverageBlocks || initialCoverageBlocks, loadedDepartments));
        setPassBank(normalizePassBank(data.passBank || initialPassBank));
        setAssignments(normalizeAssignmentsMap(data.assignments || initialAssignments, normalizedStaff));
        setAssignmentWindows(normalizeAssignmentWindows(data.assignmentWindows || initialAssignmentWindows, loadedDepartments, normalizeCoverageBlocks(data.coverageBlocks || initialCoverageBlocks, loadedDepartments)));
        setDriftState(normalizeDriftState(data.driftState || initialDriftState, normalizedStaff));
        setFridayCycleWeeksRaw(data.fridayCycleWeeks || 8);
        setFridayTemplateRotation(resizeRotation(data.fridayTemplateRotation, data.fridayCycleWeeks || 8));
        if (normalizedStaff.length > 0) nextId = Math.max(...normalizedStaff.map(p => p.id), 99) + 1;
        setSavedFileName(file.name);
        setTimeout(() => setDirty(false), 50);
        resolve(true);
      } catch (err) {
        alert('Kunde inte läsa filen: ' + err.message);
        resolve(false);
      }
    };
    reader.readAsText(file);
  });

  // Bakåtkompatibel wrapper för den dolda <input type="file"> i fallback-läge
  const loadFromFile = (file) => {

  };

  // Varna innan användaren stänger fliken om det finns osparade ändringar
  useEffect(() => {

    return () => window.removeEventListener('beforeunload', handler);
  }, [dirty]);

  const applyExampleScenario = (scenario) => {

    const normalizedStaff = normalizeStaffList(scenario.staff, scenario.fridayCycleWeeks);
    setStaff(normalizedStaff);
    setBaselineStaff(JSON.parse(JSON.stringify(normalizedStaff)));
    setWorkflowModeState(WORKFLOW_MODE_GENERATE);
    setDepartments(scenario.departments);
    setCoverageBlocks(normalizeCoverageBlocks(scenario.coverageBlocks, scenario.departments));
    setPassBank(normalizePassBank(scenario.passBank || initialPassBank));
    setAssignments(normalizeAssignmentsMap(scenario.assignments || initialAssignments, normalizedStaff));
    setAssignmentWindows(normalizeAssignmentWindows(scenario.assignmentWindows || initialAssignmentWindows, scenario.departments, normalizeCoverageBlocks(scenario.coverageBlocks, scenario.departments)));
    setDriftState(normalizeDriftState(initialDriftState, normalizedStaff));
    setFridayCycleWeeksRaw(scenario.fridayCycleWeeks);
    setFridayTemplateRotation(resizeRotation(scenario.fridayTemplateRotation, scenario.fridayCycleWeeks));
    setCurrentFridayWeek(1);
    setFileHandle(null);
    setSavedFileName(null);
    nextId = Math.max(...normalizedStaff.map(p => p.id), 99) + 1;
    setShowExamplePicker(false);
  };
  const loadExample = () => {
    setShowExamplePicker(true);

  const clearAll = () => {

    setAssignmentWindows(normalizeAssignmentWindows(initialAssignmentWindows, departments, normalizedCoverageBlocks));
    setDriftState(normalizeDriftState(initialDriftState, []));
  };
  const openAssignmentEditor = (personId, dayKey) => setAssignmentEditor({ personId, dayKey });
  const saveAssignmentsForDay = (personId, dayKey, nextList, copyDayKeys = [], copyPersonIds = []) => {
    const fridayOptions = {
      fridayWeek: dayKey === 'fri' ? currentFridayWeek : 1,
      cycleWeeks: fridayCycleWeeks,
