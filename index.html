function TimeTextInput({ valueMinutes, onCommit, className = '', disabled = false, placeholder = 'HH:MM', showSteppers = false, stepMinutes = 5 }) {
  const [draft, setDraft] = useState(valueMinutes != null ? minToTime(valueMinutes) : '');

  useEffect(() => {
    setDraft(valueMinutes != null ? minToTime(valueMinutes) : '');
  }, [valueMinutes]);

  const commitDraft = () => {
    if (!draft.trim()) {
      setDraft(valueMinutes != null ? minToTime(valueMinutes) : '');
      return;
    }
    const parsed = parseFlexibleTimeInput(draft);
    if (parsed == null) {
      setDraft(valueMinutes != null ? minToTime(valueMinutes) : '');
      return;
    }
    const normalized = minToTime(parsed);
    setDraft(normalized);
    onCommit(parsed);
  };
  const nudgeTime = (delta) => {
    const current = parseFlexibleTimeInput(draft) ?? valueMinutes;
    const base = current == null ? 8 * 60 : current;
    const next = clamp(roundToStep(base + delta), 0, 24 * 60);
    const normalized = minToTime(next);
    setDraft(normalized);
    onCommit(next);
  };

  if (!showSteppers) {
    return (
      <input
        type="text"
        inputMode="numeric"
        autoComplete="off"
        spellCheck="false"
        className={className}
        value={draft}
        disabled={disabled}
        placeholder={placeholder}
        onChange={e => setDraft(e.target.value)}
        onFocus={(e) => e.target.select()}
        onBlur={commitDraft}
        onKeyDown={(e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            commitDraft();
          }
        }}
      />
    );
  }

  return (
    <div className="flex items-stretch gap-1">
      <input
        type="text"
        inputMode="numeric"
        autoComplete="off"
        spellCheck="false"
        className={`${className} flex-1`}
        value={draft}
        disabled={disabled}
        placeholder={placeholder}
        onChange={e => setDraft(e.target.value)}
        onFocus={(e) => e.target.select()}
        onBlur={commitDraft}
        onKeyDown={(e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            commitDraft();
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            nudgeTime(stepMinutes);
          }
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            nudgeTime(-stepMinutes);
          }
        }}
      />
      <div className="flex flex-col gap-1">
        <button
          type="button"
          disabled={disabled}
          onClick={() => nudgeTime(stepMinutes)}
          className="h-[18px] w-7 rounded-md bg-stone-100 text-stone-600 ring-1 ring-stone-200 hover:bg-stone-200 transition disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-stone-100"
          title={`+${stepMinutes} min`}
        >
          +
        </button>
        <button
          type="button"
          disabled={disabled}
          onClick={() => nudgeTime(-stepMinutes)}
          className="h-[18px] w-7 rounded-md bg-stone-100 text-stone-600 ring-1 ring-stone-200 hover:bg-stone-200 transition disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-stone-100"
          title={`-${stepMinutes} min`}
        >
          -
        </button>
      </div>
    </div>
  );
}

// Editor för dagsspecifika undantag — listar de dagar som har undantag och låter
// användaren lägga till nya. Varje undantag kan sätta valfritt av de fyra fälten.
function DayOverridesEditor({ form, setForm }) {
  const overrides = form.dayOverrides || {};
  const overrideKeys = Object.keys(overrides).filter(k => overrides[k]);
  // Tillåter fredag som dagsundantag bara när personen är i passbank-läge.
  // Övriga lägen har inte fredag i sched och skulle ändå inte använda en
  // dagsregel där (deras fredag styrs av andra fält).
  const candidateDays = form.fridayMode === 'passbank' ? DAY_META : DAYS;
  const availableDays = candidateDays.filter(d => !overrideKeys.includes(d.key));

  const FIELDS = [
    { key: 'earliestStart', label: 'Tidigast börja' },
    { key: 'latestStart',   label: 'Måste börja senast' },
    { key: 'earliestEnd',   label: 'Måste jobba minst till' },
    { key: 'latestEnd',     label: 'Senast sluta' },
  ];

  const setField = (dayKey, fieldKey, val) => {
    const next = { ...overrides };
    next[dayKey] = { ...(next[dayKey] || {}) };
    if (val === '' || val == null) delete next[dayKey][fieldKey];
    else next[dayKey][fieldKey] = timeToMin(val);
    // Om alla fält tomma, ta bort dagen helt
    if (Object.keys(next[dayKey]).length === 0) delete next[dayKey];
    setForm({ ...form, dayOverrides: next });
  };

  const addOverride = (dayKey) => {
    const next = { ...overrides };
    next[dayKey] = {};
    setForm({ ...form, dayOverrides: next });
  };

  const removeOverride = (dayKey) => {
    const next = { ...overrides };
    delete next[dayKey];
    setForm({ ...form, dayOverrides: next });
  };

  return (
    <div className="space-y-3">
      {overrideKeys.length === 0 && (
        <p className="text-xs text-stone-400 italic">Inga dagsundantag än.</p>
      )}
      {overrideKeys.map(dayKey => {
        const dayLabel = getDayMeta(dayKey).label;
        const ov = overrides[dayKey] || {};
        const general = {
          earliestStart: form.earliestStart, latestStart: form.latestStart,
          earliestEnd:   form.earliestEnd,   latestEnd:   form.latestEnd,
        };
        return (
          <div key={dayKey} className="bg-stone-50 rounded-lg p-3 ring-1 ring-stone-200">
            <div className="flex items-center justify-between mb-2">
              <span className="text-sm text-stone-800" style={{ fontWeight: 500 }}>{dayLabel}</span>
              <button type="button" onClick={() => removeOverride(dayKey)}
                className="text-xs text-stone-500 hover:text-red-600 flex items-center gap-1">
                <Trash2 size={12} />Ta bort undantag
              </button>
            </div>
            <div className="grid grid-cols-2 gap-2">
              {FIELDS.map(f => {
                const val = ov[f.key];
                const generalVal = general[f.key];
                const isOverriding = val != null;
                return (
                  <div key={f.key}>
                    <label className="text-[10px] text-stone-600 block mb-0.5">
                      {f.label}
                      {!isOverriding && generalVal != null && (
                        <span className="text-stone-400"> (generellt: {minToTime(generalVal)})</span>
                      )}
                    </label>
                    <div className="flex items-center gap-1">
                      <input type="time" className="input flex-1"
                        value={val != null ? minToTime(val) : ''}
                        onChange={e => setField(dayKey, f.key, e.target.value)} />
                      {isOverriding && (
                        <button type="button" onClick={() => setField(dayKey, f.key, '')}
                          className="text-xs text-stone-400 hover:text-stone-700 px-1" title="Ta bort detta fält">×</button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            <p className="text-[10px] text-stone-500 mt-2">Tomt fält = använd den generella regeln för det fältet.</p>
          </div>
        );
      })}
      {availableDays.length > 0 && (
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs text-stone-500">Lägg till undantag för:</span>
          {availableDays.map(d => (
            <button key={d.key} type="button" onClick={() => addOverride(d.key)}
              className="text-xs px-2.5 py-1 rounded-full bg-stone-100 text-stone-700 hover:bg-stone-200 transition flex items-center gap-1">
              <Plus size={10} />{d.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

    next[parKey] = { ...(next[parKey] || {}) };

              )}

            <div className="space-y-2">
              {FIELDS.map(f => {
                const val = ov[f.key];
                const generalVal = general[f.key];
                const isOverriding = val != null;
                return (

                      )}
                    </div>
                  </div>

      })}

function TourBubble({ step, mode, onNext, onClose }) {
  const steps = getWorkflowTour(mode);
  const cur = steps[step];
  const isLast = step === steps.length - 1;
  if (!cur) return null;
  return (
    <div className="fixed bottom-6 right-6 z-50 max-w-sm">
      <div className="bg-stone-800 text-white rounded-2xl shadow-2xl p-5">
        <div className="flex items-start justify-between mb-2 gap-3">
          <p className="display-font text-base" style={{ fontWeight: 500 }}>{cur.title}</p>
          <button onClick={onClose} className="text-stone-400 hover:text-white flex-shrink-0">
            <X size={16} />
          </button>
        </div>
        <p className="text-sm text-stone-300 mb-4 leading-relaxed">{cur.desc}</p>
        <div className="flex items-center justify-between gap-2">
          <div className="flex gap-1">
            {steps.map((_, i) => (
              <span key={i} className={`w-1.5 h-1.5 rounded-full ${i === step ? 'bg-white' : 'bg-stone-600'}`} />
            ))}
          </div>
          <button onClick={onNext}
            className="px-4 py-1.5 text-sm rounded-lg bg-white text-stone-900 hover:bg-stone-100 transition flex items-center gap-1.5">
            {isLast ? 'Klart' : 'Nästa'} {!isLast && <ArrowRight size={12} />}
          </button>
        </div>
      </div>
    </div>
  );
}

                        {minToHM(alt.summary.totalHourDev)}
                      </span>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>

          {/* Comparison vs current */}
          <div className="bg-stone-50 rounded-lg p-3 mb-6 text-xs text-stone-600 flex items-center gap-3 flex-wrap">
            <span className="text-stone-500">Nuvarande schema till jämförelse:</span>
            <span><span style={{ fontWeight: 500 }}>{currentSummary.totalGaps}</span> gap</span>
            <span>·</span>
            <span><span style={{ fontWeight: 500 }}>{currentSummary.totalOver}</span> över max</span>
            <span>·</span>
            <span><span style={{ fontWeight: 500 }}>{currentSummary.peopleOff}</span> personer m. tim-avvikelse</span>
            <span>·</span>
            <span>tot. <span style={{ fontWeight: 500 }}>{minToHM(currentSummary.totalHourDev)}</span> avvikelse</span>
          </div>
          <div className="bg-amber-50 ring-1 ring-amber-200 rounded-xl p-3 mb-6 text-xs text-amber-900">
            <span style={{ fontWeight: 600 }}>Skydd:</span> Arbeta vidare öppnar alternativet som generatorutkast. Skriv in direkt ersätter arbetspassen för fritidspersonalen i huvudschemat.
          </div>

          {/* Preview of selected */}
          <PreviewSchedule staff={alternatives[previewIdx].staff} originalStaff={currentStaff} coverageScopes={coverageScopes} departments={departments} />

          <div className="flex justify-end gap-2 mt-6">
            <button onClick={onClose} className="px-4 py-2 text-sm rounded-lg text-stone-600 hover:bg-stone-100 transition">Avbryt</button>
            <button onClick={() => onUseDraft?.(alternatives[previewIdx])}
              className="px-5 py-2 text-sm rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition flex items-center gap-2">
              <Wand2 size={14} />Arbeta vidare i generatorn
            </button>
            <button onClick={() => onApply(alternatives[previewIdx])}
              className="px-5 py-2 text-sm rounded-lg bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50 transition flex items-center gap-2">
              <ArrowRight size={14} />Skriv in direkt
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function PreviewSchedule({ staff, originalStaff, coverageScopes, departments }) {
  const origMap = Object.fromEntries(originalStaff.map(p => [p.id, p]));
  return (
    <div className="space-y-4">
      <p className="text-xs uppercase tracking-wider text-stone-500">Förhandsgranskning · ändringar markerade i färg</p>
      {DAY_META.map(d => {
        const present = staff.filter(s => s.sched[d.key] && !(s.daysOff || []).includes(d.key))
          .map(s => ({ ...s, startMin: timeToMin(s.sched[d.key][0]), endMin: timeToMin(s.sched[d.key][1]) }))
          .sort((a, b) => a.startMin - b.startMin);
        // Hoppa över fredag om ingen i passbank-läge har en fredagstid satt –
        // då finns inget vettigt att visa här (legacy-fredag visas inte i denna preview).
        if (d.key === 'fri' && present.length === 0) return null;
        const gaps = coverageScopes.reduce((sum, scope) => {
          const slots = computeSlots(staff, d.key, scope.slots, scope);
          return sum + slots.filter(s => s.count < s.min).length;
        }, 0);
        const overs = coverageScopes.reduce((sum, scope) => {
          const slots = computeSlots(staff, d.key, scope.slots, scope);
          return sum + slots.filter(s => s.count > s.max).length;
        }, 0);
        return (
          <div key={d.key} className="bg-white ring-1 ring-stone-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <p className="text-sm text-stone-700" style={{ fontWeight: 500 }}>{d.label}</p>
              <span className={`text-[10px] px-2 py-0.5 rounded ${gaps > 0 ? 'bg-orange-50 text-orange-700' : overs > 0 ? 'bg-amber-50 text-amber-700' : 'bg-emerald-50 text-emerald-700'}`}>
                {gaps > 0 ? `${gaps} gap` : overs > 0 ? `${overs} över max` : 'Täcker krav'}
              </span>
            </div>
            <div className="space-y-0.5">
              {present.map(p => {
                const orig = origMap[p.id];
                const origSh = orig.sched[d.key];
                const changed = !origSh || origSh[0] !== p.sched[d.key][0] || origSh[1] !== p.sched[d.key][1];
                const dept = getDept(p.deptId, departments);
                const soft = softColor(dept.color);
                return (
                  <div key={p.id} className="flex items-center text-xs">
                    <span className="w-24 text-right pr-2 text-stone-700 truncate">{p.name}</span>
                    <div className="flex-1 relative h-5 bg-stone-50 rounded">
                      <div className="absolute h-full rounded flex items-center px-1.5"
                        style={{ left: `${pctFromMin(p.startMin)}%`, width: `${pctFromMin(p.endMin) - pctFromMin(p.startMin)}%`,
                          backgroundColor: changed ? '#fef3c7' : soft, borderLeft: `2px solid ${changed ? '#d97706' : dept.color}` }}>
                        <span className="text-[10px] truncate text-stone-700">
                          {p.sched[d.key][0]}–{p.sched[d.key][1]}
                          {changed && <span className="text-amber-700 ml-1">?</span>}
                        </span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}


// ----- Mount -----
const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(React.createElement(FritidsSchemaApp));

</script>
